name: STEP HOMECARE-10 Add Product Site

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/homecare-site-update.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-homecare-product:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add DPRO Homecare product
        shell: bash
        run: |
          python - <<'PYCODE'
          from pathlib import Path
          import base64
          import re
          import subprocess
          import urllib.request

          script_path = Path('script.js')
          script = script_path.read_text(encoding='utf-8')

          script = script.replace(
              '// STEP COSMETICS-WEB-1 / 38 PRODUCTS / PRESERVE ALL 37 PRODUCTS / 20260719',
              '// STEP HOMECARE-WEB-1 / 39 PRODUCTS / PRESERVE ALL 38 PRODUCTS / 20260720'
          )
          script = re.sub(r'const productCount = \d+;', 'const productCount = 39;', script, count=1)

          description_line = '  appendDescription("教育・生活サービス", "訪問介護・家族連絡");'
          if description_line not in script:
              anchor = '  appendDescription("教育・生活サービス", "宿泊・民泊");'
              if anchor not in script:
                  raise SystemExit('category description anchor not found')
              script = script.replace(anchor, anchor + '\n' + description_line, 1)

          homecare_entry = '''    [
              "systems/homecare.html",
              "HC",
              "catalog-live-homecare",
              "訪問介護・家族連絡実画面プレビュー",
              "https://dpromstk2000-lab.github.io/dpro-homecare-family-line/owner.html?demo=1&v=HOMECARE-10",
              "教育・生活サービス",
              "訪問介護・家族連絡",
              "訪問予定・スタッフ記録・家族報告・申し送り・事故・問い合わせ管理。"
            ]'''
          if '"systems/homecare.html"' not in script:
              anchor = '''    [
                "systems/cosmetics.html",
                "CM",
                "catalog-live-cosmetics",
                "化粧品店実画面プレビュー",
                "https://dpromstk2000-lab.github.io/dpro-cosmetics-line-liff/owner.html?demo=1&v=COSMETICS-10",
                "美容・健康",
                "化粧品店",
                "美容相談・商品取り置き・購入履歴・再購入・問合せ・販促管理。"
              ]'''
              if anchor not in script:
                  raise SystemExit('cosmetics product anchor not found')
              script = script.replace(anchor, anchor + ',\n' + homecare_entry, 1)

          category_section = script.split('const categoryMap =', 1)[1]
          if '"訪問介護・家族連絡"' not in category_section:
              anchor = '      "デイサービス",'
              if anchor not in script:
                  raise SystemExit('category map anchor not found')
              script = script.replace(anchor, anchor + '\n      "訪問介護・家族連絡",', 1)

          script_path.write_text(script, encoding='utf-8')

          page_data = base64.b64decode('')
          page_path = Path('systems/homecare.html')
          page_path.parent.mkdir(parents=True, exist_ok=True)
          page_path.write_bytes(page_data)

          subprocess.run(['node', '--check', 'script.js'], check=True)

          final_script = script_path.read_text(encoding='utf-8')
          final_page = page_path.read_text(encoding='utf-8')
          required = [
              'const productCount = 39;',
              'systems/homecare.html',
              '訪問介護・家族連絡',
              'dpro-homecare-family-line/owner.html?demo=1',
              'dpro-homecare-family-line/family.html?demo=1',
              'HOMECARE-WEB-1 / 39 PRODUCTS'
          ]
          for token in required:
              if token not in final_script and token not in final_page:
                  raise SystemExit(f'missing required token: {token}')

          if final_script.count('"systems/homecare.html"') != 1:
              raise SystemExit('homecare catalog entry must appear exactly once')
          if final_script.count('"訪問介護・家族連絡",') < 2:
              raise SystemExit('homecare must be present in product and category maps')

          source_urls = [
              'https://dpromstk2000-lab.github.io/dpro-homecare-family-line/family.html?demo=1',
              'https://dpromstk2000-lab.github.io/dpro-homecare-family-line/member.html?demo=1',
              'https://dpromstk2000-lab.github.io/dpro-homecare-family-line/staff.html?demo=1',
              'https://dpromstk2000-lab.github.io/dpro-homecare-family-line/owner.html?demo=1',
              'https://dpromstk2000-lab.github.io/dpro-homecare-family-line/owner-ipad.html?demo=1',
              'https://dpromstk2000-lab.github.io/dpro-homecare-family-line/system-check.html?demo=1'
          ]
          for url in source_urls:
              request = urllib.request.Request(url, headers={'User-Agent': 'DPRO-SITE-VALIDATOR'})
              with urllib.request.urlopen(request, timeout=30) as response:
                  if response.status != 200:
                      raise SystemExit(f'HTTP {response.status}: {url}')

          print('HOMECARE-10 site update validation: PASS')
          PYCODE

      - name: Remove one-time workflow
        run: rm -f .github/workflows/homecare-site-update.yml

      - name: Commit site update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add script.js systems/homecare.html .github/workflows/homecare-site-update.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "STEP HOMECARE-10 add homecare family contact product site"
          git push origin main
