      - name: Update catalog card
        shell: bash
        env:
          OLD_BLOCK_B64: ""
          NEW_BLOCK_B64: ""
        run: |
          set -euo pipefail
          python - <<'PY_PATCH'
          from pathlib import Path
          import base64, os

          path = Path("systems.html")
          text = path.read_text(encoding="utf-8")
          old = base64.b64decode(os.environ["OLD_BLOCK_B64"]).decode("utf-8")
          new = base64.b64decode(os.environ["NEW_BLOCK_B64"]).decode("utf-8")

          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8")
              print("Hair catalog card updated.")
          elif new in text:
              print("Hair catalog card already updated.")
          else:
              raise RuntimeError("Hair catalog card anchor was not found.")
          PY_PATCH

      - name: Validate product site
        shell: bash
        run: |
          set -euo pipefail
          test -s systems/hair-salon.html
          test -s docs/DPRO_HAIR_LINE_OPERATION_EXPERIENCE_20260723.pdf
          test "$(stat -c%s docs/DPRO_HAIR_LINE_OPERATION_EXPERIENCE_20260723.pdf)" -gt 250000
          grep -q "STEP HAIR-NEXT-10 / PRODUCT SITE FINAL / 20260723" systems/hair-salon.html
          grep -q 'view=catalog' systems/hair-salon.html
          grep -q 'view=checkin' systems/hair-salon.html
          grep -q 'system-check.html' systems/hair-salon.html
          grep -q 'DPRO_HAIR_LINE_OPERATION_EXPERIENCE_20260723.pdf' systems/hair-salon.html
          grep -q 'HAIR NEXT-10完成' systems.html
          grep -q '前回と同じ予約・写真付きカタログ・QR来店受付' systems.html

          python - <<'PY_VALIDATE'
          from pathlib import Path
          import re

          text = Path("systems/hair-salon.html").read_text(encoding="utf-8")
          ids = re.findall(r'\bid="([^"]+)"', text.split("<script", 1)[0])
          duplicates = sorted(set(x for x in ids if ids.count(x) > 1))
          assert not duplicates, duplicates

          scripts = re.findall(
              r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
              text,
              re.S | re.I,
          )
          Path("/tmp/hair-next10-product.js").write_text(
              "\n".join(scripts),
              encoding="utf-8",
          )
          print("Hair product page validation: OK")
          PY_VALIDATE

          node --check /tmp/hair-next10-product.js

      - name: Remove temporary workflow
        shell: bash
        run: rm -f ".github/workflows/step-hair-next-10-product-site-guide.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-10-R1 publish product page and compressed guide"
          git push origin main
