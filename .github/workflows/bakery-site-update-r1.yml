name: One-time Bakery product site update R1

on:
  push:
    paths:
      - '.github/workflows/bakery-site-update-r1.yml'

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Bakery product site robustly
        shell: python
        run: |
          from pathlib import Path
          import ast
          import re
          
          index_path = Path("index.html")
          systems_path = Path("systems.html")
          product_path = Path("systems/bakery.html")
          old_workflow_path = Path(".github/workflows/bakery-site-update.yml")
          this_workflow_path = Path(".github/workflows/bakery-site-update-r1.yml")
          
          old_workflow = old_workflow_path.read_text(encoding="utf-8")
          match = re.search(r"^\s*bakery_html = (.+)$", old_workflow, re.M)
          if not match:
              raise SystemExit("embedded bakery_html not found in previous workflow")
          bakery_html = ast.literal_eval(match.group(1))
          
          catalog_url = "https://dpromstk2000-lab.github.io/bakery-line-system/catalog.html?shop_code=bakery_demo&amp;catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&amp;api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&amp;v=32"
          catalog_url_raw = catalog_url.replace("&amp;", "&")
          
          new_index = f'''    <article class="phase-live-card reveal">
                <div class="phase-live-copy"><span>BAKERY</span><h3 class="headline-lines">
                <span>写真で選び、</span>
                <span>そのままLINEで</span>
                <span>取り置きへ。</span>
              </h3><p>店舗公式パンカタログ・商品写真管理・LINE取り置きを一つに。</p><div class="phase-live-links"><a href="systems/bakery.html">製品ページを見る →</a><a href="{catalog_url_raw}" target="_blank" rel="noopener">写真付きカタログを開く →</a></div></div>
                <div class="phase-live-frame desktop bakery-live-frame">
            <iframe id="bakery-live-iframe" title="ベーカリー写真付き商品カタログ" loading="lazy" src="{catalog_url}"></iframe>
            <div class="iframe-fallback bakery-fallback" aria-hidden="true">
              <div class="iframe-fallback-mark">BK</div>
              <p class="eyebrow">PHOTO CATALOG × LINE PREORDER</p>
              <h4>パンの魅力を写真で伝え、<br>そのまま取り置きへ</h4>
              <p>実画面が読み込めない場合は、製品ページからカタログを開けます。</p>
              <a href="systems/bakery.html">ベーカリー製品ページを見る →</a>
            </div>
          </div>
              </article>'''
          
          new_systems = f'''<a class="catalog-card reveal is-live" href="systems/bakery.html">
            <div class="catalog-card-top">
              <span class="catalog-code">BK</span>
              <span class="catalog-status">写真カタログ対応</span>
            </div>
            <div class="catalog-visual catalog-live-visual catalog-live-bakery">
              <iframe title="ベーカリー写真付き商品カタログ実画面プレビュー" loading="lazy"
                src="{catalog_url}"></iframe>
              <span class="catalog-live-badge">実画面あり</span>
            </div>
            <div class="catalog-card-copy">
              <small>飲食・小売</small>
              <h3>ベーカリー</h3>
              <p>写真付き公式パンカタログ・LINE取り置き・会員証・ECOレスキュー。</p>
              <b class="catalog-card-cta">写真カタログ対応ページを見る →</b>
            </div>
          </a>'''
          
          index = index_path.read_text(encoding="utf-8")
          systems = systems_path.read_text(encoding="utf-8")
          
          index_pattern = re.compile(
              r'<article class="phase-live-card reveal">\s*'
              r'<div class="phase-live-copy"><span>BAKERY</span>.*?'
              r'<div class="phase-live-frame desktop bakery-live-frame">.*?'
              r'</div>\s*</article>',
              re.S,
          )
          systems_pattern = re.compile(
              r'<a class="catalog-card reveal is-live" href="systems/bakery\.html">.*?</a>',
              re.S,
          )
          
          if "写真で選び、" not in index:
              index, index_count = index_pattern.subn(new_index, index, count=1)
              if index_count != 1:
                  raise SystemExit(f"index bakery block replace failed: {index_count}")
          
          if "写真付き公式パンカタログ・LINE取り置き" not in systems:
              systems, systems_count = systems_pattern.subn(new_systems, systems, count=1)
              if systems_count != 1:
                  raise SystemExit(f"systems bakery block replace failed: {systems_count}")
          
          product_path.parent.mkdir(parents=True, exist_ok=True)
          product_path.write_text(bakery_html, encoding="utf-8")
          index_path.write_text(index, encoding="utf-8")
          systems_path.write_text(systems, encoding="utf-8")
          
          checks = {
              "product title": "写真付きパンカタログからLINE取り置きへ" in bakery_html,
              "product catalog iframe": "catalog.html?shop_code=bakery_demo" in bakery_html,
              "product admin iframe": "catalog-admin.html?shop_code=bakery_demo" in bakery_html,
              "index new appeal": "写真で選び、" in index and "写真付きカタログを開く" in index,
              "systems new appeal": "写真付き公式パンカタログ" in systems,
              "demo code": "<strong>1234</strong>" in bakery_html,
              "catalog api": "dpro-bakery-catalog-api.dpromstk2000.workers.dev" in bakery_html,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit("validation failed: " + ", ".join(failed))
          
          old_workflow_path.unlink(missing_ok=True)
          this_workflow_path.unlink(missing_ok=True)

      - name: Commit update
        run: |
          git config user.name "DPRO Site Automation"
          git config user.email "actions@users.noreply.github.com"
          git add index.html systems.html systems/bakery.html .github/workflows/bakery-site-update.yml .github/workflows/bakery-site-update-r1.yml
          git commit -m "STEP BAKERY-SITE-1-R1 promote photo catalog and LINE preorder"
          git push
