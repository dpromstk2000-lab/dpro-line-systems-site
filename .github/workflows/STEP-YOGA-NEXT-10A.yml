name: "STEP YOGA-NEXT-10A | 製品サイト・A4操作体験シート"
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/STEP-YOGA-NEXT-10A.yml"]
permissions:
  contents: write
concurrency:
  group: yoga-next-10a-product-site-pdf
  cancel-in-progress: false
jobs:
  product-site-and-pdf:
    name: "YOGA-NEXT-10A product site and operation sheet"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      WORKFLOW_PATH: ".github/workflows/STEP-YOGA-NEXT-10A.yml"
      BEFORE_TAG: "dpro-site-yoga-next-10-before-20260724"
      EXPECTED_SYSTEMS_BLOB_SHA: "c242cc233856ab4c92e3f83942a1f9f82be98e3e"
      EXPECTED_YOGA_PAGE_BLOB_SHA: "20b1d2de6e8dcb82cb44bb847ef7e6e6d3d51476"
    steps:
      - name: "1. Checkout product-site repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "2. 対象ファイル・基準状態確認"
        shell: bash
        run: |
          set -Eeuo pipefail
          for file in systems.html systems/yoga.html styles.css script.js "$WORKFLOW_PATH"; do [[ -f "$file" ]] || { echo "::error file=$file::必須ファイルがありません。"; exit 1; }; done
          [[ "$(git hash-object systems.html)" == "$EXPECTED_SYSTEMS_BLOB_SHA" ]] || { echo "::error file=systems.html::基準版不一致"; exit 1; }
          [[ "$(git hash-object systems/yoga.html)" == "$EXPECTED_YOGA_PAGE_BLOB_SHA" ]] || { echo "::error file=systems/yoga.html::基準版不一致"; exit 1; }
          mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r HEAD)
          before_sha="$(git rev-parse HEAD)"; if [[ "${#changed[@]}" -eq 1 && "${changed[0]}" == "$WORKFLOW_PATH" ]]; then before_sha="$(git rev-parse HEAD^)"; fi
          echo "BEFORE_SHA=$before_sha" >> "$GITHUB_ENV"
      - name: "3. 変更前バックアップタグ作成"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"; git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then [[ "$(git rev-list -n 1 "$BEFORE_TAG")" == "$BEFORE_SHA" ]] || exit 1; else git tag -a "$BEFORE_TAG" "$BEFORE_SHA" -m "before YOGA-NEXT-10A"; git push origin "$BEFORE_TAG"; fi
      - name: "4. YML・埋込Python構文検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e 'require "yaml"; YAML.load_file(ARGV[0], aliases: true)' "$WORKFLOW_PATH"
          python3 - <<'PY'
          import base64
          compile(base64.b64decode("").decode(),"<YOGA-NEXT-10A>","exec")
          PY
      - name: "5. PDF・QR・画面取得依存関係を準備"
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y poppler-utils fonts-noto-cjk
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright "qrcode[pil]" pillow opencv-python-headless pypdf
          python3 -m playwright install chromium
      - name: "6. 実画面取得・A4 PDF生成・QR読取・製品サイト更新"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import base64
          from pathlib import Path
          Path('/tmp/yoga_next_10a.py').write_text(base64.b64decode("").decode(),encoding='utf-8')
          PY
          python3 /tmp/yoga_next_10a.py
      - name: "7. PDF・PNG・QR・製品ページ完成検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          for file in assets/pdfs/dpro-yoga-line-next-operation-guide.pdf assets/pdfs/dpro-yoga-line-next-operation-guide.png assets/yoga-next/operation-sheet.html assets/yoga-next/operation-sheet-qr-check.json assets/yoga-next/screens/customer.png assets/yoga-next/screens/member.png assets/yoga-next/screens/owner.png assets/yoga-next/screens/ipad.png dpro-next-yoga-next-10-site-result.json; do [[ -s "$file" ]] || { echo "::error file=$file::生成物なし"; exit 1; }; done
          grep -q '"status": "PASS"' assets/yoga-next/operation-sheet-qr-check.json
          grep -q '"qr_count": 6' assets/yoga-next/operation-sheet-qr-check.json
          grep -q 'YOGA NEXT-10完成' systems.html
          grep -q 'STEP YOGA-NEXT-10A' systems/yoga.html
          [[ "$(pdfinfo assets/pdfs/dpro-yoga-line-next-operation-guide.pdf | awk '/^Pages:/{print $2}')" == "1" ]]
      - name: "8. 変更範囲・Worker/Supabase未変更検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          allowed='^(systems\.html|systems/yoga\.html|assets/yoga-next/|assets/pdfs/dpro-yoga-line-next-operation-guide\.(pdf|png)|dpro-next-yoga-next-10-site-result\.json|\.github/workflows/STEP-YOGA-NEXT-10A\.yml)$'
          unexpected="$(git diff --name-only "$BEFORE_SHA" | grep -Ev "$allowed" || true)"; [[ -z "$unexpected" ]] || { echo "::error::想定外変更 $unexpected"; exit 1; }
          forbidden="$(git diff --name-only "$BEFORE_SHA" | grep -Ei 'worker\.js|\.sql$|supabase|wrangler' || true)"; [[ -z "$forbidden" ]] || exit 1
      - name: "9. 結果サマリー"
        shell: bash
        run: |
          echo "### YOGA-NEXT-10A 完了" >> "$GITHUB_STEP_SUMMARY"
          echo "- 製品ページ・一覧カード: OK" >> "$GITHUB_STEP_SUMMARY"
          echo "- A4縦1枚PDF・PNG: OK" >> "$GITHUB_STEP_SUMMARY"
          echo "- 最終PDF QR 6件: PASS" >> "$GITHUB_STEP_SUMMARY"
      - name: "10. 成功後YML自身を削除"
        shell: bash
        run: |
          rm -f "$WORKFLOW_PATH"; test ! -f "$WORKFLOW_PATH"
      - name: "11. 自動Commit・Push"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"; git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add systems.html systems/yoga.html assets/yoga-next assets/pdfs/dpro-yoga-line-next-operation-guide.pdf assets/pdfs/dpro-yoga-line-next-operation-guide.png dpro-next-yoga-next-10-site-result.json
          git add -u "$WORKFLOW_PATH"
          git diff --cached --quiet && exit 1
          git commit -m "feat(site): complete YOGA-NEXT-10A product page and operation sheet [skip ci]"
          git push origin HEAD:main
