jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout product site repository
        uses: actions/checkout@v6

      - name: Restore product site patch
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$PATCH_GZIP_BASE64"             | tr -d '[:space:]'             | base64 --decode             | gzip --decompress             > /tmp/apply_nail_next11.py

      - name: Apply NAIL NEXT product site update
        shell: bash
        run: |
          set -euo pipefail
          python /tmp/apply_nail_next11.py

      - name: Validate catalog and product page
        shell: bash
        run: |
          set -euo pipefail
          test -s systems.html
          test -s systems/nail.html

          grep -q "STEP NAIL-NEXT-11" systems.html
          grep -q "STEP NAIL-NEXT-11" systems/nail.html
          grep -q "NAIL NEXT-10完成版" systems.html
          grep -q "写真デザイン・カルテ対応" systems.html
          grep -q "DPRO NAIL LINE NEXT" systems/nail.html
          grep -q "写真付きデザイン予約" systems/nail.html
          grep -q "private施術写真" systems/nail.html
          grep -q "再来店フォロー" systems/nail.html
          grep -q "release.html?v=nail-next-10" systems/nail.html
          grep -q "system-check.html?v=nail-next-10" systems/nail.html

          if grep -q "v=step-nail-" systems/nail.html; then
            echo "Old nail URL remains."
            exit 1
          fi

          python - <<'PY'
          import re
          from pathlib import Path

          catalog = Path("systems.html").read_text(encoding="utf-8")
          product = Path("systems/nail.html").read_text(encoding="utf-8")

          assert len(re.findall(r'href="systems/nail\.html"', catalog)) == 1
          assert catalog.count("NAIL NEXT-10完成版") == 1
          assert "写真付きデザイン予約" in product
          assert "施術カルテ" in product
          assert "再来店フォロー" in product
          PY

          echo "STEP NAIL-NEXT-11 product site validation passed"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add systems.html systems/nail.html

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP NAIL-NEXT-11 update nail product site"
          git push
