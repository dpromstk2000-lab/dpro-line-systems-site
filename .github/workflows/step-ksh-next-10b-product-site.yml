          CUSTOMER_DEMO = f"{SYSTEM_BASE}/index-product-demo.html?v=step-ksh-next-10"
          CUSTOMER_URL = f"{SYSTEM_BASE}/index.html?v=step-ksh-next-10"
          MEMBER_URL = f"{SYSTEM_BASE}/member.html?demo=1&v=step-ksh-next-7"
