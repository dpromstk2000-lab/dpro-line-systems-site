          IPAD_URL = f"{SYSTEM_BASE}/owner-ipad.html?embed_demo=1&v=step-ksh-next-6"
          CHECK_URL = f"{SYSTEM_BASE}/system-check.html?v=step-ksh-next-9"
          LINE_URL = "https://lin.ee/YxJGXV6D"

          def sha256_text(value):
              return hashlib.sha256(value.encode("utf-8")).hexdigest()

          def quote(value):
              return json.dumps(str(value), ensure_ascii=False)

          before_product = product_path.read_text(encoding="utf-8")
          before_catalog = catalog_path.read_text(encoding="utf-8")

