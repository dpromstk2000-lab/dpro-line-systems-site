      - name: Validate product page and catalog
        shell: bash
        run: |
          set -euo pipefail

          test -f systems/car-service.html
          test -f systems.html
          test -f .dpro/ksh-next/ksh-next-10b-site-result.yml

          grep -q 'STEP KSH-NEXT-10B / DPRO NEXT PRODUCT SITE' systems/car-service.html
          grep -q 'DPRO 車検・整備工場 LINE' systems/car-service.html
          grep -q '受付、進捗、見積承認' systems/car-service.html
          grep -q '操作体験シートPDF' systems/car-service.html
          grep -q 'step-ksh-next-8' systems/car-service.html
          grep -q 'step-ksh-next-6' systems/car-service.html
          grep -q 'step-ksh-next-7' systems/car-service.html
          grep -q 'step-ksh-next-9' systems/car-service.html
          grep -q 'STEP KSH-NEXT-10B / DPRO NEXT CATALOG' systems.html
          grep -q 'KSH-NEXT完成版' systems.html
          grep -q 'DPRO NEXT完成版を見る' systems.html

          for OLD in \
            'step-ksh-phone-2' \
            'step-ksh-phone-3' \
            'step-ksh-brush-5' \
            'step-ksh-brush-6b' \
            'step-ksh-brush-9'
          do
            if grep -q "$OLD" systems/car-service.html; then
              echo "Old KSH URL marker remains in product page: $OLD"
              exit 1
            fi
          done

          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from collections import Counter
          import re

          class Parser(HTMLParser):
              pass

          for filename in ["systems/car-service.html", "systems.html"]:
              text = Path(filename).read_text(encoding="utf-8")
              parser = Parser()
              parser.feed(text)
              parser.close()

              ids = re.findall(r'\bid=["\']([^"\']+)["\']', text)
              duplicates = sorted(key for key, count in Counter(ids).items() if count > 1)
              if duplicates:
                  raise SystemExit(f"{filename} duplicate IDs: {', '.join(duplicates)}")

              if "http://" in text:
                  raise SystemExit(f"insecure HTTP URL detected: {filename}")

          product = Path("systems/car-service.html").read_text(encoding="utf-8")
          catalog = Path("systems.html").read_text(encoding="utf-8")

          required_product = [
              "DPRO NEXT完成版",
              "見積確認・承認",
              "車両別の整備履歴",
              "期限超過・本日・7日・30日以内",
              "DPRO_KSH_NEXT_operation_experience_sheet_20260723.pdf",
          ]
          for marker in required_product:
              if marker not in product:
                  raise SystemExit(f"product marker missing: {marker}")

          if catalog.count('href="systems/car-service.html"') != 1:
              raise SystemExit("catalog must contain exactly one car-service card")

          if catalog.count("KSH-NEXT完成版") != 1:
              raise SystemExit("catalog KSH-NEXT completion badge count is invalid")

          print("Product page and catalog static HTML validation OK")
          PY

          python3 <<'PY'
          from pathlib import Path
          import re

          text = Path("systems/car-service.html").read_text(encoding="utf-8")
          urls = sorted(set(re.findall(r'https://[^"\s<>]+', text)))
          expected_hosts = {
              "dpromstk2000-lab.github.io",
              "lin.ee",
          }
          for url in urls:
              host = url.split("/", 3)[2]
              if host not in expected_hosts:
                  raise SystemExit(f"unexpected external host: {url}")
          print("External URL host allowlist OK:", len(urls))
          PY

          echo "KSH-NEXT-10B static validation passed."

      - name: Verify DPRO NEXT source URLs
        shell: bash
        run: |
          set -euo pipefail

          URLS=(
            "https://dpromstk2000-lab.github.io/line-shaken-liff/index-product-demo.html?v=step-ksh-next-10"
            "https://dpromstk2000-lab.github.io/line-shaken-liff/index.html?v=step-ksh-next-10"
            "https://dpromstk2000-lab.github.io/line-shaken-liff/member.html?demo=1&v=step-ksh-next-7"
            "https://dpromstk2000-lab.github.io/line-shaken-liff/dashboard.html?embed_demo=1&v=step-ksh-next-8"
            "https://dpromstk2000-lab.github.io/line-shaken-liff/owner-ipad.html?embed_demo=1&v=step-ksh-next-6"
            "https://dpromstk2000-lab.github.io/line-shaken-liff/system-check.html?v=step-ksh-next-9"
            "https://dpromstk2000-lab.github.io/line-shaken-liff/deliverables/ksh-next-10/DPRO_KSH_NEXT_operation_experience_sheet_20260723.pdf"
          )

          for URL in "${URLS[@]}"; do
            CODE="$(curl -L --silent --show-error --output /tmp/ksh-next-10b-body --write-out '%{http_code}' --max-time 30 "$URL")"
            if [ "$CODE" != "200" ]; then
              echo "Public source URL failed: HTTP $CODE $URL"
              exit 1
            fi

            BYTES="$(wc -c < /tmp/ksh-next-10b-body)"
            if [ "$BYTES" -lt 1000 ]; then
              echo "Public source URL response is too small: $BYTES bytes $URL"
              exit 1
            fi

            echo "OK $CODE / $BYTES bytes / $URL"
          done

          PDF_TYPE="$(curl -L --silent --show-error --head --max-time 30 \
            "https://dpromstk2000-lab.github.io/line-shaken-liff/deliverables/ksh-next-10/DPRO_KSH_NEXT_operation_experience_sheet_20260723.pdf" \
            | tr -d '\r' | grep -i '^content-type:' | tail -1 || true)"

          if ! echo "$PDF_TYPE" | grep -qi 'application/pdf'; then
            echo "Operation sheet content type is not application/pdf: $PDF_TYPE"
            exit 1
          fi

          echo "All DPRO NEXT source URLs and operation sheet are public."

      - name: Publish product site candidate
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "DPRO STEP KSH-NEXT-10B SITE"
          git config user.email "actions@users.noreply.github.com"

          git add systems/car-service.html systems.html .dpro/ksh-next/ksh-next-10b-site-result.yml

          if git diff --cached --quiet; then
            echo "Candidate changes are already committed. Continue with public verification."
          else
            git commit -m "STEP KSH-NEXT-10B publish DPRO NEXT car service page candidate"
            git push origin HEAD:main
          fi

      - name: Wait for GitHub Pages publication
        shell: bash
        run: |
          set -euo pipefail

          PRODUCT_URL="https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/car-service.html?v=ksh-next-10b-${{ github.run_id }}"
          CATALOG_URL="https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems.html?v=ksh-next-10b-${{ github.run_id }}"

          PRODUCT_OK=0
          CATALOG_OK=0

          for ATTEMPT in $(seq 1 72); do
            echo "Public deployment check $ATTEMPT/72"

            PRODUCT_BODY="$(curl -L --silent --show-error --max-time 30 "$PRODUCT_URL" || true)"
            CATALOG_BODY="$(curl -L --silent --show-error --max-time 30 "$CATALOG_URL" || true)"

            if echo "$PRODUCT_BODY" | grep -q 'STEP KSH-NEXT-10B / DPRO NEXT PRODUCT SITE' \
              && echo "$PRODUCT_BODY" | grep -q 'DPRO_KSH_NEXT_operation_experience_sheet_20260723.pdf' \
              && echo "$PRODUCT_BODY" | grep -q 'step-ksh-next-8' \
              && echo "$PRODUCT_BODY" | grep -q 'step-ksh-next-6' \
              && echo "$PRODUCT_BODY" | grep -q 'step-ksh-next-7'; then
              PRODUCT_OK=1
            fi

            if echo "$CATALOG_BODY" | grep -q 'STEP KSH-NEXT-10B / DPRO NEXT CATALOG' \
              && echo "$CATALOG_BODY" | grep -q 'KSH-NEXT完成版' \
              && echo "$CATALOG_BODY" | grep -q 'DPRO NEXT完成版を見る'; then
              CATALOG_OK=1
            fi

            if [ "$PRODUCT_OK" = "1" ] && [ "$CATALOG_OK" = "1" ]; then
              echo "DPRO product page and catalog are publicly deployed."
              exit 0
            fi

            sleep 5
          done

          echo "Public deployment did not expose all KSH-NEXT-10B markers within 6 minutes."
          echo "PRODUCT_OK=$PRODUCT_OK CATALOG_OK=$CATALOG_OK"
          exit 1

      - name: Finalize KSH-NEXT-10B product site
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import json

          result_path = Path(".dpro/ksh-next/ksh-next-10b-site-result.yml")
          text = result_path.read_text(encoding="utf-8")

          old = '  status: "candidate_pending_public_check"'
          new = '  status: "completed_public_check_passed"'

          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit("KSH-NEXT-10B site result status marker is missing")

          text += (
              "\npublic_verification:\n"
              "  product_page_http_200: true\n"
              "  catalog_http_200: true\n"
              "  product_marker_verified: true\n"
              "  catalog_marker_verified: true\n"
              "  source_demo_urls_http_200: true\n"
              "  operation_sheet_pdf_http_200: true\n"
              "  operation_sheet_content_type_pdf: true\n"
              f"  verified_at_utc: {json.dumps(datetime.now(timezone.utc).isoformat())}\n"
              "completion:\n"
              '  product_site_publication: "completed"\n'
              '  final_source_repository_sync: "pending"\n'
          )
          result_path.write_text(text, encoding="utf-8")
          print("KSH-NEXT-10B product-site result finalized")
          PY

          rm -f ".github/workflows/step-ksh-next-10b-product-site.yml"

          git config user.name "DPRO STEP KSH-NEXT-10B SITE FINAL"
          git config user.email "actions@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No finalization changes to commit."
            exit 1
          fi

          git commit -m "STEP KSH-NEXT-10B complete public product site verification"
          git push origin HEAD:main
