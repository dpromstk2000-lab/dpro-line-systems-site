name: STEP KSH-NEXT-10B Product Site Publication

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-ksh-next-10b-product-site.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-ksh-next-10b-product-site
  cancel-in-progress: false

jobs:
  product-site-publication:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Checkout product site main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Save pre-change commit
        shell: bash
        run: |
          set -euo pipefail
          echo "BEFORE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Verify current product page
        shell: bash
        run: |
          set -euo pipefail

          test -f systems.html
          test -f systems/car-service.html
          test -f styles.css
          test -f script.js

          grep -q 'href="systems/car-service.html"' systems.html
          grep -q 'DPRO 車検・整備 LINE' systems/car-service.html
          grep -q 'step-ksh-phone-2' systems/car-service.html
          grep -q 'step-ksh-phone-3' systems/car-service.html
          grep -q 'step-ksh-brush-6b' systems/car-service.html
          grep -q 'step-ksh-phone-2' systems.html

          if grep -q 'STEP KSH-NEXT-10B / DPRO NEXT PRODUCT SITE' systems/car-service.html; then
            echo "KSH-NEXT-10B candidate is already applied. Continue with validation and publication."
          fi

          echo "Current vehicle service product page and catalog card verified."

      - name: Create safety tag
        shell: bash
        run: |
          set -euo pipefail

          BACKUP_TAG="ksh-next-10b-site-before-${{ github.run_id }}"
          git tag "$BACKUP_TAG" "$BEFORE_SHA"
          git push origin "$BACKUP_TAG"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"

      - name: Apply DPRO NEXT product site
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import hashlib
          import json
          import re

          product_path = Path("systems/car-service.html")
          catalog_path = Path("systems.html")
          result_path = Path(".dpro/ksh-next/ksh-next-10b-site-result.yml")
          result_path.parent.mkdir(parents=True, exist_ok=True)

          SYSTEM_BASE = "https://dpromstk2000-lab.github.io/line-shaken-liff"
