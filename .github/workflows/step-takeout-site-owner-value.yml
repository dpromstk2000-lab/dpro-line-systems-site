name: STEP TAKEOUT Site Owner Value

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/step-takeout-site-owner-value.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-takeout-site-owner-value
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Confirm repository
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "dpromstk2000-lab/dpro-line-systems-site"

      - name: Replace internal check with owner value
        shell: bash
        env:
          OLD_CARD_B64: ""
          NEW_CARD_B64: ""
          OLD_PROOF_B64: ""
          NEW_PROOF_B64: ""
        run: |
          set -euo pipefail
          python3 - <<'PY2'
          from pathlib import Path
          import base64, os
          path=Path('systems/takeout.html')
          text=path.read_text(encoding='utf-8')
          old_card=base64.b64decode(os.environ['OLD_CARD_B64']).decode('utf-8')
          new_card=base64.b64decode(os.environ['NEW_CARD_B64']).decode('utf-8')
          old_proof=base64.b64decode(os.environ['OLD_PROOF_B64']).decode('utf-8')
          new_proof=base64.b64decode(os.environ['NEW_PROOF_B64']).decode('utf-8')
          if new_card not in text:
              if old_card not in text:
                  raise SystemExit('差し替え対象が見つからないため安全停止しました。')
              text=text.replace(old_card,new_card,1)
          if new_proof not in text:
              if old_proof not in text:
                  raise SystemExit('下部リンクの差し替え対象が見つからないため安全停止しました。')
              text=text.replace(old_proof,new_proof,1)
          path.write_text(text,encoding='utf-8',newline='\n')
          PY2

      - name: Validate public product page
        shell: bash
        run: |
          set -euo pipefail
          test -s systems/takeout.html
          grep -Fq "03 / MY PAGE &amp; REPEAT ORDER" systems/takeout.html
          grep -Fq "マイページ・再注文" systems/takeout.html
          grep -Fq "受取日時変更・キャンセル" systems/takeout.html
          grep -Fq "member.html?preview=1&amp;v=takeout-site-owner-value" systems/takeout.html
          ! grep -Fq "system-check.html" systems/takeout.html
          ! grep -Fq "最終システムチェック" systems/takeout.html
          python3 - <<'PY2'
          from html.parser import HTMLParser
          from pathlib import Path
          import sys
          class Checker(HTMLParser):
              def __init__(self): super().__init__(); self.ids=[]
              def handle_starttag(self,tag,attrs):
                  self.ids += [v for k,v in attrs if k=='id' and v]
          text=Path('systems/takeout.html').read_text(encoding='utf-8')
          p=Checker(); p.feed(text)
          dup=sorted({x for x in p.ids if p.ids.count(x)>1})
          if dup or not text.lower().rstrip().endswith('</html>'):
              print('HTML validation failed',dup); sys.exit(1)
          print('公開ページ検査OK')
          PY2

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- systems/takeout.html; then
            echo "すでに最新版です。"
            exit 0
          fi
          git config user.name "DPRO GitHub Actions"
          git config user.email "actions@users.noreply.github.com"
          git add systems/takeout.html
          git commit -m "Replace takeout system check with member reorder showcase"
          git push origin HEAD:main

      - name: Summary
        shell: bash
        run: |
          {
            echo "## DPRO Takeout owner-facing page updated"
            echo "- Removed: 最終システムチェック"
            echo "- Added: マイページ・再注文"
            echo "- Internal system-check.html remains in the takeout system repository"
            echo "- Product page: https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/takeout.html?v=takeout-owner-value"
          } >> "$GITHUB_STEP_SUMMARY"
