name: DPRO ESTATE NEXT-10 Product Site

'on':
  push:
    branches: [main]
    paths:
      - .github/workflows/estate-next-10-product-site.yml
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dpro-product-site-estate-next-10
  cancel-in-progress: false

jobs:
  estate-next-10-product-site:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TARGET_BRANCH: main
      WORKFLOW_PATH: .github/workflows/estate-next-10-product-site.yml
      STEP_BACKUP_TAG: dpro-product-site-estate-next10-before-20260724
      SITE_BASE: https://dpromstk2000-lab.github.io/dpro-line-systems-site
      ESTATE_BASE: https://dpromstk2000-lab.github.io/dpro-estate-line-liff
      OPERATION_PDF: https://dpromstk2000-lab.github.io/dpro-estate-line-liff/assets/estate-next-10/dpro-estate-operation-experience.pdf
      OPERATION_PNG: https://dpromstk2000-lab.github.io/dpro-estate-line-liff/assets/estate-next-10/dpro-estate-operation-experience.png

    steps:
      - name: Checkout product site repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify estate final assets and create backup
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          curl --fail --silent --show-error "$OPERATION_PDF?v=${GITHUB_RUN_ID}" -o /tmp/estate-operation.pdf
          curl --fail --silent --show-error "$OPERATION_PNG?v=${GITHUB_RUN_ID}" -o /tmp/estate-operation.png
          test "$(stat -c %s /tmp/estate-operation.pdf)" -gt 100000
          test "$(stat -c %s /tmp/estate-operation.png)" -gt 100000

          if git rev-parse -q --verify "refs/tags/$STEP_BACKUP_TAG" >/dev/null 2>&1; then
            backup_commit="$(git rev-parse "$STEP_BACKUP_TAG^{commit}")"
            git merge-base --is-ancestor "$backup_commit" HEAD || { echo 'ERROR: product-site backup tag is not an ancestor of main.' >&2; exit 1; }
            mapfile -t changed_since_backup < <(git diff --name-only "$backup_commit"..HEAD)
            for file in "${changed_since_backup[@]}"; do
              case "$file" in
                "$WORKFLOW_PATH"|systems/estate.html|systems.html|dpro-next/estate-next-10-product-site.yml) ;;
                *) echo "ERROR: unexpected file changed after product-site backup: $file" >&2; exit 1;;
              esac
            done
            echo "Reusing product-site backup tag at $backup_commit"
          else
            tag_commit="$(git rev-parse HEAD)"
            while true; do
              mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r "$tag_commit")
              only_workflow=true
              if [ "${#changed[@]}" -eq 0 ]; then only_workflow=false; fi
              for file in "${changed[@]}"; do
                if [ "$file" != "$WORKFLOW_PATH" ]; then only_workflow=false; break; fi
              done
              if [ "$only_workflow" = false ]; then break; fi
              tag_commit="$(git rev-parse "$tag_commit^")"
            done
            git tag -a "$STEP_BACKUP_TAG" "$tag_commit" -m 'DPRO product site before ESTATE NEXT-10'
            git push origin "$STEP_BACKUP_TAG"
          fi

      - name: Install HTML and browser verification tools
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m pip install --disable-pip-version-check beautifulsoup4 playwright
          python3 -m playwright install --with-deps chromium

      - name: Replace estate product page and update catalog card
        shell: bash
        env:
          ESTATE_PAGE_TEMPLATE_B64: 
        run: |
          set -Eeuo pipefail
          python3 - <<'PY_SITE'
          from pathlib import Path
          from bs4 import BeautifulSoup, Comment
          import base64, os

          estate_base = 'https://dpromstk2000-lab.github.io/dpro-estate-line-liff'
          replacements = {
              '{{PDF_URL}}': f'{estate_base}/assets/estate-next-10/dpro-estate-operation-experience.pdf',
              '{{PNG_URL}}': f'{estate_base}/assets/estate-next-10/dpro-estate-operation-experience.png',
              '{{CUSTOMER_URL}}': f'{estate_base}/index.html?demo=1&v=estate-next-10',
              '{{PROPERTY_URL}}': f'{estate_base}/property.html?demo=1&v=estate-next-10',
              '{{OWNER_URL}}': f'{estate_base}/owner.html?demo=1&v=estate-next-10',
              '{{IPAD_URL}}': f'{estate_base}/owner-ipad.html?demo=1&v=estate-next-10',
              '{{FOLLOWUP_URL}}': f'{estate_base}/followup.html?demo=1&v=estate-next-10',
              '{{CHECK_URL}}': f'{estate_base}/system-check.html?demo=1&v=estate-next-10',
          }
          page = base64.b64decode(os.environ['ESTATE_PAGE_TEMPLATE_B64']).decode('utf-8')
          for old,new in replacements.items(): page=page.replace(old,new)
          import re
          if re.search(r'\{\{[A-Z_]+\}\}', page): raise SystemExit('ERROR: unresolved product page placeholder.')
          Path('systems/estate.html').write_text(page,encoding='utf-8')

          catalog_path=Path('systems.html')
          soup=BeautifulSoup(catalog_path.read_text(encoding='utf-8'),'html.parser')
          card=soup.find('a',href='systems/estate.html')
          if card is None: raise SystemExit('ERROR: estate catalog card was not found.')
          customer_url=replacements['{{CUSTOMER_URL}}']
          fragment=BeautifulSoup(
              '<a class="catalog-card reveal is-live" href="systems/estate.html">'
              '<div class="catalog-card-top"><span class="catalog-code">ER</span><span class="catalog-status">DPRO NEXT完成版</span></div>'
              '<div class="catalog-visual catalog-live-visual"><iframe title="DPRO不動産NEXT実画面プレビュー" loading="lazy" src="'+customer_url+'"></iframe><span class="catalog-live-badge">ESTATE NEXT-10完成</span></div>'
              '<div class="catalog-card-copy"><small>住まい・建築</small><h3>不動産・賃貸内見</h3><p>希望条件・内見予約・案件申込・初期費用・必要書類・再相談・追客・物件候補提案。</p><b class="catalog-card-cta">DPRO NEXT完成版を見る →</b></div></a>',
              'html.parser').a
          card.replace_with(fragment)
          soup.body.insert(0,Comment(' STEP ESTATE-NEXT-10 / ESTATE NEXT CATALOG / 20260724 '))
          catalog_path.write_text(str(soup),encoding='utf-8')

          Path('dpro-next').mkdir(exist_ok=True)
          Path('dpro-next/estate-next-10-product-site.yml').write_text('\n'.join([
              'step: ESTATE-NEXT-10-PRODUCT-SITE','status: PREPARED','product_page: systems/estate.html','catalog: systems.html',
              'operation_sheet_pdf: '+replacements['{{PDF_URL}}'],'operation_sheet_png: '+replacements['{{PNG_URL}}'],
              'worker_changed: false','supabase_changed: false','api_changed: false',''
          ]),encoding='utf-8')
          PY_SITE

      - name: Validate product page catalog and URLs
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY_VALIDATE'
          from pathlib import Path
          from bs4 import BeautifulSoup
          from collections import Counter
          for name in ['systems/estate.html','systems.html']:
              text=Path(name).read_text(encoding='utf-8')
              soup=BeautifulSoup(text,'html.parser')
              ids=[node.get('id') for node in soup.find_all(id=True)]
              dup=[key for key,count in Counter(ids).items() if count>1]
              if dup: raise SystemExit(f'ERROR: duplicate ids in {name}: {dup}')
          estate=Path('systems/estate.html').read_text(encoding='utf-8')
          catalog=Path('systems.html').read_text(encoding='utf-8')
          required=['STEP ESTATE-NEXT-10','DPRO NEXT完成版','dpro-estate-operation-experience.pdf','followup.html?demo=1','system-check.html?demo=1']
          missing=[value for value in required if value not in estate]
          if missing: raise SystemExit(f'ERROR: estate product page missing {missing}')
          if 'v=estate-12' in estate: raise SystemExit('ERROR: old estate-12 URL remains.')
          if 'ESTATE NEXT-10完成' not in catalog: raise SystemExit('ERROR: catalog was not updated.')
          soup=BeautifulSoup(catalog,'html.parser')
          if len(soup.find_all('a',href='systems/estate.html')) != 1: raise SystemExit('ERROR: estate card count invalid.')
          print('Product site static validation PASS')
          PY_VALIDATE

      - name: Commit product site update
        shell: bash
        run: |
          set -Eeuo pipefail
          git add systems/estate.html systems.html dpro-next/estate-next-10-product-site.yml
          if ! git diff --cached --quiet; then
            git commit -m 'Publish DPRO ESTATE NEXT-10 product site'
            git push origin "$TARGET_BRANCH"
          else
            echo 'Product page and catalog are already prepared.'
          fi

      - name: Wait for publication and run desktop mobile visual checks
        shell: bash
        run: |
          set -Eeuo pipefail
          for attempt in $(seq 1 36); do
            body="$(curl --silent --show-error "$SITE_BASE/systems/estate.html?v=estate-next-10-${GITHUB_RUN_ID}" || true)"
            catalog="$(curl --silent --show-error "$SITE_BASE/systems.html?v=estate-next-10-${GITHUB_RUN_ID}" || true)"
            if grep -q 'STEP ESTATE-NEXT-10' <<<"$body" && grep -q 'ESTATE NEXT-10完成' <<<"$catalog"; then break; fi
            if [ "$attempt" = '36' ]; then echo 'ERROR: product site publication timeout.' >&2; exit 1; fi
            sleep 10
          done
          python3 - <<'PY_VISUAL'
          from playwright.sync_api import sync_playwright
          url='https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/estate.html?v=estate-next-10'
          with sync_playwright() as p:
              browser=p.chromium.launch(headless=True,args=['--no-sandbox'])
              for name,width,height in [('desktop',1440,1000),('mobile',390,844)]:
                  page=browser.new_page(viewport={'width':width,'height':height})
                  response=page.goto(url,wait_until='domcontentloaded',timeout=120000)
                  if response is None or response.status>=400: raise RuntimeError(f'{name} HTTP failure')
                  page.wait_for_timeout(5000)
                  overflow=page.evaluate('document.documentElement.scrollWidth - window.innerWidth')
                  if overflow>3: raise RuntimeError(f'{name} horizontal overflow: {overflow}')
                  if page.locator('text=DPRO NEXT完成版').count()==0: raise RuntimeError(f'{name} completion badge missing')
                  page.screenshot(path=f'/tmp/estate-product-{name}.png',full_page=False)
                  page.close()
              browser.close()
          PY_VISUAL

      - name: Record product site completion
        shell: bash
        run: |
          set -Eeuo pipefail
          completed_at="$(TZ=Asia/Tokyo date '+%Y-%m-%dT%H:%M:%S%:z')"
          cat > dpro-next/estate-next-10-product-site.yml <<EOF_SITE
          step: ESTATE-NEXT-10-PRODUCT-SITE
          status: COMPLETE
          completed_at_jst: "$completed_at"
          product_page: $SITE_BASE/systems/estate.html
          catalog: $SITE_BASE/systems.html
          operation_sheet_pdf: $OPERATION_PDF
          operation_sheet_png: $OPERATION_PNG
          desktop_visual_check: PASS
          mobile_visual_check: PASS
          horizontal_overflow_check: PASS
          old_estate_12_urls_removed: true
          worker_changed: false
          supabase_changed: false
          api_changed: false
          EOF_SITE
          git add dpro-next/estate-next-10-product-site.yml
          if ! git diff --cached --quiet; then
            git commit -m 'Complete DPRO ESTATE NEXT-10 product site verification'
            git push origin "$TARGET_BRANCH"
          else
            echo 'Product-site completion ledger is already current.'
          fi

      - name: Delete workflow and commit completion
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$WORKFLOW_PATH"
          git add -A "$WORKFLOW_PATH"
          git commit -m 'Remove completed ESTATE NEXT-10 product site workflow'
          git push origin "$TARGET_BRANCH"

      - name: Publish completion summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF_SUMMARY
          # ESTATE NEXT-10 PRODUCT SITE COMPLETE

          | 項目 | 結果 |
          |---|---|
          | 不動産製品ページ | PASS |
          | 製品一覧カード | PASS |
          | 操作体験シートPDF・PNG | PASS |
          | Desktop表示 | PASS |
          | Mobile表示 | PASS |
          | 横スクロール | PASS |
          | 古いestate-12 URL | 削除済み |

          次に不動産リポジトリのESTATE-NEXT-10を mode=verify で実行してください。
          EOF_SUMMARY
