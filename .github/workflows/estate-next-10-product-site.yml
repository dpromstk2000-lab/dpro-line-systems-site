name: DPRO ESTATE NEXT-10 Product Site R2 Mobile Safe

'on':
  push:
    branches: [main]
    paths:
      - .github/workflows/estate-next-10-product-site.yml
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dpro-product-site-estate-next-10
  cancel-in-progress: false

jobs:
  estate-next-10-product-site-r2:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TARGET_BRANCH: main
      WORKFLOW_PATH: .github/workflows/estate-next-10-product-site.yml
      STEP_BACKUP_TAG: dpro-product-site-estate-next10-before-20260724
      SITE_BASE: https://dpromstk2000-lab.github.io/dpro-line-systems-site
      OPERATION_PDF: https://dpromstk2000-lab.github.io/dpro-estate-line-liff/assets/estate-next-10/dpro-estate-operation-experience.pdf
      OPERATION_PNG: https://dpromstk2000-lab.github.io/dpro-estate-line-liff/assets/estate-next-10/dpro-estate-operation-experience.png

    steps:
      - name: Checkout product site repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify prepared product site and protected backup
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          test -f systems/estate.html
          test -f systems.html
          test -f dpro-next/estate-next-10-product-site.yml
          grep -q 'STEP ESTATE-NEXT-10' systems/estate.html
          grep -q 'ESTATE NEXT-10完成' systems.html
          grep -q 'status: PREPARED' dpro-next/estate-next-10-product-site.yml

          curl --fail --silent --show-error "$OPERATION_PDF?v=${GITHUB_RUN_ID}" -o /tmp/estate-operation.pdf
          curl --fail --silent --show-error "$OPERATION_PNG?v=${GITHUB_RUN_ID}" -o /tmp/estate-operation.png
          test "$(stat -c %s /tmp/estate-operation.pdf)" -gt 100000
          test "$(stat -c %s /tmp/estate-operation.png)" -gt 100000

          if git rev-parse -q --verify "refs/tags/$STEP_BACKUP_TAG" >/dev/null 2>&1; then
            backup_commit="$(git rev-parse "$STEP_BACKUP_TAG^{commit}")"
            git merge-base --is-ancestor "$backup_commit" HEAD || {
              echo 'ERROR: product-site backup tag is not an ancestor of main.' >&2
              exit 1
            }
            mapfile -t changed_since_backup < <(git diff --name-only "$backup_commit"..HEAD)
            for file in "${changed_since_backup[@]}"; do
              case "$file" in
                "$WORKFLOW_PATH"|systems/estate.html|systems.html|dpro-next/estate-next-10-product-site.yml) ;;
                *) echo "ERROR: unexpected file changed after product-site backup: $file" >&2; exit 1 ;;
              esac
            done
            echo "Reusing protected product-site backup: $backup_commit"
          else
            tag_commit="$(git rev-parse HEAD)"
            while true; do
              mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r "$tag_commit")
              only_workflow=true
              if [ "${#changed[@]}" -eq 0 ]; then only_workflow=false; fi
              for file in "${changed[@]}"; do
                if [ "$file" != "$WORKFLOW_PATH" ]; then only_workflow=false; break; fi
              done
              if [ "$only_workflow" = false ]; then break; fi
              tag_commit="$(git rev-parse "$tag_commit^")"
            done
            git tag -a "$STEP_BACKUP_TAG" "$tag_commit" -m 'DPRO product site before ESTATE NEXT-10'
            git push origin "$STEP_BACKUP_TAG"
          fi

      - name: Install browser verification tools
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m pip install --disable-pip-version-check beautifulsoup4 playwright
          python3 -m playwright install --with-deps chromium

      - name: Apply estate mobile overflow correction
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY_PATCH'
          from pathlib import Path
          import re

          path = Path('systems/estate.html')
          text = path.read_text(encoding='utf-8')
          if 'STEP ESTATE-NEXT-10' not in text:
              raise SystemExit('ERROR: ESTATE NEXT-10 product page marker is missing.')

          style = r'''<style id="estate-next-10-r2-mobile-safe">
          /* ESTATE-NEXT-10-R2-MOBILE-SAFE
             The hero uses intentional absolute device previews. Keep those previews
             inside the mobile viewport and prevent a visual decoration from creating
             page-level horizontal scrolling. */
          html,body{max-width:100%;overflow-x:clip}
          body>header,body>main,body>footer{max-width:100%;overflow-x:clip}
          @media(max-width:560px){
            .product-hero{width:100%;max-width:100%;grid-template-columns:minmax(0,1fr);overflow:hidden}
            .product-hero-copy,.product-visual,.product-visual-live,.hero-actions,
            .live-showcase,.live-product,.live-copy,.live-device,
            .feature-showcase-grid,.feature-showcase-card,.feature-showcase-copy,
            .feature-showcase-screen,.estate-sheet-grid,.estate-sheet-preview,
            .product-proof-inner,.contact-card{min-width:0;max-width:100%}
            .product-visual-live{overflow:hidden}
            .hero-live-monitor{left:22px;right:0}
            .hero-live-phone{left:0}
            .hero-live-tablet{right:0}
            .hero-actions,.live-actions{width:100%;display:grid;grid-template-columns:minmax(0,1fr)}
            .hero-actions .button,.live-actions .button{
              width:100%;max-width:100%;min-width:0;padding-left:18px;padding-right:18px;
              text-align:center;white-space:normal;overflow-wrap:anywhere
            }
            .live-device,.live-desktop,.live-tablet{max-width:100%;min-width:0;margin-left:0}
            .feature-showcase-screen.desktop,.feature-showcase-screen.tablet{width:100%;max-width:100%}
            .estate-sheet-preview{padding:12px}
            .estate-sheet-preview img{max-width:100%;height:auto}
            .product-hero h1,.product-hero h2,.section-heading h2,.live-copy h3,
            .feature-showcase-copy h3,.contact-card h2{max-width:100%;overflow-wrap:anywhere}
            .screen-modal,.screen-modal-dialog{max-width:100%}
          }
          </style>'''

          text = re.sub(
              r'<style id="estate-next-10-r2-mobile-safe">.*?</style>',
              '',
              text,
              flags=re.S,
          )
          if '</head>' not in text:
              raise SystemExit('ERROR: closing head tag was not found.')
          text = text.replace('</head>', style + '\n</head>', 1)
          path.write_text(text, encoding='utf-8')
          PY_PATCH

      - name: Validate R2 HTML CSS IDs URLs and preserved content
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY_VALIDATE'
          from pathlib import Path
          from bs4 import BeautifulSoup
          from collections import Counter

          estate = Path('systems/estate.html').read_text(encoding='utf-8')
          catalog = Path('systems.html').read_text(encoding='utf-8')
          soup = BeautifulSoup(estate, 'html.parser')
          ids = [node.get('id') for node in soup.find_all(id=True)]
          duplicate_ids = [key for key,count in Counter(ids).items() if count > 1]
          if duplicate_ids:
              raise SystemExit(f'ERROR: duplicate ids in estate product page: {duplicate_ids}')

          required = [
              'STEP ESTATE-NEXT-10',
              'DPRO NEXT完成版',
              'dpro-estate-operation-experience.pdf',
              'dpro-estate-operation-experience.png',
              'followup.html?demo=1',
              'system-check.html?demo=1',
              'estate-next-10-r2-mobile-safe',
              'overflow-x:clip',
              '.hero-live-monitor{left:22px;right:0}',
          ]
          missing = [value for value in required if value not in estate]
          if missing:
              raise SystemExit(f'ERROR: R2 estate product page missing: {missing}')
          if estate.count('id="estate-next-10-r2-mobile-safe"') != 1:
              raise SystemExit('ERROR: R2 mobile style count is invalid.')
          if 'v=estate-12' in estate:
              raise SystemExit('ERROR: old estate-12 URL remains.')
          if catalog.count('href="systems/estate.html"') != 1:
              raise SystemExit('ERROR: estate catalog card count is invalid.')
          if 'ESTATE NEXT-10完成' not in catalog:
              raise SystemExit('ERROR: ESTATE NEXT catalog card is missing.')
          print('R2 static validation PASS')
          PY_VALIDATE

      - name: Commit R2 mobile correction
        shell: bash
        run: |
          set -Eeuo pipefail
          git add systems/estate.html
          if ! git diff --cached --quiet; then
            git commit -m 'Fix ESTATE NEXT-10 mobile product page overflow'
            git push origin "$TARGET_BRANCH"
          else
            echo 'R2 mobile correction is already applied.'
          fi

      - name: Wait for publication and run labeled visual diagnostics
        shell: bash
        run: |
          set -Eeuo pipefail
          for attempt in $(seq 1 36); do
            body="$(curl --silent --show-error "$SITE_BASE/systems/estate.html?v=estate-next-10-r2-${GITHUB_RUN_ID}" || true)"
            if grep -q 'estate-next-10-r2-mobile-safe' <<<"$body"; then break; fi
            if [ "$attempt" = '36' ]; then
              echo 'ERROR: R2 product page publication timeout.' >&2
              exit 1
            fi
            sleep 10
          done

          python3 - <<'PY_VISUAL'
          from playwright.sync_api import sync_playwright
          import json

          url = 'https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/estate.html?v=estate-next-10-r2'
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True, args=['--no-sandbox'])
              for name,width,height in [
                  ('desktop',1440,1000),
                  ('tablet',1024,1366),
                  ('mobile',390,844),
              ]:
                  page = browser.new_page(viewport={'width':width,'height':height})
                  response = page.goto(url, wait_until='domcontentloaded', timeout=120000)
                  if response is None or response.status >= 400:
                      raise RuntimeError(f'{name} HTTP failure')
                  page.wait_for_timeout(5000)
                  result = page.evaluate('''() => {
                    const viewport = document.documentElement.clientWidth;
                    const overflow = document.documentElement.scrollWidth - window.innerWidth;
                    const offenders = [...document.querySelectorAll('body *')].map((el) => {
                      const r = el.getBoundingClientRect();
                      return {
                        tag: el.tagName,
                        id: el.id || '',
                        className: typeof el.className === 'string' ? el.className : '',
                        left: Math.round(r.left * 10) / 10,
                        right: Math.round(r.right * 10) / 10,
                        width: Math.round(r.width * 10) / 10,
                      };
                    }).filter((item) => item.right > viewport + 3 || item.left < -3).slice(0,20);
                    return {overflow,viewport,offenders};
                  }''')
                  print(f'{name} visual result: ' + json.dumps(result, ensure_ascii=False))
                  if result['overflow'] > 3:
                      raise RuntimeError(f"{name} horizontal overflow: {result['overflow']}")
                  if page.locator('text=DPRO NEXT完成版').count() == 0:
                      raise RuntimeError(f'{name} completion badge missing')
                  page.screenshot(path=f'/tmp/estate-product-r2-{name}.png', full_page=False)
                  page.close()
              browser.close()
          PY_VISUAL

      - name: Record product site completion
        shell: bash
        run: |
          set -Eeuo pipefail
          completed_at="$(TZ=Asia/Tokyo date '+%Y-%m-%dT%H:%M:%S%:z')"
          cat > dpro-next/estate-next-10-product-site.yml <<EOF_SITE
          step: ESTATE-NEXT-10-PRODUCT-SITE
          status: COMPLETE
          verification_revision: R2
          completed_at_jst: "$completed_at"
          product_page: $SITE_BASE/systems/estate.html
          catalog: $SITE_BASE/systems.html
          operation_sheet_pdf: $OPERATION_PDF
          operation_sheet_png: $OPERATION_PNG
          desktop_visual_check: PASS
          tablet_visual_check: PASS
          mobile_visual_check: PASS
          horizontal_overflow_check: PASS
          old_estate_12_urls_removed: true
          worker_changed: false
          supabase_changed: false
          api_changed: false
          EOF_SITE
          git add dpro-next/estate-next-10-product-site.yml
          if ! git diff --cached --quiet; then
            git commit -m 'Complete ESTATE NEXT-10 product site R2 verification'
            git push origin "$TARGET_BRANCH"
          else
            echo 'Product-site completion ledger is already current.'
          fi

      - name: Delete workflow and commit completion
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$WORKFLOW_PATH"
          git add -A "$WORKFLOW_PATH"
          if ! git diff --cached --quiet; then
            git commit -m 'Remove completed ESTATE NEXT-10 product site workflow'
            git push origin "$TARGET_BRANCH"
          else
            echo 'Workflow is already removed.'
          fi

      - name: Publish completion summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF_SUMMARY'
          # ESTATE NEXT-10 PRODUCT SITE R2 COMPLETE

          | 項目 | 結果 |
          |---|---|
          | 不動産製品ページ | PASS |
          | 製品一覧カード | PASS |
          | 操作体験シートPDF・PNG | PASS |
          | Desktop 1440px | PASS |
          | Tablet 1024px | PASS |
          | Mobile 390px | PASS |
          | 横スクロール | PASS |
          | 古いestate-12 URL | 削除済み |

          次に不動産リポジトリのESTATE-NEXT-10を mode=verify で実行してください。
          EOF_SUMMARY
