name: One-time Bakery catalog embed height fix R2

on:
  push:
    paths:
      - '.github/workflows/bakery-site-r2.yml'

permissions:
  contents: write

jobs:
  fix-catalog-embed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix catalog embed height
        shell: python
        run: |
          from pathlib import Path

          page = Path("systems/bakery.html")
          workflow = Path(".github/workflows/bakery-site-r2.yml")
          text = page.read_text(encoding="utf-8")

          replacements = {
              ".bakery-catalog-callout .catalog-screen{min-height:420px;border-radius:24px;overflow:hidden;background:#fff;box-shadow:0 24px 70px rgba(120,53,15,.2)}":
              ".bakery-catalog-callout .bakery-catalog-screen{height:470px;min-height:0;border-radius:24px;overflow:hidden;background:#fff;box-shadow:0 24px 70px rgba(120,53,15,.2)}",
              ".bakery-catalog-callout .catalog-screen{min-height:330px}":
              ".bakery-catalog-callout .bakery-catalog-screen{height:330px;min-height:0}",
              '<div class="catalog-screen">':
              '<div class="bakery-catalog-screen">',
              "<!-- STEP BAKERY-SITE-1 / PHOTO CATALOG & LINE PREORDER / 20260720 -->":
              "<!-- STEP BAKERY-SITE-1-R2 / CATALOG EMBED HEIGHT FIX / 20260720 -->",
          }

          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new, 1)
              elif new not in text:
                  raise SystemExit("required marker not found: " + old[:80])

          checks = {
              "unique class": 'class="bakery-catalog-screen"' in text,
              "desktop height": "height:470px" in text,
              "mobile height": "height:330px" in text,
              "old class removed": 'class="catalog-screen"' not in text,
              "page content preserved": "パンの魅力を写真で伝え、" in text,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit("validation failed: " + ", ".join(failed))

          page.write_text(text, encoding="utf-8")
          workflow.unlink(missing_ok=True)

      - name: Commit fix
        run: |
          git config user.name "DPRO Site Automation"
          git config user.email "actions@users.noreply.github.com"
          git add systems/bakery.html .github/workflows/bakery-site-r2.yml
          git commit -m "STEP BAKERY-SITE-1-R2 fix catalog embed blank space"
          git push
