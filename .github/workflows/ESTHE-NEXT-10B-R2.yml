# STEP: ESTHE-NEXT-10B-R2
# 原因: product-mobile horizontal overflow 540 > 390
# 対象: systems/esthe.html のみ（完成記録を除く）
# 共通styles.css: 変更しない
# 製品一覧カード内容: NEXT-10B完成版を維持
# Worker / Supabase / API: 変更なし
# 検査: HTML、ID、JS、PC1440、スマホ390、スマホ360、一覧カード
# 成功後: 自動Commit、Push、YML自身を削除
name: "DPRO ESTHE NEXT-10B-R2 - Mobile Overflow Fix"
on:
  push:
    branches: [main]
    paths: [".github/workflows/ESTHE-NEXT-10B-R2.yml"]
  workflow_dispatch:
permissions:
  contents: write
  actions: read
concurrency:
  group: "dpro-product-site-esthe-next"
  cancel-in-progress: false
env:
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-10B-R2.yml"
  BACKUP_TAG_PREFIX: "backup-product-site-before-esthe-next10b-r2"
  PRODUCT_PAGE_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/esthe.html"
  CATALOG_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems.html"
jobs:
  fix:
    name: "Fix and verify ESTHE mobile width"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: "Checkout product-site repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: "Configure Git identity"
        run: |
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"
      - name: "Confirm NEXT-10B committed baseline"
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -q 'STEP ESTHE-NEXT-10B' systems/esthe.html
          grep -q 'DPRO NEXT完成版' systems.html
          grep -q 'ESTHE NEXT-10完成' systems.html
          [[ "$(grep -o 'href="systems/esthe.html"' systems.html | wc -l)" -eq 1 ]]
      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          SHA="$GITHUB_SHA"
          mapfile -t FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#FILES[@]}" -eq 1 && "${FILES[0]}" == "$WORKFLOW_FILE" ]]; then SHA="$(git rev-parse "${GITHUB_SHA}^")"; fi
          BASE="${BACKUP_TAG_PREFIX}-$(TZ=Asia/Tokyo date +%Y%m%d)"
          TAG="$BASE"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then TAG="${BASE}-run-${GITHUB_RUN_ID}"; fi
          git tag -a "$TAG" "$SHA" -m "Before ESTHE NEXT-10B-R2"
          git push origin "refs/tags/$TAG"
          echo "BACKUP_TAG=$TAG" >> "$GITHUB_ENV"
      - name: "Apply ESTHE-scoped mobile safety CSS"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<apply>","exec"))'
      - name: "Run static regression validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<validate>","exec"))'
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML OK"' "$WORKFLOW_FILE"
          git diff -- styles.css --exit-code
      - name: "Commit mobile fix and push"
        shell: bash
        run: |
          set -Eeuo pipefail
          git add systems/esthe.html .dpro-next/esthe-next10b-r2.json .dpro-next/esthe-next10b-r2-static.json
          git commit -m "DPRO ESTHE NEXT-10B-R2: fix mobile horizontal overflow"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "FIX_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: "Wait for corrected public product page"
        shell: bash
        run: |
          set -Eeuo pipefail
          OK=false
          for n in $(seq 1 60); do
            BODY="$(curl -L -sS --retry 2 -H 'Cache-Control: no-cache, no-store' "$PRODUCT_PAGE_URL?r2=${FIX_SHA}_${n}" || true)"
            if [[ "$BODY" == *"ESTHE-NEXT-10B-R2-MOBILE-SAFE"* ]]; then OK=true;break;fi
            sleep 10
          done
          [[ "$OK" == true ]] || { echo "::error::R2 publication not confirmed";exit 1; }
      - name: "Install Chromium validation"
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium
      - name: "Verify desktop 390px 360px and catalog"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<visual>","exec"))'
      - name: "Write R2 completion record"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<final>","exec"))'
          grep -q 'current_step: "ESTHE-NEXT-10B-R2-COMPLETE"' .dpro-next/esthe-next10b-r2.yml
          grep -q 'horizontal_overflow: false' .dpro-next/esthe-next10b-r2.yml
      - name: "Upload R2 validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-10B-R2-${{ github.run_id }}"
          path: |
            .next10b-r2-public-artifact/
            .dpro-next/esthe-next10b-r2*.json
            .dpro-next/esthe-next10b-r2*.yml
            .dpro-next/esthe-next10b-r2-report.txt
          if-no-files-found: warn
          retention-days: 30
      - name: "Commit final record delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add .dpro-next/esthe-next10b-r2.json .dpro-next/esthe-next10b-r2-public.json .dpro-next/esthe-next10b-r2.yml .dpro-next/esthe-next10b-r2-report.txt
          git rm --ignore-unmatch "$WORKFLOW_FILE" ".github/workflows/ESTHE-NEXT-10B.yml"
          git commit -m "DPRO ESTHE NEXT-10B-R2 complete: mobile public validation passed"
          git push origin "HEAD:${GITHUB_REF_NAME}"
      - name: "Final public overflow confirmation"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "### ESTHE-NEXT-10B-R2 完了" >> "$GITHUB_STEP_SUMMARY"
          echo "- PC 1440px: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- スマホ390px: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- スマホ360px: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- 横はみ出し: なし" >> "$GITHUB_STEP_SUMMARY"
          echo "- 共通styles.css: 変更なし" >> "$GITHUB_STEP_SUMMARY"
          echo "- 次STEP: ESTHE-NEXT-10C-FINAL-COMPLETE" >> "$GITHUB_STEP_SUMMARY"
