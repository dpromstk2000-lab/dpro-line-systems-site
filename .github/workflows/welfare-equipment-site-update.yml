name: One-time Welfare Equipment product site update

on:
  push:
    paths:
      - ".github/workflows/welfare-equipment-site-update.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: welfare-equipment-site-update
  cancel-in-progress: false

jobs:
  update-product-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout product site
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add welfare equipment product
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PYCODE'
          from pathlib import Path
          import base64

          script_path = Path("script.js")
          script = script_path.read_text(encoding="utf-8")

          old_comment = "// STEP HOMECARE-WEB-1 / 39 PRODUCTS / PRESERVE ALL 38 PRODUCTS / 20260720"
          new_comment = "// STEP WELFARE-EQUIP-WEB-1 / 40 PRODUCTS / PRESERVE ALL 39 PRODUCTS / 20260720"
          if old_comment in script:
              script = script.replace(old_comment, new_comment, 1)
          elif new_comment not in script:
              raise SystemExit("Unexpected script.js version comment")

          if "const productCount = 39;" in script:
              script = script.replace("const productCount = 39;", "const productCount = 40;", 1)
          elif "const productCount = 40;" not in script:
              raise SystemExit("productCount marker not found")

          description_line = '  appendDescription("教育・生活サービス", "福祉用具レンタル・販売");'
          if description_line not in script:
              anchor = '  appendDescription("教育・生活サービス", "訪問介護・家族連絡");'
              if anchor not in script:
                  raise SystemExit("Education-service description anchor not found")
              script = script.replace(anchor, anchor + "\n" + description_line, 1)

          product_path = 'systems/welfare-equipment.html'
          if product_path not in script:
              products_start = script.index("  const products = [")
              products_end_marker = "\n  ];\n\n  products.forEach("
              products_end = script.index(products_end_marker, products_start)
              entry = base64.b64decode("").decode("utf-8")
              script = script[:products_end] + entry + script[products_end:]

          category_title = '      "福祉用具レンタル・販売"'
          category_map_start = script.index("  const categoryMap = {")
          if category_title not in script[category_map_start:]:
              anchor = '      "宿泊・民泊"\n    ],'
              replacement = '      "宿泊・民泊",\n      "福祉用具レンタル・販売"\n    ],'
              if anchor not in script[category_map_start:]:
                  raise SystemExit("Category map anchor not found")
              before = script[:category_map_start]
              after = script[category_map_start:].replace(anchor, replacement, 1)
              script = before + after

          script_path.write_text(script, encoding="utf-8")

          page_path = Path("systems/welfare-equipment.html")
          page_path.parent.mkdir(parents=True, exist_ok=True)
          page_path.write_bytes(base64.b64decode(""))
          PYCODE

      - name: Validate product site update
        shell: bash
        run: |
          set -euo pipefail
          node --check script.js
          python - <<'PYCODE'
          from pathlib import Path

          script = Path("script.js").read_text(encoding="utf-8")
          page = Path("systems/welfare-equipment.html").read_text(encoding="utf-8")

          required_script = [
              "const productCount = 40;",
              'systems/welfare-equipment.html',
              '福祉用具レンタル・販売',
              'dpro-welfare-equipment-line/member.html',
              'appendDescription("教育・生活サービス", "福祉用具レンタル・販売")',
          ]
          required_page = [
              "DPRO 福祉用具レンタル・販売 LINE",
              "相談から用具選定・納品・保守・請求まで",
              "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/member.html",
              "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/owner.html",
              "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/planning.html",
              "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/aftercare.html",
              "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/billing.html",
              "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/operations.html",
              "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/system-check.html",
              "DEMO CODE",
              "1234",
              "ST003 / 3333",
          ]

          missing_script = [token for token in required_script if token not in script]
          missing_page = [token for token in required_page if token not in page]
          if missing_script or missing_page:
              raise SystemExit(
                  f"Validation failed. script={missing_script} page={missing_page}"
              )

          if script.count('systems/welfare-equipment.html') != 1:
              raise SystemExit("Welfare equipment product card is duplicated")
          if script.count('"福祉用具レンタル・販売"') < 2:
              raise SystemExit("Category map or card title is missing")
          if not Path("styles.css").exists() or not Path("systems.html").exists():
              raise SystemExit("Core product site files are missing")
          PYCODE

          for url in \
            "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/member.html" \
            "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/owner.html" \
            "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/planning.html" \
            "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/aftercare.html" \
            "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/billing.html" \
            "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/operations.html" \
            "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/system-check.html"
          do
            curl --fail --silent --show-error --location --max-time 30 --output /dev/null "$url"
          done

      - name: Commit update and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/welfare-equipment-site-update.yml
          git add script.js systems/welfare-equipment.html .github/workflows/welfare-equipment-site-update.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP WELFARE-EQUIP-SITE-1 add welfare equipment product"
          git push
