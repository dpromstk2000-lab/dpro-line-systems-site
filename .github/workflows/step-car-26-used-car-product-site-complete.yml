      - name: Validate CAR-26 update
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          product = Path("systems/used-car.html").read_text(encoding="utf-8")
          catalog = Path("systems.html").read_text(encoding="utf-8")
          asset = Path("assets/dpro-used-car-operation-sheet-20260725.pdf")

          requirements = {
              "systems/used-car.html": [
                  "STEP CAR-26",
                  "CAR-24 COMPLETE EDITION",
                  "v=CAR-24-R1",
                  'id="complete"',
                  "操作体験シートPDFを開く",
                  "入出金・帳票管理",
                  "経営分析・CSV移行・本番準備",
              ],
              "systems.html": [
                  "STEP CAR-26 / USED CAR COMPLETE UPDATE",
                  "CAR-24完成版",
                  "総合完成検査済み",
                  "CAR-24完成版を見る",
              ],
          }
          for filename, markers in requirements.items():
              text = Path(filename).read_text(encoding="utf-8")
              missing = [marker for marker in markers if marker not in text]
              if missing:
                  raise SystemExit(f"{filename}検査失敗: {missing}")

          if product.count('id="complete"') != 1:
              raise SystemExit("complete IDが重複しています。")
          if product.count("../assets/dpro-used-car-operation-sheet-20260725.pdf") < 1:
              raise SystemExit("操作体験シートPDF導線がありません。")
          if not asset.exists() or asset.stat().st_size < 100000:
              raise SystemExit("操作体験シートPDFがありません。")
          if asset.read_bytes()[:4] != b"%PDF":
              raise SystemExit("操作体験シートPDF形式が不正です。")
          if "v=CAR-10-R1" in product:
              raise SystemExit("製品ページに旧バージョンが残っています。")

          used_card = re.search(
              r'<a class="catalog-card reveal is-live" href="systems/used-car\.html">.*?</a>',
              catalog,
              flags=re.S,
          )
          if not used_card or "v=CAR-24-R1" not in used_card.group(0):
              raise SystemExit("製品一覧の中古車カード更新が不完全です。")

          print("CAR-26 validation: OK")
          PY

      - name: Normalize and inspect
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for filename in ("systems/used-car.html", "systems.html"):
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              path.write_text(
                  "\n".join(line.rstrip(" \t") for line in text.splitlines()) + "\n",
                  encoding="utf-8",
              )
          PY
          git diff --check
          git status --short
          git diff --stat

      - name: Commit CAR-26 and remove workflow
        shell: bash
        run: |
          git config user.name "DPRO Product Site Automation"
          git config user.email "actions@users.noreply.github.com"
          git add systems/used-car.html systems.html assets/dpro-used-car-operation-sheet-20260725.pdf
          git rm --ignore-unmatch .github/workflows/step-car-26-used-car-product-site-complete.yml
          if git diff --cached --quiet; then
            echo "コミット対象の変更はありません。"
            exit 0
          fi
          git commit -m "CAR-26: update used-car product site to CAR-24 complete edition"
          git push origin main
