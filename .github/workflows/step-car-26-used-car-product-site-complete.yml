name: DPRO CAR STEP CAR-26 Product Site Complete Update

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-car-26-used-car-product-site-complete.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-car-step-car-26-product-site
  cancel-in-progress: false

jobs:
  update-used-car-product-site:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout product site
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply CAR-26 product site update
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re

          PRODUCT = Path("systems/used-car.html")
          CATALOG = Path("systems.html")
          ASSET = Path("assets/dpro-used-car-operation-sheet-20260725.pdf")

          for path in (PRODUCT, CATALOG):
              if not path.exists():
                  raise SystemExit(f"{path} が見つかりません。")

          product = PRODUCT.read_text(encoding="utf-8")
          catalog = CATALOG.read_text(encoding="utf-8")

          if "DPRO 中古車買取・販売 LINE" not in product:
              raise SystemExit("中古車製品ページを確認できません。")
          if 'href="systems/used-car.html"' not in catalog:
              raise SystemExit("製品一覧の中古車カードを確認できません。")

          # Product page metadata and cache versions.
          product = re.sub(
              r'<!-- STEP CAR-WEB-1 / PRODUCT 26 / CATEGORY BUYBACK-REUSE / 20260717 -->',
              '<!-- STEP CAR-26 / CAR-24 COMPLETE + CAR-25 EXPERIENCE / 20260725 -->',
              product,
              count=1,
          )
          product = product.replace(
              '中古車買取・販売店向けDPRO 中古車買取・販売 LINE。買取査定、下取り、販売在庫、試乗予約、商談、契約、納車、顧客・車両管理を実画面で紹介。',
              '中古車買取・販売店向けDPRO 中古車買取・販売 LINE。査定、仕入、在庫公開、商談、契約、納車、アフター、LINE連絡、入出金、帳票、経営分析、CSV移行、本番準備まで実画面で紹介。',
              1,
          )
          product = product.replace("v=CAR-10-R1", "v=CAR-24-R1")

          product = product.replace(
              '買取査定・下取りの受付から、販売在庫の公開、購入相談、来店・試乗予約、商談、契約、必要書類、納車、納車後フォローまでをLINE・PC・iPadでつなぐ中古車店専用システムです。',
              '買取査定・下取りの受付から、販売在庫の公開、購入相談、来店・試乗予約、商談、契約、必要書類、納車、納車後フォロー、LINE連絡、入出金、帳票、経営分析、CSV移行、本番準備判定までをLINE・PC・iPadでつなぐ中古車店専用システムです。',
              1,
          )
          product = product.replace(
              '買取専用と販売専用に分けず、顧客・所有車・査定・販売在庫・商談・契約・納車を共通データで管理。査定案件と販売商談は別々の進行状況で整理します。',
              '買取専用と販売専用に分けず、顧客・所有車・査定・販売在庫・商談・契約・納車・アフター・会計を共通データで管理。粗利や在庫回転、帳票、CSV移行、本番準備まで確認できる完成版です。',
              1,
          )

          if "CAR-26 COMPLETE PRODUCT PAGE" not in product:
              product = product.replace(
                  "</style>",
                  '\n.car-complete{background:linear-gradient(180deg,#f6f1e7 0%,#fff 100%)}\n.car-complete-inner{max-width:1160px;margin:0 auto}\n.car-complete-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;margin-top:28px}\n.car-complete-card{padding:26px;border:1px solid rgba(25,57,84,.14);border-radius:20px;background:#fff;box-shadow:0 18px 46px rgba(19,44,65,.08)}\n.car-complete-card span{display:block;color:#b46b12;font-size:.74rem;font-weight:900;letter-spacing:.12em}\n.car-complete-card strong{display:block;margin-top:8px;color:#10243e;font-size:2.2rem;line-height:1}\n.car-complete-card h3{margin:12px 0 8px;color:#10243e;font-size:1.12rem}\n.car-complete-card p{margin:0;color:#637482;line-height:1.8}\n.car-complete-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:24px}\n.car-complete-note{margin-top:18px;padding:16px 18px;border-left:5px solid #e8a11e;border-radius:0 14px 14px 0;background:#fff7e4;color:#5d5547;line-height:1.8}\n@media(max-width:850px){.car-complete-grid{grid-template-columns:1fr}.car-complete-actions .button{width:100%;text-align:center}}\n' + "\n/* CAR-26 COMPLETE PRODUCT PAGE */\n</style>",
                  1,
              )

          product = product.replace(
              '<a href="#experience">実画面</a>',
              '<a href="#experience">実画面</a><a href="#complete">完成機能</a>',
              1,
          )

          feature_pattern = re.compile(
              r'<div class="product-feature-grid">.*?</div>\s*</section>',
              flags=re.S,
          )
          if feature_pattern.search(product):
              product = feature_pattern.sub(
                  '<div class="product-feature-grid">\n<article class="product-feature reveal"><span>01</span><h3>査定・買取・在庫化</h3><p>店頭・出張・写真査定から買取契約、入庫予定、商品化、販売在庫への変換までを連動して管理します。</p></article>\n<article class="product-feature reveal"><span>02</span><h3>公開在庫・商談・販売契約</h3><p>掲載写真・公開条件・試乗・購入相談・見積・ローン・販売契約を、顧客と車両を中心に一元管理します。</p></article>\n<article class="product-feature reveal"><span>03</span><h3>納車・アフター管理</h3><p>必要書類、入金、納車準備、納車完了、点検・車検・オイル交換、代替提案まで継続して確認できます。</p></article>\n<article class="product-feature reveal"><span>04</span><h3>LINE連絡・送信履歴</h3><p>査定結果、必要書類、納車確認、点検案内などのテンプレートを作成し、コピー・送信予定・履歴を残します。</p></article>\n<article class="product-feature reveal"><span>05</span><h3>入出金・帳票管理</h3><p>未収金、入金、支払予定を台帳化し、請求書・領収書・精算書の発行、再発行、無効化履歴を管理します。</p></article>\n<article class="product-feature reveal"><span>06</span><h3>経営分析・CSV移行・本番準備</h3><p>粗利・在庫回転・成約率・担当実績を可視化し、CSV移行と総合完成検査で導入前の阻害事項も確認します。</p></article>\n</div>' + "\n</section>",
                  product,
                  count=1,
              )
          else:
              raise SystemExit("主要機能グリッドを確認できません。")

          if 'id="complete"' not in product:
              marker = '<section class="experience-section section section-dark" id="experience">'
              if marker not in product:
                  raise SystemExit("完成版セクションの追加位置を確認できません。")
              product = product.replace(
                  marker,
                  '<section class="car-complete section" id="complete">\n<div class="car-complete-inner">\n<div class="section-heading reveal">\n<p class="eyebrow">CAR-24 COMPLETE EDITION</p>\n<h2 class="headline-lines headline-fixed"><span>査定受付だけではなく、</span><span>中古車店の運営を、</span><span>最後までつなぐ完成版。</span></h2>\n<p>CAR-24までの総合開発と検査を完了し、CAR-25の操作体験シートから公開画面・マイページ・PC・iPadを確認できます。</p>\n</div>\n<div class="car-complete-grid">\n<article class="car-complete-card reveal"><span>DEVELOPMENT</span><strong>24</strong><h3>業務機能STEP</h3><p>査定、仕入、在庫、商談、契約、納車、アフター、連絡、入出金、帳票、分析、CSV移行、本番準備まで。</p></article>\n<article class="car-complete-card reveal"><span>OPERATING SCREENS</span><strong>4</strong><h3>実際に触れる画面</h3><p>お客様向け公開画面、お客様マイページ、オーナーPC管理、スタッフiPad現場画面を公開しています。</p></article>\n<article class="car-complete-card reveal"><span>QUALITY GATE</span><strong>11</strong><h3>自動総合検査</h3><p>DB、ストレージ、スキーマ、公開・会員・管理者ガード、本番設定を総合判定します。</p></article>\n</div>\n<div class="car-complete-actions reveal">\n<a class="button button-primary" href="../assets/dpro-used-car-operation-sheet-20260725.pdf" target="_blank" rel="noopener">操作体験シートPDFを開く</a>\n<a class="button button-secondary" href="https://dpromstk2000-lab.github.io/dpro-used-car-line-liff/owner.html?demo=1&amp;v=CAR-24-R1" target="_blank" rel="noopener">CAR-24完成版を操作する</a>\n</div>\n<p class="car-complete-note reveal">デモ管理コードは1234です。デモ環境では本番化防止ガードが有効で、LINE自動送信と銀行自動連携はOFF、帳票PDFはブラウザ印刷で保存します。</p>\n</div>\n</section>' + "\n\n" + marker,
                  1,
              )

          # Catalog card only. Product count is not changed.
          card_pattern = re.compile(
              r'<a class="catalog-card reveal is-live" href="systems/used-car\.html">.*?</a>',
              flags=re.S,
          )
          matches = card_pattern.findall(catalog)
          if len(matches) != 1:
              raise SystemExit(f"中古車カード件数が想定外です: {len(matches)}")
          catalog = card_pattern.sub('<a class="catalog-card reveal is-live" href="systems/used-car.html">\n<div class="catalog-card-top">\n<span class="catalog-code">UC</span>\n<span class="catalog-status">CAR-24完成版</span>\n</div>\n<div class="catalog-visual catalog-live-visual catalog-live-buyback">\n<iframe loading="lazy" src="https://dpromstk2000-lab.github.io/dpro-used-car-line-liff/member.html?demo=1&amp;line_user_id=demo_car_line_001&amp;v=CAR-24-R1" title="中古車買取・販売CAR-24完成版プレビュー"></iframe>\n<span class="catalog-live-badge">総合完成検査済み</span>\n</div>\n<div class="catalog-card-copy">\n<small>買取・リユース</small>\n<h3>中古車買取・販売</h3>\n<p>査定・仕入・在庫・商談・契約・納車・アフター・入出金・帳票・経営分析。</p>\n<b class="catalog-card-cta">CAR-24完成版を見る →</b>\n</div>\n</a>', catalog, count=1)

