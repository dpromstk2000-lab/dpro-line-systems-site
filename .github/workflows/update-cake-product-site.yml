name: Update DPRO Cake Product Site

on:
  push:
    paths:
      - ".github/workflows/update-cake-product-site.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cake-product:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout product site
        uses: actions/checkout@v4

      - name: Update existing cake product to CAKE-16
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re

          systems_path = Path("systems.html")
          cake_path = Path("systems/cake.html")

          systems_text = systems_path.read_text(encoding="utf-8")
          card = base64.b64decode("").decode("utf-8")
          cake_page = base64.b64decode("").decode("utf-8")

          pattern = re.compile(
              r'<a class="catalog-card reveal is-live" href="systems/cake\.html">.*?</a>',
              re.S,
          )
          matches = pattern.findall(systems_text)
          if len(matches) != 1:
              raise SystemExit(f"cake card match count must be 1, got {len(matches)}")

          systems_text = pattern.sub(card, systems_text, count=1)
          systems_path.write_text(systems_text, encoding="utf-8")
          cake_path.write_text(cake_page, encoding="utf-8")

          checks = {
              "existing listing retained": systems_text.count('href="systems/cake.html"') == 1,
              "CAKE-16 card": "CAKE-16完成版" in systems_text,
              "new card description": "写真カタログ・当日取り置き・事前予約・オーダー相談" in systems_text,
              "detail title": "写真カタログ・取り置き・予約・製作管理" in cake_page,
              "customer catalog": "CUSTOMER CATALOG" in cake_page,
              "owner PC": "OWNER PC" in cake_page,
              "staff iPad": "STAFF iPAD" in cake_page,
              "final check": "FINAL CHECK" in cake_page,
              "old version removed": "CAKE-9" not in cake_page,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit("validation failed: " + ", ".join(failed))

          print("DPRO cake product site CAKE-16 update passed.")
          PY

      - name: Commit and publish
        shell: bash
        run: |
          if git diff --quiet -- systems.html systems/cake.html; then
            echo "No changes were needed."
            exit 0
          fi
          git config user.name "DPRO Product Site Bot"
          git config user.email "actions@users.noreply.github.com"
          git add systems.html systems/cake.html
          git diff --cached --check
          git commit -m "Update DPRO cake product page to CAKE-16"
          git push
