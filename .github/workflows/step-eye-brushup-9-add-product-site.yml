name: STEP EYE-BRUSHUP-9 Add Product Site

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-eye-brushup-9-add-product-site.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-eye-brushup-9-add-product-site
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout product site
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Save pre-change commit
        shell: bash
        run: |
          set -euo pipefail
          echo "BEFORE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Add DPRO EYE SALON product
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import base64
          import re

          index_path = Path("index.html")
          systems_path = Path("systems.html")
          product_path = Path("systems/eye-salon.html")

          for path in [index_path,systems_path]:
              if not path.exists():
                  raise SystemExit(f"{path} が見つかりません。")

          index_text = index_path.read_text(encoding="utf-8")
          systems_text = systems_path.read_text(encoding="utf-8")

          product_html = base64.b64decode("").decode("utf-8")
          catalog_card = base64.b64decode("").decode("utf-8")

          if product_path.exists() or 'systems/eye-salon.html' in systems_text:
              print("STEP EYE-BRUSHUP-9 は適用済みです。")
          else:
              replacements = [
                  (
                      "DPRO LINE SYSTEMS。37業種の完成済みLINEシステムを",
                      "DPRO LINE SYSTEMS。38業種の完成済みLINEシステムを",
                  ),
                  (
                      "37 PRODUCTS / 7 CATEGORIES",
                      "38 PRODUCTS / 7 CATEGORIES",
                  ),
                  (
                      "<span>37業種</span>",
                      "<span>38業種</span>",
                  ),
                  (
                      "<strong>37</strong><span>完成済みシステム</span>",
                      "<strong>38</strong><span>完成済みシステム</span>",
                  ),
                  (
                      "美容室、美容サロン、ネイル、エステ、ヨガ、整骨院",
                      "美容室、美容サロン、まつげ・眉サロン、ネイル、エステ、ヨガ、整骨院",
                  ),
                  (
                      ">37システムをすべて見る<",
                      ">38システムをすべて見る<",
                  ),
              ]

              for old,new in replacements:
                  count = index_text.count(old)
                  if count != 1:
                      raise SystemExit(
                          f"index.htmlの置換対象が{count}件です: {old}"
                      )
                  index_text = index_text.replace(old,new,1)

              system_replacements = [
                  (
                      "37 PRODUCTS / 7 CATEGORIES",
                      "38 PRODUCTS / 7 CATEGORIES",
                  ),
                  (
                      "37業種の完成システムを",
                      "38業種の完成システムを",
                  ),
                  (
                      '<div class="orbit-core">37</div>',
                      '<div class="orbit-core">38</div>',
                  ),
                  (
                      "<strong>37</strong><span>完成済みシステム</span>",
                      "<strong>38</strong><span>完成済みシステム</span>",
                  ),
              ]

              for old,new in system_replacements:
                  count = systems_text.count(old)
                  if count != 1:
                      raise SystemExit(
                          f"systems.htmlの置換対象が{count}件です: {old}"
                      )
                  systems_text = systems_text.replace(old,new,1)

              nail_anchor = '<a class="catalog-card reveal is-live" href="systems/nail.html">'
              count = systems_text.count(nail_anchor)
              if count != 1:
                  raise SystemExit(
                      f"ネイルカードの挿入位置が{count}件です。"
                  )
              systems_text = systems_text.replace(
                  nail_anchor,
                  catalog_card + "\n" + nail_anchor,
                  1,
              )

              product_path.parent.mkdir(parents=True,exist_ok=True)
              product_path.write_text(product_html,encoding="utf-8")
              index_path.write_text(index_text,encoding="utf-8")
              systems_path.write_text(systems_text,encoding="utf-8")

          # Final invariants
          index_text = index_path.read_text(encoding="utf-8")
          systems_text = systems_path.read_text(encoding="utf-8")
          product_text = product_path.read_text(encoding="utf-8")

          if "37業種" in index_text or ">37システム" in index_text:
              raise SystemExit("index.htmlに旧37件表記が残っています。")
          if "37業種" in systems_text:
              raise SystemExit("systems.htmlに旧37件表記が残っています。")
          if systems_text.count('class="catalog-card') != 38:
              raise SystemExit(
                  "製品カード数が38件ではありません: "
                  + str(systems_text.count('class="catalog-card'))
              )
          if systems_text.count('systems/eye-salon.html') != 1:
              raise SystemExit("EYE SALONカードが重複または不足しています。")
          if "DPRO EYE SALON LINE" not in product_text:
              raise SystemExit("EYE SALON製品ページの内容が不正です。")
          PY

      - name: Validate product site
        shell: bash
        run: |
          set -euo pipefail

          test -f index.html
          test -f systems.html
          test -f systems/eye-salon.html
          test -f styles.css
          test -f script.js

          grep -q '38業種' index.html
          grep -q '38システムをすべて見る' index.html
          grep -q 'まつげ・眉サロン' index.html
          grep -q 'systems/eye-salon.html' systems.html
          grep -q 'DPRO EYE SALON LINE' systems/eye-salon.html
          grep -q '前回と同じ内容で予約' systems/eye-salon.html
          grep -q '写真付き施術カルテ' systems/eye-salon.html
          grep -q '再来店フォロー' systems/eye-salon.html
          grep -q 'デモ標準データ' systems/eye-salon.html || true
          grep -q 'release-check.html?demo=1' systems/eye-salon.html
          grep -q 'owner-ipad.html?demo=1' systems/eye-salon.html
          grep -q 'DEMO CODE' systems/eye-salon.html
          grep -q '<strong>1234</strong>' systems/eye-salon.html

          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re
          import subprocess

          pages = [
              "index.html",
              "systems.html",
              "systems/eye-salon.html",
          ]

          class Parser(HTMLParser):
              pass

          for page in pages:
              text = Path(page).read_text(encoding="utf-8")
              parser = Parser()
              parser.feed(text)
              parser.close()

              scripts = re.findall(
                  r"<script(?:\s[^>]*)?>(.*?)</script>",
                  text,
                  flags=re.S,
              )
              inline = [script for script in scripts if script.strip()]
              if inline:
                  js_path = Path("/tmp") / f"{Path(page).stem}-inline.js"
                  js_path.write_text(
                      "\n".join(inline),
                      encoding="utf-8",
                  )
                  subprocess.run(
                      ["node","--check",str(js_path)],
                      check=True,
                  )

              print(f"{page}: HTML check passed.")

          systems = Path("systems.html").read_text(encoding="utf-8")
          cards = systems.count('class="catalog-card')
          if cards != 38:
              raise SystemExit(f"製品カード数が38件ではありません: {cards}")

          eye = Path("systems/eye-salon.html").read_text(encoding="utf-8")
          urls = [
              "index.html?demo=1",
              "member.html?demo=1",
              "owner.html?demo=1",
              "owner-ipad.html?demo=1",
              "settings.html?demo=1",
              "release-check.html?demo=1",
          ]
          missing = [url for url in urls if url not in eye]
          if missing:
              raise SystemExit(
                  "営業デモURLが不足しています: " + ", ".join(missing)
              )

          subprocess.run(["node","--check","script.js"],check=True)
          print("script.js check passed.")
          PY

      - name: Create backup tag and commit
        shell: bash
        run: |
          set -euo pipefail

          BACKUP_TAG="eye-brushup-9-site-backup-${{ github.run_id }}"
          git tag "$BACKUP_TAG" "$BEFORE_SHA"
          git push origin "$BACKUP_TAG"

          rm -f ".github/workflows/step-eye-brushup-9-add-product-site.yml"

          git config user.name "DPRO STEP EYE-BRUSHUP-9"
          git config user.email "actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP EYE-BRUSHUP-9 add eye salon product site"
          git push origin HEAD:main
