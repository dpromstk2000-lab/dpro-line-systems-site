name: STEP SEITAI PRODUCT SITE NEXT-10

on:
  push:
    branches: [main]
    paths: [".github/workflows/STEP-SEITAI-PRODUCT-SITE-NEXT-10.yml"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seitai-product-site-next-10
  cancel-in-progress: false

env:
  WORKFLOW_FILE: .github/workflows/STEP-SEITAI-PRODUCT-SITE-NEXT-10.yml
  BACKUP_TAG: backup-product-site-before-seitai-next-20260724
  COMPLETE_MANIFEST_URL: https://dpromstk2000-lab.github.io/dpro-seitai-line/dpro-next-complete.json
  DETAIL_URL: https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/osteopathic.html
  CATALOG_URL: https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems.html

jobs:
  update-osteopathic-product-page:
    name: Update osteopathic DPRO NEXT product page
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify product site and completed system
        shell: bash
        run: |
          set -euo pipefail
          test -f systems.html
          test -f systems/osteopathic.html
          test -f styles.css
          test -f script.js

          python3 <<'PY'
          import json
          import os
          import urllib.request

          url=os.environ["COMPLETE_MANIFEST_URL"]
          req=urllib.request.Request(url,headers={"User-Agent":"DPRO-SEITAI-PRODUCT-SITE-NEXT-10"})
          with urllib.request.urlopen(req,timeout=30) as response:
              data=json.loads(response.read().decode("utf-8"))

          if data.get("status")!="COMPLETE":
              raise SystemExit("DPRO 整骨院・整体 LINE is not COMPLETE")
          if data.get("release")!="SEITAI-NEXT-10":
              raise SystemExit(f"unexpected release: {data.get('release')}")
          if data.get("audit",{}).get("static")!="16/16 OK":
              raise SystemExit("static audit is not 16/16")
          if data.get("audit",{}).get("runtime")!="9/9 OK":
              raise SystemExit("runtime audit is not 9/9")
          if data.get("audit",{}).get("phone_formats")!="4/4 OK":
              raise SystemExit("phone format audit is not 4/4")
          print("Completed system manifest: OK")
          PY

      - name: Create product site rollback tag
        shell: bash
        run: |
          set -euo pipefail
          BASELINE_SHA="$(git rev-parse HEAD^)"
          echo "BASELINE_SHA=$BASELINE_SHA" >> "$GITHUB_ENV"

          if git rev-parse "$BACKUP_TAG" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 "$BACKUP_TAG")" = "$BASELINE_SHA"
          else
            git tag -a "$BACKUP_TAG" "$BASELINE_SHA" -m "Product site before DPRO 整骨院・整体 NEXT-10 update"
            git push origin "$BACKUP_TAG"
          fi

      - name: Update catalog card and product page
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import base64
          import re

          card=base64.b64decode("").decode()
          detail=base64.b64decode("").decode()

          catalog_path=Path("systems.html")
          catalog=catalog_path.read_text(encoding="utf-8")

          pattern=r'<a class="catalog-card reveal is-live" href="systems/osteopathic\.html">.*?</a>'
          catalog, count=re.subn(pattern,card,catalog,count=1,flags=re.S)
          if count!=1:
              raise SystemExit(f"osteopathic catalog card replacement count: {count}")

          marker="<!-- STEP SEITAI-PRODUCT-SITE-NEXT-10 / DPRO NEXT COMPLETE / 20260724 -->"
          if marker not in catalog:
              catalog=catalog.replace(
                  "<body class=\"catalog-page\">",
                  "<body class=\"catalog-page\">\n"+marker,
                  1
              )

          catalog_path.write_text(catalog,encoding="utf-8",newline="\n")
          Path("systems/osteopathic.html").write_text(detail,encoding="utf-8",newline="\n")
          PY

      - name: Run HTML URL and content checks
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import re
          import yaml

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids=[]
                  self.urls=[]
              def handle_starttag(self,tag,attrs):
                  for key,value in attrs:
                      if key=="id" and value:
                          self.ids.append(value)
                      if key in {"href","src","data-screen-url"} and value:
                          self.urls.append(value)
              def handle_startendtag(self,tag,attrs):
                  self.handle_starttag(tag,attrs)

          for name in ["systems.html","systems/osteopathic.html"]:
              text=Path(name).read_text(encoding="utf-8")
              parser=Parser()
              parser.feed(text)
              duplicates=sorted({x for x in parser.ids if parser.ids.count(x)>1})
              if duplicates:
                  raise SystemExit(f"{name}: duplicate ids {duplicates}")
              bad=[url for url in parser.urls if url.startswith("http://")]
              if bad:
                  raise SystemExit(f"{name}: non-HTTPS URLs {bad}")

          catalog=Path("systems.html").read_text(encoding="utf-8")
          detail=Path("systems/osteopathic.html").read_text(encoding="utf-8")

          if catalog.count('href="systems/osteopathic.html"')!=1:
              raise SystemExit("osteopathic catalog card count is not one")

          catalog_required=[
              "DPRO NEXT完成版",
              "SEITAI NEXT-10完成",
              "整骨院・整体",
              "4段階進捗",
              "患者履歴",
              "seitai-next-10-complete"
          ]
          missing=[token for token in catalog_required if token not in catalog]
          if missing:
              raise SystemExit(f"catalog markers missing: {missing}")

          detail_required=[
              "STEP SEITAI-PRODUCT-SITE-NEXT-10 COMPLETE",
              "DPRO 整骨院・整体 LINE",
              "DPRO NEXT完成版",
              "会員ホーム",
              "4段階の来院進捗",
              "患者履歴",
              "受付専用",
              "スタッフスマホ",
              "再来院・フォローセンター",
              "静的監査16/16",
              "実行監査9/9",
              "電話番号",
              "system-check.html?v=seitai-next-10-complete"
          ]
          missing=[token for token in detail_required if token not in detail]
          if missing:
              raise SystemExit(f"detail markers missing: {missing}")

          old_tokens=[
              "step-seitai-10g-r5",
              "step-seitai-10i",
              "step-seitai-10h-r1",
              "step-seitai-9c"
          ]
          remaining=[token for token in old_tokens if token in detail or token in catalog]
          if remaining:
              raise SystemExit(f"old STEP URLs remain: {remaining}")

          completed_urls=[
              "index.html?v=seitai-next-10-complete",
              "member.html?phone=09011112222&v=seitai-next-10-complete",
              "owner.html?v=seitai-next-10-complete",
              "owner-ipad.html?v=seitai-next-10-complete",
              "staff.html?v=seitai-next-10-complete",
              "system-check.html?v=seitai-next-10-complete"
          ]
          missing=[url for url in completed_urls if url not in detail.replace("&amp;","&")]
          if missing:
              raise SystemExit(f"completed URLs missing: {missing}")

          yaml.safe_load(Path(".github/workflows/STEP-SEITAI-PRODUCT-SITE-NEXT-10.yml").read_text(encoding="utf-8"))
          print("Product site HTML and content checks: OK")
          PY

      - name: Verify completed public screens
        shell: bash
        run: |
          set -euo pipefail
          for url in \
            "https://dpromstk2000-lab.github.io/dpro-seitai-line/index.html?v=seitai-next-10-complete" \
            "https://dpromstk2000-lab.github.io/dpro-seitai-line/member.html?phone=09011112222&v=seitai-next-10-complete" \
            "https://dpromstk2000-lab.github.io/dpro-seitai-line/owner.html?v=seitai-next-10-complete" \
            "https://dpromstk2000-lab.github.io/dpro-seitai-line/owner-ipad.html?v=seitai-next-10-complete" \
            "https://dpromstk2000-lab.github.io/dpro-seitai-line/staff.html?v=seitai-next-10-complete" \
            "https://dpromstk2000-lab.github.io/dpro-seitai-line/system-check.html?v=seitai-next-10-complete"
          do
            curl --fail --silent --show-error --location --max-time 30 "$url" > /dev/null
          done
          echo "All completed public screens: OK"

      - name: Remove workflow and commit product site update
        shell: bash
        run: |
          set -euo pipefail
          rm -f "$WORKFLOW_FILE"
          git add systems.html systems/osteopathic.html "$WORKFLOW_FILE"

          git diff --cached --quiet && { echo "No changes to commit"; exit 1; }

          git commit -m "STEP SEITAI PRODUCT SITE NEXT-10 COMPLETE [skip ci]"
          git push origin HEAD:main
