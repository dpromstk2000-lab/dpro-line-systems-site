# DPRO エステ LINE
# STEP名: ESTHE-NEXT-10B-R4
#
# R3失敗の正確な状態:
# - viewport: 390
# - documentScrollWidth: 390
# - bodyScrollWidth: 390
# - 実際の横スクロール: なし
# - 見出し「完成したシステムが」の描画右端: 392.8px
#
# R4:
# - 製品一覧の小画面見出しを実表示領域へ収める
# - 実スクロール幅とサブピクセル描画境界を分離
# - 以前失敗した見出しを個別検査
#
# 対象:
# - systems.html
# - R4検査・完成記録
#
# 変更しない:
# - systems/esthe.html
# - styles.css
# - script.js
# - Worker / Supabase / API
#
# 公開検査:
# - 製品ページ 1440 / 390 / 360
# - 製品一覧 1440 / 390 / 360 / 320
# - documentScrollWidth / bodyScrollWidth / scrollX
# - 主要コンテンツ境界
# - 旧失敗見出し境界
#
# 成功後:
# - 自動Commit / Push
# - NEXT-10B、R2、R3、R4 YML自身を削除
#
# 次STEP:
# - ESTHE-NEXT-10C-FINAL-COMPLETE

name: "DPRO ESTHE NEXT-10B-R4 - Catalog Text Fit and Accurate Validation"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-10B-R4.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-product-site-esthe-next"
  cancel-in-progress: false

env:
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-10B-R4.yml"
  BACKUP_TAG_PREFIX: "backup-product-site-before-esthe-next10b-r4"
  PRODUCT_PAGE_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/esthe.html"
  CATALOG_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems.html"

jobs:
  esthe-next-10b-r4:
    name: "Fit catalog text and verify real horizontal overflow"
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: "Checkout product-site repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm NEXT-10B R2 and R3 committed baseline"
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -q 'STEP ESTHE-NEXT-10B / DPRO NEXT CATALOG' systems.html
          grep -q 'CATALOG-NEXT10B-R3-MOBILE-SAFE' systems.html
          grep -q 'ESTHE NEXT-10完成' systems.html
          grep -q 'DPRO NEXT完成版を見る' systems.html
          grep -q 'ESTHE-NEXT-10B-R2-MOBILE-SAFE' systems/esthe.html
          [[ "$(grep -o 'href="systems/esthe.html"' systems.html | wc -l)" -eq 1 ]]
          ! grep -q 'CATALOG-NEXT10B-R4-TEXT-FIT' systems.html

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi

          BASE_TAG="${BACKUP_TAG_PREFIX}-$(TZ=Asia/Tokyo date +%Y%m%d)"
          BACKUP_TAG="$BASE_TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi

          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" \
            -m "DPRO product site before ESTHE NEXT-10B-R4"
          git push origin "refs/tags/$BACKUP_TAG"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"

      - name: "Apply mobile heading text-fit patch"
        shell: bash
        run: |
          set -Eeuo pipefail
          ESTHE_SHA_BEFORE="$(sha256sum systems/esthe.html | awk '{print $1}')"
          STYLES_SHA_BEFORE="$(sha256sum styles.css | awk '{print $1}')"
          SCRIPT_SHA_BEFORE="$(sha256sum script.js | awk '{print $1}')"
          echo "ESTHE_SHA_BEFORE=$ESTHE_SHA_BEFORE" >> "$GITHUB_ENV"
          echo "STYLES_SHA_BEFORE=$STYLES_SHA_BEFORE" >> "$GITHUB_ENV"
          echo "SCRIPT_SHA_BEFORE=$SCRIPT_SHA_BEFORE" >> "$GITHUB_ENV"
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-R4-apply>","exec"))'

      - name: "Run static regression and scope validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-R4-static>","exec"))'
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML OK"' "$WORKFLOW_FILE"
          [[ "$(sha256sum systems/esthe.html | awk '{print $1}')" == "$ESTHE_SHA_BEFORE" ]]
          [[ "$(sha256sum styles.css | awk '{print $1}')" == "$STYLES_SHA_BEFORE" ]]
          [[ "$(sha256sum script.js | awk '{print $1}')" == "$SCRIPT_SHA_BEFORE" ]]

      - name: "Commit R4 catalog text-fit patch and push"
        shell: bash
        run: |
          set -Eeuo pipefail
          git add \
            systems.html \
            .dpro-next/esthe-next10b-r4.json \
            .dpro-next/esthe-next10b-r4-static.json
          git diff --cached --quiet && {
            echo "::error::Commit対象がありません"; exit 1;
          }
          git commit -m "DPRO ESTHE NEXT-10B-R4: fit catalog mobile heading"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "PATCH_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: "Wait for R4 public catalog"
        shell: bash
        run: |
          set -Eeuo pipefail
          PUBLISHED="false"
          for attempt in $(seq 1 60); do
            BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 35 \
              -H "Cache-Control: no-cache, no-store, max-age=0" \
              -H "Pragma: no-cache" \
              "$CATALOG_URL?r4=${PATCH_COMMIT_SHA}_${attempt}" || true)"
            if [[ "$BODY" == *"CATALOG-NEXT10B-R4-TEXT-FIT"* \
              && "$BODY" == *"ESTHE NEXT-10完成"* ]]; then
              PUBLISHED="true"
              break
            fi
            sleep 10
          done
          [[ "$PUBLISHED" == "true" ]] || {
            echo "::error::R4公開反映を確認できません"; exit 1;
          }

      - name: "Install Chromium validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: "Verify real scroll and critical visual boundaries"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-R4-visual>","exec"))'

      - name: "Write R4 completion record"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-R4-final>","exec"))'
          grep -q 'current_step: "ESTHE-NEXT-10B-R4-COMPLETE"' \
            .dpro-next/esthe-next10b-r4.yml
          grep -q 'next_step: "ESTHE-NEXT-10C-FINAL-COMPLETE"' \
            .dpro-next/esthe-next10b-r4.yml
          grep -q 'actual_horizontal_scroll: false' \
            .dpro-next/esthe-next10b-r4.yml
          grep -q 'formerly_failing_heading_within_viewport: true' \
            .dpro-next/esthe-next10b-r4.yml

      - name: "Upload R4 validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-10B-R4-${{ github.run_id }}"
          path: |
            .next10b-r4-public-artifact/
            .dpro-next/esthe-next10b-r4-static.json
            .dpro-next/esthe-next10b-r4-public.json
            .dpro-next/esthe-next10b-r4.json
            .dpro-next/esthe-next10b-r4.yml
            .dpro-next/esthe-next10b-r4-report.txt
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit final record, delete workflows and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add \
            .dpro-next/esthe-next10b-r4-static.json \
            .dpro-next/esthe-next10b-r4-public.json \
            .dpro-next/esthe-next10b-r4.json \
            .dpro-next/esthe-next10b-r4.yml \
            .dpro-next/esthe-next10b-r4-report.txt

          git rm --ignore-unmatch \
            "$WORKFLOW_FILE" \
            ".github/workflows/ESTHE-NEXT-10B-R3.yml" \
            ".github/workflows/ESTHE-NEXT-10B-R2.yml" \
            ".github/workflows/ESTHE-NEXT-10B.yml"

          git diff --cached --quiet && {
            echo "::error::最終Commit対象がありません"; exit 1;
          }

          git commit -m "DPRO ESTHE NEXT-10B-R4 complete: public widths verified"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "FINAL_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: "Final public marker confirmation"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          FINAL_OK="false"
          for attempt in $(seq 1 36); do
            BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 35 \
              -H "Cache-Control: no-cache, no-store, max-age=0" \
              "$CATALOG_URL?final=${FINAL_COMMIT_SHA}_${attempt}" || true)"
            if [[ "$BODY" == *"CATALOG-NEXT10B-R4-TEXT-FIT"* \
              && "$BODY" == *"ESTHE NEXT-10完成"* ]]; then
              FINAL_OK="true"
              break
            fi
            sleep 10
          done
          [[ "$FINAL_OK" == "true" ]] || {
            echo "::error::R4最終公開確認に失敗しました"; exit 1;
          }

          echo "### ESTHE-NEXT-10B-R4 完了" >> "$GITHUB_STEP_SUMMARY"
          echo "- R3の実スクロール幅: 390 / 390（正常）" >> "$GITHUB_STEP_SUMMARY"
          echo "- 以前失敗した見出し: 画面内PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- 製品ページ 1440 / 390 / 360: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- 製品一覧 1440 / 390 / 360 / 320: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- 実際の横スクロール: なし" >> "$GITHUB_STEP_SUMMARY"
          echo "- systems/esthe.html / styles.css / script.js: 変更なし" >> "$GITHUB_STEP_SUMMARY"
          echo "- 次STEP: ESTHE-NEXT-10C-FINAL-COMPLETE" >> "$GITHUB_STEP_SUMMARY"
