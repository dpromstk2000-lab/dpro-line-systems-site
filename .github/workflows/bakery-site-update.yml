name: One-time Bakery product site update

on:
  push:
    paths:
      - '.github/workflows/bakery-site-update.yml'

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Bakery product site
        shell: python
        run: |
          from pathlib import Path
          
          index_path = Path("index.html")
          systems_path = Path("systems.html")
          product_path = Path("systems/bakery.html")
          workflow_path = Path(".github/workflows/bakery-site-update.yml")
          
          bakery_html = '<!doctype html>\n<html lang="ja">\n<head>\n<meta charset="utf-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<meta name="description" content="パンの写真・価格・説明を公式カタログとして公開し、そのままLINE取り置きへつなげるDPRO BAKERY LINE。会員証・ECOレスキュー・店舗管理にも対応。">\n<title>DPRO BAKERY LINE｜写真付きパンカタログからLINE取り置きへ</title>\n<link rel="stylesheet" href="../styles.css">\n<style>\n  .bakery-value-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:22px 0 0}\n  .bakery-value-strip div{padding:15px;border:1px solid rgba(180,83,9,.24);border-radius:18px;background:rgba(255,247,237,.82)}\n  .bakery-value-strip strong{display:block;font-size:15px;color:#9a3412}\n  .bakery-value-strip small{display:block;margin-top:4px;color:#78716c;line-height:1.55}\n  .bakery-catalog-callout{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;border-radius:32px;padding:clamp(24px,5vw,54px);background:linear-gradient(135deg,#fff7ed,#ffedd5);border:1px solid #fed7aa;overflow:hidden}\n  .bakery-catalog-callout .catalog-copy h2{margin:10px 0 14px}\n  .bakery-catalog-callout .catalog-copy ul{display:grid;gap:9px;padding-left:20px}\n  .bakery-catalog-callout .catalog-screen{min-height:420px;border-radius:24px;overflow:hidden;background:#fff;box-shadow:0 24px 70px rgba(120,53,15,.2)}\n  .bakery-catalog-callout iframe{width:145%;height:610px;border:0;transform:scale(.69);transform-origin:0 0}\n  .bakery-flow{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:24px}\n  .bakery-flow article{position:relative;border-radius:22px;padding:20px;background:#fff;border:1px solid #fed7aa}\n  .bakery-flow article:not(:last-child)::after{content:"→";position:absolute;right:-18px;top:50%;transform:translateY(-50%);z-index:2;font-size:24px;color:#c2410c;font-weight:900}\n  .bakery-flow span{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:50%;background:#9a3412;color:#fff;font-weight:900}\n  .bakery-flow h3{margin:12px 0 6px}\n  .bakery-url-note{margin-top:18px;border-radius:18px;padding:16px;background:#1c1917;color:#fff7ed;word-break:break-all}\n  .bakery-url-note small{display:block;color:#fed7aa;margin-bottom:5px}\n  .bakery-url-note code{font-family:inherit;font-size:13px}\n  @media(max-width:900px){\n    .bakery-value-strip,.bakery-flow{grid-template-columns:repeat(2,minmax(0,1fr))}\n    .bakery-catalog-callout{grid-template-columns:1fr}\n    .bakery-flow article::after{display:none}\n  }\n  @media(max-width:600px){\n    .bakery-value-strip,.bakery-flow{grid-template-columns:1fr}\n    .bakery-catalog-callout{padding:20px;border-radius:24px}\n    .bakery-catalog-callout .catalog-screen{min-height:330px}\n    .bakery-catalog-callout iframe{width:175%;height:500px;transform:scale(.57)}\n  }\n</style>\n</head>\n<body>\n<!-- STEP BAKERY-SITE-1 / PHOTO CATALOG & LINE PREORDER / 20260720 -->\n<header class="site-header" id="top">\n<div class="header-inner">\n<a class="brand" href="../index.html">\n<span class="brand-mark">D</span>\n<span class="brand-copy"><strong>DPRO LINE SYSTEMS</strong><small>OFFICIAL PRODUCT SITE</small></span>\n</a>\n<button class="menu-button" type="button" aria-expanded="false" aria-controls="global-nav" aria-label="メニューを開く"><span></span><span></span><span></span></button>\n<nav class="global-nav" id="global-nav">\n<a href="../systems.html">システム一覧</a>\n<a href="#catalog">写真カタログ</a>\n<a href="#experience">実画面</a>\n<a href="../index.html#why">DPROについて</a>\n<a class="nav-cta" href="https://lin.ee/YxJGXV6D" target="_blank" rel="noopener">LINEでデモを見る</a>\n</nav>\n</div>\n</header>\n\n<main>\n<section class="product-hero">\n<div class="product-hero-copy reveal">\n<div class="product-breadcrumb"><a href="../systems.html">システム一覧</a><span>/</span><span>ベーカリー</span></div>\n<span class="product-symbol">BK</span>\n<p class="eyebrow">PHOTO CATALOG × LINE PREORDER</p>\n<h1>DPRO BAKERY LINE</h1>\n<h2 class="headline-lines headline-fixed">\n  <span>パンの魅力を写真で伝え、</span>\n  <span>そのままLINEで取り置きへ。</span>\n</h2>\n<p>写真・価格・説明・売り切れ情報をオーナー画面から更新。公開カタログは、店舗ホームページやSNSの商品ページとしても使えます。</p>\n<div class="hero-actions">\n<a class="button button-primary" href="https://dpromstk2000-lab.github.io/bakery-line-system/catalog.html?shop_code=bakery_demo&catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&v=32" target="_blank" rel="noopener">写真付きカタログを見る</a>\n<a class="button button-secondary" href="#experience">全画面を体験する</a>\n</div>\n<div class="bakery-value-strip">\n<div><strong>写真付き公式カタログ</strong><small>パンを写真・価格・説明で紹介</small></div>\n<div><strong>そのまま取り置き</strong><small>選んだ商品をLINEへ自動追加</small></div>\n<div><strong>店舗サイトにも掲載</strong><small>固定URLをHP・SNSで共用</small></div>\n<div><strong>画像を自動軽量化</strong><small>WebP圧縮・遅延読み込み</small></div>\n</div>\n</div>\n\n<div class="product-visual product-visual-live reveal">\n<div class="hero-live-monitor">\n<div class="live-browser-bar"><span></span><span></span><span></span><b>写真付き公式商品カタログ</b></div>\n<iframe title="DPROベーカリー 写真付き商品カタログ" loading="eager" src="https://dpromstk2000-lab.github.io/bakery-line-system/catalog.html?shop_code=bakery_demo&amp;catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&amp;api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&amp;v=32"></iframe>\n</div>\n<div class="hero-live-phone">\n<iframe title="DPROベーカリー LINE取り置き画面" loading="eager" src="https://dpromstk2000-lab.github.io/bakery-line-system/wallet.html?shop_code=bakery_demo&amp;api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&amp;catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&amp;v=32"></iframe>\n</div>\n<div class="hero-live-tablet">\n<iframe title="DPROベーカリー 商品・写真管理画面" loading="eager" src="https://dpromstk2000-lab.github.io/bakery-line-system/catalog-admin.html?shop_code=bakery_demo&amp;catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&amp;v=32"></iframe>\n</div>\n<div class="hero-live-label"><span>NEW VALUE</span><strong>カタログから取り置きまで連動</strong></div>\n</div>\n</section>\n\n<section class="sales-summary section">\n<div class="section-heading reveal">\n<p class="eyebrow">UNDERSTAND IN 30 SECONDS</p>\n<h2 class="headline-lines headline-fixed"><span>30秒で分かる、</span><span>新しいベーカリー集客。</span></h2>\n<p>単なる取り置きフォームではなく、商品の魅力を伝えるところから予約・店舗管理までをつなぎます。</p>\n</div>\n<div class="sales-summary-grid">\n<article class="sales-summary-card reveal"><span class="sales-summary-number">01</span><h3>写真で選ばれる</h3><ul><li>商品写真・価格・紹介文を掲載</li><li>おすすめ・新商品・売り切れを表示</li><li>カテゴリーとアレルギー情報にも対応</li></ul></article>\n<article class="sales-summary-card reveal"><span class="sales-summary-number">02</span><h3>そのまま予約へ</h3><ul><li>カタログからLINE取り置きへ移動</li><li>選んだ商品を1個自動追加</li><li>受け取り日時と数量を確認して受付</li></ul></article>\n</div>\n<div class="sales-problems reveal">\n<div class="sales-problems-heading"><span class="sales-summary-number">03</span><h3>よくある悩み → 解決</h3><p>小規模店舗でも更新しやすく、商品紹介と予約受付を一つにします。</p></div>\n<div class="sales-problem-grid">\n<article class="sales-problem-card">\n<div class="sales-problem-before"><span>悩み</span><strong>SNS投稿が流れて商品一覧にならない</strong></div>\n<div class="sales-problem-arrow">↓</div>\n<div class="sales-problem-after"><span>解決</span><strong>固定URLの公式パンカタログに集約</strong></div>\n</article>\n<article class="sales-problem-card">\n<div class="sales-problem-before"><span>悩み</span><strong>電話・DMの取り置き確認が大変</strong></div>\n<div class="sales-problem-arrow">↓</div>\n<div class="sales-problem-after"><span>解決</span><strong>写真を見て選び、LINEで予約完了</strong></div>\n</article>\n<article class="sales-problem-card">\n<div class="sales-problem-before"><span>悩み</span><strong>ホームページの商品更新が難しい</strong></div>\n<div class="sales-problem-arrow">↓</div>\n<div class="sales-problem-after"><span>解決</span><strong>オーナー画面だけで写真・価格を更新</strong></div>\n</article>\n</div>\n</div>\n</section>\n\n<section class="section section-soft" id="catalog">\n<div class="bakery-catalog-callout reveal">\n<div class="catalog-copy">\n<p class="eyebrow">OFFICIAL PRODUCT CATALOG</p>\n<h2 class="headline-lines headline-fixed"><span>ホームページを作り直さなくても、</span><span>パンの公式カタログが持てます。</span></h2>\n<p>公開URLを店舗サイト、Instagramプロフィール、Googleビジネスプロフィール、LINEリッチメニューに貼るだけ。お客様はLINEを開いていない時でも商品を閲覧できます。</p>\n<ul>\n<li>写真・価格・短い説明・詳しい説明</li>\n<li>販売中・売り切れ・非表示を即時切替</li>\n<li>取り置き可能商品と店頭販売のみを区別</li>\n<li>画像はWebPへ自動圧縮して軽量表示</li>\n</ul>\n<div class="hero-actions">\n<a class="button button-primary" href="https://dpromstk2000-lab.github.io/bakery-line-system/catalog.html?shop_code=bakery_demo&catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&v=32" target="_blank" rel="noopener">実際の公開カタログを開く</a>\n<a class="button button-secondary" href="https://dpromstk2000-lab.github.io/bakery-line-system/catalog-admin.html?shop_code=bakery_demo&catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&v=32" target="_blank" rel="noopener">商品管理を体験する</a>\n</div>\n<div class="bakery-url-note"><small>店舗サイトやSNSにも掲載できる固定URL</small><code>https://dpromstk2000-lab.github.io/bakery-line-system/catalog.html?shop_code=bakery_demo&catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&v=32</code></div>\n</div>\n<div class="catalog-screen">\n<div class="live-browser-bar"><span></span><span></span><span></span><b>店舗公式パンカタログ</b></div>\n<iframe title="店舗公式パンカタログ実画面" loading="lazy" src="https://dpromstk2000-lab.github.io/bakery-line-system/catalog.html?shop_code=bakery_demo&amp;catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&amp;api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&amp;v=32"></iframe>\n</div>\n</div>\n\n<div class="bakery-flow">\n<article class="reveal"><span>1</span><h3>商品・写真を登録</h3><p>オーナーが写真、価格、説明、公開状態を保存します。</p></article>\n<article class="reveal"><span>2</span><h3>カタログへ即時反映</h3><p>公開URLに商品写真と最新の販売状態が表示されます。</p></article>\n<article class="reveal"><span>3</span><h3>お客様が商品を選択</h3><p>写真を見て、欲しいパンの「取り置き」を押します。</p></article>\n<article class="reveal"><span>4</span><h3>LINEで予約完了</h3><p>商品が自動追加され、受取日時を選んで受付できます。</p></article>\n</div>\n</section>\n\n<section class="product-intro section">\n<div class="section-heading reveal">\n<p class="eyebrow">BUILT FOR BAKERIES</p>\n<h2 class="headline-lines headline-fixed"><span>カタログ、取り置き、会員施策を、</span><span>一つのベーカリー専用システムに。</span></h2>\n<p>新しい写真カタログを主役に、既存の会員証・スタッフ対応・ECOレスキューまで連動します。</p>\n</div>\n<div class="product-feature-grid">\n<article class="product-feature reveal"><span>01</span><h3>写真付き商品管理</h3><p>写真、価格、説明、カテゴリーをオーナーが更新。</p></article>\n<article class="product-feature reveal"><span>02</span><h3>公開商品カタログ</h3><p>店舗サイトやSNSでも使える固定URLを発行。</p></article>\n<article class="product-feature reveal"><span>03</span><h3>カタログ取り置き</h3><p>選んだ商品をLINE取り置き画面へ自動追加。</p></article>\n<article class="product-feature reveal"><span>04</span><h3>売り切れ・非表示</h3><p>販売状態を切り替え、案内間違いを防止。</p></article>\n<article class="product-feature reveal"><span>05</span><h3>LINE会員証</h3><p>会員情報、残高、予約履歴をスマートフォンに表示。</p></article>\n<article class="product-feature reveal"><span>06</span><h3>スタッフ受け渡し</h3><p>本日の予約、準備、受け渡し状況を店舗で共有。</p></article>\n<article class="product-feature reveal"><span>07</span><h3>ECOレスキュー</h3><p>当日商品の販売導線で食品ロス対策を支援。</p></article>\n<article class="product-feature reveal"><span>08</span><h3>定休日自動切替</h3><p>休業日や受付終了日は予約可能日を安全に調整。</p></article>\n</div>\n</section>\n\n<section class="experience-section section section-dark" id="experience">\n<div class="section-heading section-heading-light reveal">\n<p class="eyebrow">LIVE PRODUCT EXPERIENCE</p>\n<h2 class="headline-lines headline-fixed"><span>説明だけでなく、</span><span>本物のカタログと管理画面を操作。</span></h2>\n<p>公開カタログ、商品管理、LINE取り置き、店舗画面を別タブまたは拡大表示で確認できます。</p>\n</div>\n\n<div class="live-showcase">\n<article class="live-product reveal">\n<div class="live-copy">\n<span>01 / PUBLIC CATALOG</span>\n<h3>お客様向け<br>写真付きパンカタログ</h3>\n<p>写真、価格、説明、売り切れ情報から商品を選び、そのまま取り置きへ進めます。</p>\n<ul><li>写真付き商品一覧</li><li>カテゴリー・検索</li><li>取り置きボタン</li></ul>\n<div class="live-actions">\n<button class="button button-primary button-zoom js-screen-modal" type="button" data-screen-title="写真付きパンカタログ" data-screen-url="https://dpromstk2000-lab.github.io/bakery-line-system/catalog.html?shop_code=bakery_demo&catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&v=32">画面を拡大表示</button>\n<a class="button button-secondary" href="https://dpromstk2000-lab.github.io/bakery-line-system/catalog.html?shop_code=bakery_demo&catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&v=32" target="_blank" rel="noopener">別タブで開く</a>\n</div>\n</div>\n<div class="live-device live-desktop">\n<div class="live-browser-bar"><span></span><span></span><span></span><b>公開パンカタログ</b></div>\n<iframe title="DPROベーカリー公開カタログ" loading="lazy" src="https://dpromstk2000-lab.github.io/bakery-line-system/catalog.html?shop_code=bakery_demo&amp;catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&amp;api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&amp;v=32"></iframe>\n</div>\n</article>\n\n<article class="live-product live-product-reverse reveal">\n<div class="live-copy">\n<span>02 / CATALOG ADMIN</span>\n<h3>オーナー用<br>商品・写真管理</h3>\n<p>パンごとの写真、価格、説明、取り置き可否、売り切れ状態を管理できます。</p>\n<ul><li>画像のWebP自動圧縮</li><li>商品・価格・説明編集</li><li>公開状態・表示順管理</li></ul>\n<div class="demo-code-card"><span>DEMO CODE</span><strong>1234</strong><small>画面上部の管理コード</small></div>\n<div class="live-actions">\n<button class="button button-primary button-zoom js-screen-modal" type="button" data-screen-title="商品・写真・カタログ管理" data-screen-url="https://dpromstk2000-lab.github.io/bakery-line-system/catalog-admin.html?shop_code=bakery_demo&catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&v=32">画面を拡大表示</button>\n<a class="button button-secondary" href="https://dpromstk2000-lab.github.io/bakery-line-system/catalog-admin.html?shop_code=bakery_demo&catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&v=32" target="_blank" rel="noopener">別タブで開く</a>\n</div>\n</div>\n<div class="live-device live-desktop">\n<div class="live-browser-bar"><span></span><span></span><span></span><b>商品・写真・カタログ管理</b></div>\n<iframe title="DPROベーカリー商品カタログ管理" loading="lazy" src="https://dpromstk2000-lab.github.io/bakery-line-system/catalog-admin.html?shop_code=bakery_demo&amp;catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&amp;v=32"></iframe>\n</div>\n</article>\n\n<article class="live-product reveal">\n<div class="live-copy">\n<span>03 / LINE PREORDER</span>\n<h3>お客様用<br>会員証・取り置き画面</h3>\n<p>カタログで選択した商品を自動追加し、受け取り日と時間を確認して予約できます。</p>\n<ul><li>LINEデジタル会員証</li><li>商品・数量・受取日時</li><li>いつものパン・予約履歴</li></ul>\n<div class="live-actions">\n<button class="button button-primary button-zoom js-screen-modal" type="button" data-screen-title="LINE会員証・取り置き" data-screen-url="https://dpromstk2000-lab.github.io/bakery-line-system/wallet.html?shop_code=bakery_demo&api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&v=32">画面を拡大表示</button>\n<a class="button button-secondary" href="https://dpromstk2000-lab.github.io/bakery-line-system/wallet.html?shop_code=bakery_demo&api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&catalog_api=https%3A%2F%2Fdpro-bakery-catalog-api.dpromstk2000.workers.dev&v=32" target="_blank" rel="noopener">別タブで開く</a>\n</div>\n</div>\n<div class="live-device live-phone">\n<iframe title="DPROベーカリーLINE会員証・取り置き" loading="lazy" src="https://dpromstk2000-lab.github.io/bakery-line-system/wallet.html?shop_code=bakery_demo&amp;api=https%3A%2F%2Fdpro-bakery-wallet-api.dpromstk2000.workers.dev&amp;ca