name: STEP TAKEOUT Site Latest

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/step-takeout-site-latest.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: step-takeout-site-latest
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Confirm repository
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "dpromstk2000-lab/dpro-line-systems-site"

