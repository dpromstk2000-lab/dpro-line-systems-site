      - name: Update takeout catalog card
        shell: bash
        env:
          OLD_CARD_B64: ""
          NEW_CARD_B64: ""
        run: |
          set -euo pipefail
          python3 - <<'PY2'
          from pathlib import Path
          import base64
          path = Path('systems.html')
          text = path.read_text(encoding='utf-8')
          old = base64.b64decode(__import__('os').environ['OLD_CARD_B64']).decode('utf-8')
          new = base64.b64decode(__import__('os').environ['NEW_CARD_B64']).decode('utf-8')
          if new in text:
              print('Catalog card already updated.')
          elif old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')
              print('Catalog card updated.')
          else:
              raise SystemExit('Existing takeout catalog card was not found; stopped safely.')
          PY2

      - name: Validate updated site
        shell: bash
        run: |
          set -euo pipefail
          test -s systems/takeout.html
          test -s systems.html
          grep -Fq "DPRO-SITE-TAKEOUT-NEXT-20260722" systems/takeout.html
          grep -Fq "DPRO テイクアウト・モバイルオーダー LINE" systems/takeout.html
          grep -Fq "STEP TAKEOUT-18 完成版" systems/takeout.html
          grep -Fq "TAKEOUT-17" systems/takeout.html || true
          grep -Fq "DPRO NEXT完成版" systems.html
          grep -Fq "STEP TAKEOUT-18完成" systems.html
          grep -Fq "index.html?preview=1&amp;v=takeout-site-18" systems.html
          python3 - <<'PY2'
          from html.parser import HTMLParser
          from pathlib import Path
          import sys
          class Checker(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids=[]
              def handle_starttag(self, tag, attrs):
                  for k,v in attrs:
                      if k=='id' and v:
                          self.ids.append(v)
          for filename in ['systems/takeout.html','systems.html']:
              text=Path(filename).read_text(encoding='utf-8')
              p=Checker(); p.feed(text)
              dup=sorted({x for x in p.ids if p.ids.count(x)>1})
              if dup:
                  print(filename,'duplicate ids',dup)
                  sys.exit(1)
              if not text.lower().rstrip().endswith('</html>'):
                  print(filename,'missing html close')
                  sys.exit(1)
          print('HTML validation OK')
          PY2

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- systems/takeout.html systems.html; then
            echo "Already up to date."
            exit 0
          fi
          git config user.name "DPRO GitHub Actions"
          git config user.email "actions@users.noreply.github.com"
          git add systems/takeout.html systems.html
          git commit -m "Update takeout product site to DPRO NEXT completed version"
          git push origin HEAD:main

      - name: Summary
        shell: bash
        run: |
          {
            echo "## DPRO Takeout product site updated"
            echo "- Product name: DPRO テイクアウト・モバイルオーダー LINE"
            echo "- Product page: STEP TAKEOUT-18 completed version"
            echo "- Catalog card: DPRO NEXT completed version"
            echo "- URL: https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/takeout.html?v=takeout-next-18"
          } >> "$GITHUB_STEP_SUMMARY"
