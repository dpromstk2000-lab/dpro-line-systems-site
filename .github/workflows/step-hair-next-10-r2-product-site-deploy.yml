name: STEP HAIR-NEXT-10-R2 Product Site Deploy

"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-hair-next-10-r2-product-site-deploy.yml"
      - ".github/workflows/hair-next-10-product-site-payload.html"
      - ".github/workflows/hair-next-10-operation-guide-payload.pdf"

permissions:
  contents: write

concurrency:
  group: step-hair-next-10-r2-product-site-deploy
  cancel-in-progress: false

jobs:
  deploy-hair-next10-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate uploaded payloads
        shell: bash
        run: |
          set -euo pipefail
          test -s ".github/workflows/hair-next-10-product-site-payload.html"
          test -s ".github/workflows/hair-next-10-operation-guide-payload.pdf"
          test "$(stat -c%s ".github/workflows/hair-next-10-operation-guide-payload.pdf")" -gt 100000
          grep -q 'STEP HAIR-NEXT-10 / PRODUCT SITE FINAL / 20260723' ".github/workflows/hair-next-10-product-site-payload.html"
          grep -q 'view=catalog' ".github/workflows/hair-next-10-product-site-payload.html"
          grep -q 'view=checkin' ".github/workflows/hair-next-10-product-site-payload.html"
          grep -q 'DPRO_HAIR_LINE_OPERATION_EXPERIENCE_20260723.pdf' ".github/workflows/hair-next-10-product-site-payload.html"

      - name: Deploy product page and PDF
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p systems docs
          cp ".github/workflows/hair-next-10-product-site-payload.html" "systems/hair-salon.html"
          cp ".github/workflows/hair-next-10-operation-guide-payload.pdf" "docs/DPRO_HAIR_LINE_OPERATION_EXPERIENCE_20260723.pdf"

      - name: Update systems catalog card
        shell: bash
        env:
          NEW_CARD: |
            <a class="catalog-card reveal is-live" href="systems/hair-salon.html">
              <div class="catalog-card-top">
                <span class="catalog-code">HR</span>
                <span class="catalog-status">DPRO NEXT完成版</span>
              </div>
              <div class="catalog-visual catalog-live-visual catalog-live-hair">
                <iframe title="美容室NEXT実画面プレビュー" loading="lazy" src="https://dpromstk2000-lab.github.io/dpro-hair-salon-line/member.html?demo=1&amp;line_user_id=demo_hair_line_001&amp;v=hair-next-10"></iframe>
                <span class="catalog-live-badge">HAIR NEXT-10完成</span>
              </div>
              <div class="catalog-card-copy">
                <small>美容・健康</small>
                <h3>美容室</h3>
                <p>前回と同じ予約・写真付きカタログ・QR来店受付・360°美容カルテ・再来店フォロー。</p>
                <b class="catalog-card-cta">NEXT完成版を見る →</b>
              </div>
            </a>
        run: |
          set -euo pipefail
          python - <<'PY_PATCH'
          from pathlib import Path
          import os
          import re

          path = Path("systems.html")
          text = path.read_text(encoding="utf-8")
          replacement = os.environ["NEW_CARD"].strip()

          pattern = re.compile(
              r'<a class="catalog-card reveal is-live" href="systems/hair-salon\.html">.*?</a>',
              re.S,
          )

          if "HAIR NEXT-10完成" in text and "DPRO NEXT完成版" in text:
              print("Hair catalog card is already updated.")
          else:
              updated, count = pattern.subn(replacement, text, count=1)
              if count != 1:
                  raise RuntimeError(f"Hair catalog card replacement count: {count}")
              path.write_text(updated, encoding="utf-8")
              print("Hair catalog card updated.")
          PY_PATCH

      - name: Validate deployed files
        shell: bash
        run: |
          set -euo pipefail
          test -s systems/hair-salon.html
          test -s docs/DPRO_HAIR_LINE_OPERATION_EXPERIENCE_20260723.pdf
          test "$(stat -c%s docs/DPRO_HAIR_LINE_OPERATION_EXPERIENCE_20260723.pdf)" -gt 100000

          grep -q 'STEP HAIR-NEXT-10 / PRODUCT SITE FINAL / 20260723' systems/hair-salon.html
          grep -q 'view=catalog' systems/hair-salon.html
          grep -q 'view=checkin' systems/hair-salon.html
          grep -q 'system-check.html' systems/hair-salon.html
          grep -q 'DPRO_HAIR_LINE_OPERATION_EXPERIENCE_20260723.pdf' systems/hair-salon.html

          grep -q 'DPRO NEXT完成版' systems.html
          grep -q 'HAIR NEXT-10完成' systems.html
          grep -q '前回と同じ予約・写真付きカタログ・QR来店受付' systems.html

          python - <<'PY_VALIDATE'
          from pathlib import Path
          import re

          text = Path("systems/hair-salon.html").read_text(encoding="utf-8")
          ids = re.findall(r'\bid="([^"]+)"', text.split("<script", 1)[0])
          duplicates = sorted(set(item for item in ids if ids.count(item) > 1))
          assert not duplicates, duplicates

          scripts = re.findall(
              r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
              text,
              re.S | re.I,
          )
          Path("/tmp/hair-next10-product.js").write_text(
              "\n".join(scripts),
              encoding="utf-8",
          )
          print("Hair NEXT-10 product validation: OK")
          PY_VALIDATE

          node --check /tmp/hair-next10-product.js

      - name: Remove temporary deployment files
        shell: bash
        run: |
          set -euo pipefail
          rm -f ".github/workflows/step-hair-next-10-r2-product-site-deploy.yml"
          rm -f ".github/workflows/step-hair-next-10-product-site-guide.yml"
          rm -f ".github/workflows/hair-next-10-product-site-payload.html"
          rm -f ".github/workflows/hair-next-10-operation-guide-payload.pdf"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-10-R2 publish product page PDF and catalog card"
          git push origin main
