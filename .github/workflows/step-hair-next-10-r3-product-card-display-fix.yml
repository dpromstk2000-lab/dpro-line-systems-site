name: STEP HAIR-NEXT-10-R3 Product Card Display Fix

"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/step-hair-next-10-r3-product-card-display-fix.yml"

permissions:
  contents: write

concurrency:
  group: step-hair-next-10-r3-product-card-display-fix
  cancel-in-progress: false

jobs:
  fix-hair-product-cards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fix invisible experience cards
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY_FIX'
          from pathlib import Path

          path = Path("systems/hair-salon.html")
          text = path.read_text(encoding="utf-8")

          old_marker = "STEP HAIR-NEXT-10 / PRODUCT SITE FINAL / 20260723"
          new_marker = "STEP HAIR-NEXT-10-R3 / PRODUCT CARD DISPLAY FIX / 20260723"

          reveal_count = text.count('class="experience-card reveal"')
          plain_count = text.count('class="experience-card"')

          if reveal_count == 8:
              text = text.replace(
                  'class="experience-card reveal"',
                  'class="experience-card"',
              )
          elif reveal_count == 0 and plain_count == 8:
              print("Experience-card classes are already fixed.")
          else:
              raise RuntimeError(
                  f"Unexpected experience card state: reveal={reveal_count}, plain={plain_count}"
              )

          if old_marker in text:
              text = text.replace(old_marker, new_marker, 1)
          elif new_marker not in text:
              raise RuntimeError("Product version marker was not found.")

          defensive_css = """
          /* STEP HAIR-NEXT-10-R3: 実画面カードを必ず表示 */
          .experience-card{
            opacity:1!important;
            transform:none!important;
            visibility:visible!important;
          }
          """

          if "STEP HAIR-NEXT-10-R3: 実画面カードを必ず表示" not in text:
              text = text.replace("</style>", defensive_css + "\n</style>", 1)

          path.write_text(text, encoding="utf-8")
          PY_FIX

      - name: Validate product page
        shell: bash
        run: |
          set -euo pipefail
          test -s systems/hair-salon.html
          grep -q "STEP HAIR-NEXT-10-R3 / PRODUCT CARD DISPLAY FIX / 20260723" systems/hair-salon.html
          grep -q 'STEP HAIR-NEXT-10-R3: 実画面カードを必ず表示' systems/hair-salon.html
          ! grep -q 'class="experience-card reveal"' systems/hair-salon.html

          python - <<'PY_VALIDATE'
          from pathlib import Path
          import re

          text = Path("systems/hair-salon.html").read_text(encoding="utf-8")
          assert text.count('class="experience-card"') == 8
          assert "opacity:1!important" in text
          assert "visibility:visible!important" in text

          ids = re.findall(r'\bid="([^"]+)"', text.split("<script", 1)[0])
          duplicates = sorted(set(x for x in ids if ids.count(x) > 1))
          assert not duplicates, duplicates

          scripts = re.findall(
              r"<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>",
              text,
              re.S | re.I,
          )
          Path("/tmp/hair-next10-r3-product.js").write_text(
              "\n".join(scripts),
              encoding="utf-8",
          )
          print("HAIR NEXT-10-R3 validation: OK")
          PY_VALIDATE

          node --check /tmp/hair-next10-r3-product.js

      - name: Remove temporary workflow
        shell: bash
        run: rm -f ".github/workflows/step-hair-next-10-r3-product-card-display-fix.yml"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "DPRO Deploy Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "STEP HAIR-NEXT-10-R3 show all product experience cards"
          git push origin main
