name: One-time Welfare Equipment safe preview fix

on:
  push:
    paths:
      - ".github/workflows/welfare-equipment-preview-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: welfare-equipment-preview-fix
  cancel-in-progress: false

jobs:
  fix-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout product site
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable safe product-page demo previews
        shell: bash
        env:
          SAFE_PREVIEW_SCRIPT_B64: ""
        run: |
          set -euo pipefail
          python - <<'PYCODE'
          from pathlib import Path
          import base64
          import os
          import re

          page_path = Path("systems/welfare-equipment.html")
          page = page_path.read_text(encoding="utf-8")

          base = "https://dpromstk2000-lab.github.io/dpro-welfare-equipment-line/"
          safe_query = (
              "?demo=1&auto=1&office_code=dpro_welfare_equipment_demo"
              "&v=WELFARE-EQUIP-10-R1"
          )

          url_pattern = re.compile(
              r"https://dpromstk2000-lab\.github\.io/"
              r"dpro-welfare-equipment-line/([a-z0-9-]+\.html)"
              r"(?:\?[^\"'<>\s]*)?",
              re.I,
          )
          page = url_pattern.sub(
              lambda match: base + match.group(1) + safe_query,
              page,
          )

          marker = "WELFARE-EQUIP-SAFE-PREVIEW-AUTO-OPEN"
          safe_script = base64.b64decode(
              os.environ["SAFE_PREVIEW_SCRIPT_B64"]
          ).decode("utf-8")

          if marker not in page:
              anchor = '<script src="../script.js"></script>'
              if anchor not in page:
                  raise SystemExit("script.js anchor was not found")
              page = page.replace(anchor, anchor + safe_script, 1)

          page_path.write_text(page, encoding="utf-8")
          PYCODE

      - name: Validate safe preview patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PYCODE'
          from pathlib import Path
          import re

          page = Path("systems/welfare-equipment.html").read_text(encoding="utf-8")
          marker = "WELFARE-EQUIP-SAFE-PREVIEW-AUTO-OPEN"
          required_pages = [
              "owner.html",
              "planning.html",
              "contract.html",
              "aftercare.html",
              "billing.html",
              "operations.html",
              "system-check.html",
          ]

          if page.count(marker) != 1:
              raise SystemExit("Safe preview script marker is missing or duplicated")

          for name in required_pages:
              expected = (
                  f"/dpro-welfare-equipment-line/{name}"
                  "?demo=1&auto=1&office_code=dpro_welfare_equipment_demo"
                  "&v=WELFARE-EQUIP-10-R1"
              )
              if expected not in page:
                  raise SystemExit(f"Safe preview URL is missing: {name}")

          match = re.search(
              r"<script>\s*/\* WELFARE-EQUIP-SAFE-PREVIEW-AUTO-OPEN \*/"
              r"(.*?)</script>",
              page,
              re.S,
          )
          if not match:
              raise SystemExit("Inline preview JavaScript was not found")
          Path("/tmp/welfare-preview-check.js").write_text(
              '"use strict";\n' + match.group(1),
              encoding="utf-8",
          )
          PYCODE
          node --check /tmp/welfare-preview-check.js

      - name: Commit patch and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/welfare-equipment-preview-fix.yml
          git add systems/welfare-equipment.html .github/workflows/welfare-equipment-preview-fix.yml
          git commit -m "STEP WELFARE-EQUIP-SITE-1-R1 auto open safe demo previews"
          git push

      - name: Wait for GitHub Pages deployment
        shell: bash
        run: |
          set -euo pipefail
          url="https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/welfare-equipment.html"
          for attempt in $(seq 1 40); do
            if curl --fail --silent --show-error --location --max-time 30 "$url" \
              | grep -q "WELFARE-EQUIP-SAFE-PREVIEW-AUTO-OPEN"; then
              echo "Updated GitHub Pages detected."
              exit 0
            fi
            echo "Waiting for Pages deployment: ${attempt}/40"
            sleep 10
          done
          echo "Updated page was not detected within the wait period."
          exit 1

      - name: Browser-test embedded business screens
        shell: bash
        env:
          BROWSER_TEST_JS_B64: ""
        run: |
          set -euo pipefail
          npm install --no-save --no-package-lock playwright@1.54.1
          npx playwright install chromium
          echo "$BROWSER_TEST_JS_B64" | base64 --decode > /tmp/verify-welfare-previews.js
          node /tmp/verify-welfare-previews.js
