name: "STEP YOGA-NEXT-10C | 操作体験シート お客様画面スクリーンショット修正"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/STEP-YOGA-NEXT-10C.yml"

permissions:
  contents: write

concurrency:
  group: yoga-next-10c-operation-sheet-repair
  cancel-in-progress: false

jobs:
  operation-sheet-repair:
    name: "YOGA-NEXT-10C operation sheet customer screenshot repair"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      WORKFLOW_PATH: ".github/workflows/STEP-YOGA-NEXT-10C.yml"
      BEFORE_TAG: "dpro-site-yoga-next-10c-before-20260724"
      EXPECTED_CUSTOMER_SCREEN_BLOB_SHA: "4d667596aebf8c5ce90fb2834f32dcb957709b83"
      EXPECTED_SHEET_HTML_BLOB_SHA: "fec74b01b6a8ee810c8f9c9e2a45d8410e2363b3"
      EXPECTED_PDF_BLOB_SHA: "ee486026c7c51fdc20bd8e25cb483bc9cc1218a5"
      EXPECTED_PNG_BLOB_SHA: "e5f645e8db42705281013ac676d663ff23353952"
      EXPECTED_QR_REPORT_BLOB_SHA: "dd4ac3fcf495a30aecb9c10eebb329cd4b665bdb"
      EXPECTED_SITE_RESULT_BLOB_SHA: "85cdc4505230bd5624779ea42b067d8b18a9dc30"

    steps:
      - name: "1. Checkout product-site repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "2. NEXT-10完成状態・空画像・基準ファイル確認"
        shell: bash
        run: |
          set -Eeuo pipefail

          declare -A expected=(
            ["assets/yoga-next/screens/customer.png"]="$EXPECTED_CUSTOMER_SCREEN_BLOB_SHA"
            ["assets/yoga-next/operation-sheet.html"]="$EXPECTED_SHEET_HTML_BLOB_SHA"
            ["assets/pdfs/dpro-yoga-line-next-operation-guide.pdf"]="$EXPECTED_PDF_BLOB_SHA"
            ["assets/pdfs/dpro-yoga-line-next-operation-guide.png"]="$EXPECTED_PNG_BLOB_SHA"
            ["assets/yoga-next/operation-sheet-qr-check.json"]="$EXPECTED_QR_REPORT_BLOB_SHA"
            ["dpro-next-yoga-next-10-site-result.json"]="$EXPECTED_SITE_RESULT_BLOB_SHA"
          )

          for file in "${!expected[@]}"; do
            [[ -f "$file" ]] || {
              echo "::error file=$file::YOGA-NEXT-10Cの必須ファイルがありません。"
              exit 1
            }
            current="$(git hash-object "$file")"
            [[ "$current" == "${expected[$file]}" ]] || {
              echo "::error file=$file::NEXT-10A完成後の確認済み基準と一致しません。期待=${expected[$file]} / 現在=$current"
              exit 1
            }
          done

          [[ -f "$WORKFLOW_PATH" ]] || {
            echo "::error file=$WORKFLOW_PATH::実行YMLがありません。"
            exit 1
          }

          current_bytes="$(wc -c < assets/yoga-next/screens/customer.png | tr -d ' ')"
          [[ "$current_bytes" -lt 5000 ]] || {
            echo "::error::修正対象のお客様画面が想定した空画像サイズではありません。bytes=$current_bytes"
            exit 1
          }

          mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r HEAD)
          before_sha="$(git rev-parse HEAD)"
          if [[ "${#changed[@]}" -eq 1 && "${changed[0]}" == "$WORKFLOW_PATH" ]]; then
            before_sha="$(git rev-parse HEAD^)"
          fi
          echo "BEFORE_SHA=$before_sha" >> "$GITHUB_ENV"

          {
            echo "## STEP YOGA-NEXT-10C"
            echo "- NEXT-10A / NEXT-10B Actions: 成功"
            echo "- 発見事項: お客様画面スクリーンショット 430x900 / 2,465bytes"
            echo "- 判定: 実画面ではなく、ほぼ単色の空画像"
            echo "- 修正: embed_demo=1で再撮影"
            echo "- 追加検査: 容量・エントロピー・輝度差・色数・エッジ率"
            echo "- PDF / PNG再生成・最終PDF QR6件再検査"
            echo "- Worker / Supabase / API変更: なし"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "3. 変更前バックアップタグ作成"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$BEFORE_TAG")"
            [[ "$tag_sha" == "$BEFORE_SHA" ]] || {
              echo "::error::既存バックアップタグが別SHAを指しています。"
              exit 1
            }
            status="existing_same_sha"
          else
            git tag -a "$BEFORE_TAG" "$BEFORE_SHA" -m "DPRO product site before YOGA-NEXT-10C"
            git push origin "$BEFORE_TAG"
            status="created"
          fi
          echo "BEFORE_TAG_STATUS=$status" >> "$GITHUB_ENV"

      - name: "4. YML・埋込Python構文検査"
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e 'require "yaml"; YAML.load_file(ARGV[0], aliases: true); puts "YAML syntax OK"' "$WORKFLOW_PATH"

          python3 - <<'PY'
          import base64
          code=base64.b64decode("").decode("utf-8")
          compile(code,"<YOGA-NEXT-10C>","exec")
          print("Embedded Python syntax OK")
          PY

      - name: "5. PDF・画像・QR検査依存関係を準備"
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y poppler-utils fonts-noto-cjk
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright pillow opencv-python-headless pypdf
          python3 -m playwright install chromium

      - name: "6. お客様実画面再撮影・PDF/PNG再生成・QR再検査"
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 - <<'PY'
          import base64
          from pathlib import Path
          code=base64.b64decode("").decode("utf-8")
          Path("/tmp/yoga_next_10c.py").write_text(code,encoding="utf-8")
          PY

          python3 /tmp/yoga_next_10c.py

      - name: "7. 実画面・PDF・QR・結果ファイル完成検査"
        shell: bash
        run: |
          set -Eeuo pipefail

          for file in             assets/yoga-next/screens/customer.png             assets/yoga-next/operation-sheet.html             assets/yoga-next/qr-manifest.json             assets/yoga-next/operation-sheet-qr-check.json             assets/pdfs/dpro-yoga-line-next-operation-guide.pdf             assets/pdfs/dpro-yoga-line-next-operation-guide.png             dpro-next-yoga-next-10-site-result.json
          do
            [[ -s "$file" ]] || {
              echo "::error file=$file::修正後成果物がありません。"
              exit 1
            }
          done

          customer_bytes="$(wc -c < assets/yoga-next/screens/customer.png | tr -d ' ')"
          [[ "$customer_bytes" -ge 12000 ]] || {
            echo "::error::修正後お客様画面の容量が小さすぎます。bytes=$customer_bytes"
            exit 1
          }

          pages="$(pdfinfo assets/pdfs/dpro-yoga-line-next-operation-guide.pdf | awk '/^Pages:/{print $2}')"
          [[ "$pages" == "1" ]] || {
            echo "::error::操作体験シートがA4縦1枚ではありません。pages=$pages"
            exit 1
          }

          grep -q '"status": "PASS"' assets/yoga-next/operation-sheet-qr-check.json
          grep -q '"qr_count": 6' assets/yoga-next/operation-sheet-qr-check.json
          grep -q '"customer_screenshot_nonblank": true' dpro-next-yoga-next-10-site-result.json
          grep -q '"step": "YOGA-NEXT-10C"' dpro-next-yoga-next-10-site-result.json
          grep -q 'STEP YOGA-NEXT-10C' assets/yoga-next/operation-sheet.html

      - name: "8. 変更範囲・本体未変更検査"
        shell: bash
        run: |
          set -Eeuo pipefail

          allowed='^(assets/yoga-next/screens/customer\.png|assets/yoga-next/operation-sheet\.html|assets/yoga-next/qr-manifest\.json|assets/yoga-next/operation-sheet-qr-check\.json|assets/pdfs/dpro-yoga-line-next-operation-guide\.(pdf|png)|dpro-next-yoga-next-10-site-result\.json|\.github/workflows/STEP-YOGA-NEXT-10C\.yml)$'
          unexpected="$(git diff --name-only "$BEFORE_SHA" | grep -Ev "$allowed" || true)"
          [[ -z "$unexpected" ]] || {
            echo "::error::想定外の変更ファイル: $unexpected"
            exit 1
          }

          forbidden="$(git diff --name-only "$BEFORE_SHA" | grep -Ei 'systems\.html|systems/yoga\.html|worker\.js|\.sql$|supabase|wrangler' || true)"
          [[ -z "$forbidden" ]] || {
            echo "::error::製品ページ本体・Worker・Supabaseの変更を検出: $forbidden"
            exit 1
          }

          {
            echo "### YOGA-NEXT-10C 検査結果"
            echo "- お客様実画面スクリーンショット: 非空画像PASS"
            echo "- A4縦1枚PDF: PASS"
            echo "- PNG再生成: PASS"
            echo "- 最終PDF内QR 6件: URL一致PASS"
            echo "- 他3画面・製品ページ・一覧カード: 変更なし"
            echo "- Worker / Supabase / API変更: なし"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "9. 成功後YML自身を削除"
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$WORKFLOW_PATH"
          test ! -f "$WORKFLOW_PATH"

      - name: "10. 自動Commit・Push"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add             assets/yoga-next/screens/customer.png             assets/yoga-next/operation-sheet.html             assets/yoga-next/qr-manifest.json             assets/yoga-next/operation-sheet-qr-check.json             assets/pdfs/dpro-yoga-line-next-operation-guide.pdf             assets/pdfs/dpro-yoga-line-next-operation-guide.png             dpro-next-yoga-next-10-site-result.json
          git add -u "$WORKFLOW_PATH"

          git diff --cached --quiet && {
            echo "::error::Commit対象がありません。"
            exit 1
          }

          git commit -m "fix(site): repair YOGA NEXT operation sheet customer screenshot [skip ci]"
          git push origin HEAD:main

          {
            echo "### 修正完了"
            echo "- current_step: COMPLETEを維持"
            echo "- 操作体験シートのお客様画面を実画面へ修正"
            echo "- PDF・PNG・QR6件を再検査"
            echo "- YOGA-NEXT-10C YML: 削除済み"
          } >> "$GITHUB_STEP_SUMMARY"
