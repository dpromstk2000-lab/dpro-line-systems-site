name: "STEP SCHOOL-NEXT-10A | 製品サイト・A4操作体験シート"
run-name: "SCHOOL-NEXT-10A product site and operation sheet by ${{ github.actor }}"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/STEP-SCHOOL-NEXT-10A.yml"

permissions:
  contents: write

concurrency:
  group: school-next-10a-product-site-pdf
  cancel-in-progress: false

jobs:
  product-site-and-pdf:
    name: "SCHOOL-NEXT-10A 製品サイト・操作体験シート"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      WORKFLOW_PATH: ".github/workflows/STEP-SCHOOL-NEXT-10A.yml"
      BEFORE_TAG: "dpro-site-school-next-10-before-20260724"
      EXPECTED_SYSTEMS_BLOB_SHA: "991f03edd78aeb290ba4f51e082cdbd786d6dc8e"
      EXPECTED_SCHOOL_PAGE_BLOB_SHA: "cf3422f9f465a7e530b739210b58b179b696d901"
      PRODUCT_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/school.html"
      CATALOG_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems.html"
      PDF_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/assets/pdfs/dpro-school-line-next-operation-guide.pdf"
      PNG_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/assets/pdfs/dpro-school-line-next-operation-guide.png"

    steps:
      - name: "1. 製品サイトリポジトリ取得"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "2. 対象ファイル・基準状態・重複実行確認"
        id: preflight
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for file in systems.html systems/school.html styles.css script.js "$WORKFLOW_PATH"; do
            [[ -f "$file" ]] || { echo "::error file=$file::必須ファイルがありません。"; exit 1; }
          done

          if grep -q 'STEP SCHOOL-NEXT-10A / DPRO NEXT COMPLETE' systems/school.html \
            && grep -q 'SCHOOL NEXT-10完成' systems.html \
            && [[ -f assets/pdfs/dpro-school-line-next-operation-guide.pdf ]] \
            && [[ -f assets/pdfs/dpro-school-line-next-operation-guide.png ]]; then
            echo "mode=duplicate" >> "$GITHUB_OUTPUT"
            echo "::notice::SCHOOL-NEXT-10Aは完了済みです。再アップロードされたYMLのみ削除します。"
            exit 0
          fi

          [[ "$(git hash-object systems.html)" == "$EXPECTED_SYSTEMS_BLOB_SHA" ]] || { echo "::error file=systems.html::基準版不一致"; exit 1; }
          [[ "$(git hash-object systems/school.html)" == "$EXPECTED_SCHOOL_PAGE_BLOB_SHA" ]] || { echo "::error file=systems/school.html::基準版不一致"; exit 1; }

          mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r HEAD)
          before_sha="$(git rev-parse HEAD)"
          if [[ "${#changed[@]}" -eq 1 && "${changed[0]}" == "$WORKFLOW_PATH" ]]; then
            before_sha="$(git rev-parse HEAD^)"
          fi
          echo "BEFORE_SHA=$before_sha" >> "$GITHUB_ENV"
          echo "mode=apply" >> "$GITHUB_OUTPUT"

      - name: "2B. 完了済みYMLの自動削除"
        if: steps.preflight.outputs.mode == 'duplicate'
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$WORKFLOW_PATH"
          git add -A -- "$WORKFLOW_PATH"
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore(site): remove duplicate SCHOOL-NEXT-10A workflow [skip ci]"
          git push origin main

      - name: "3. 変更前バックアップタグ"
        if: steps.preflight.outputs.mode == 'apply'
        shell: bash
        run: |
          set -Eeuo pipefail
          if git rev-parse "$BEFORE_TAG" >/dev/null 2>&1; then
            [[ "$(git rev-list -n 1 "$BEFORE_TAG")" == "$BEFORE_SHA" ]] || { echo "::error::既存タグの参照先が異なります。"; exit 1; }
          elif git ls-remote --exit-code --tags origin "refs/tags/$BEFORE_TAG" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$BEFORE_TAG:refs/tags/$BEFORE_TAG"
            [[ "$(git rev-list -n 1 "$BEFORE_TAG")" == "$BEFORE_SHA" ]] || exit 1
          else
            git tag -a "$BEFORE_TAG" "$BEFORE_SHA" -m "before SCHOOL-NEXT-10A"
            git push origin "refs/tags/$BEFORE_TAG"
          fi

      - name: "4. YML・埋込Python構文検査"
        if: steps.preflight.outputs.mode == 'apply'
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e 'require "yaml"; YAML.load_file(ARGV[0], aliases: true)' "$WORKFLOW_PATH"
          python3 - <<'PY'
          import base64
          compile(base64.b64decode(""), "school-next-10a.py", "exec")
          print("embedded Python syntax OK")
          PY

      - name: "5. PDF・QR・実画面取得ツール準備"
        if: steps.preflight.outputs.mode == 'apply'
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y poppler-utils fonts-noto-cjk
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright "qrcode[pil]" pillow opencv-python-headless pypdf numpy
          python3 -m playwright install chromium

      - name: "6. 実画面取得・A4 PDF生成・QR読取・製品サイト更新"
        if: steps.preflight.outputs.mode == 'apply'
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import base64
          from pathlib import Path
          Path('/tmp/school_next_10a.py').write_bytes(base64.b64decode(""))
          PY
          python3 /tmp/school_next_10a.py

      - name: "7. ローカル完成検査"
        if: steps.preflight.outputs.mode == 'apply'
        shell: bash
        run: |
          set -Eeuo pipefail
          node --check script.js
          git diff --check
          python3 - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          import json
          import subprocess

          required = [
            Path('systems.html'),
            Path('systems/school.html'),
            Path('assets/pdfs/dpro-school-line-next-operation-guide.pdf'),
            Path('assets/pdfs/dpro-school-line-next-operation-guide.png'),
            Path('assets/school-next/screens/customer.png'),
            Path('assets/school-next/screens/member.png'),
            Path('assets/school-next/screens/owner.png'),
            Path('assets/school-next/screens/ipad.png'),
            Path('assets/school-next/operation-sheet-qr-check.json'),
            Path('dpro-next-school-next-10a-site-result.json'),
          ]
          missing = [str(path) for path in required if not path.exists() or path.stat().st_size == 0]
          if missing:
            raise SystemExit('missing: ' + ', '.join(missing))

          if len(PdfReader(str(required[2])).pages) != 1:
            raise SystemExit('操作体験シートはA4縦1ページである必要があります。')

          qr = json.loads(Path('assets/school-next/operation-sheet-qr-check.json').read_text(encoding='utf-8'))
          if len(qr.get('results', {})) != 6 or not all(item.get('pass') for item in qr['results'].values()):
            raise SystemExit('PDF内QR 6件の読取検査に失敗しました。')

          product = Path('systems/school.html').read_text(encoding='utf-8')
          catalog = Path('systems.html').read_text(encoding='utf-8')
          for marker in ['STEP SCHOOL-NEXT-10A / DPRO NEXT COMPLETE', '操作体験シートPDF', 'school-next-10', '次回案内・フォロー']:
            if marker not in product:
              raise SystemExit('product marker missing: ' + marker)
          for marker in ['DPRO NEXT完成版', 'SCHOOL NEXT-10完成', 'school-next-10']:
            if marker not in catalog:
              raise SystemExit('catalog marker missing: ' + marker)

          allowed_exact = {
            'systems.html', 'systems/school.html',
            'dpro-next-school-next-10a-site-result.json',
          }
          changed = subprocess.run(['git','diff','--name-only'], capture_output=True, text=True, check=True).stdout.splitlines()
          unexpected = [name for name in changed if name not in allowed_exact and not name.startswith('assets/school-next/') and not name.startswith('assets/pdfs/dpro-school-line-next-operation-guide.')]
          if unexpected:
            raise SystemExit('unexpected changes: ' + ', '.join(unexpected))
          print('local completion check PASS')
          PY

      - name: "8. 製品サイト変更をCommit・Push"
        if: steps.preflight.outputs.mode == 'apply'
        id: apply
        shell: bash
        run: |
          set -Eeuo pipefail
          git add systems.html systems/school.html \
            assets/school-next \
            assets/pdfs/dpro-school-line-next-operation-guide.pdf \
            assets/pdfs/dpro-school-line-next-operation-guide.png \
            dpro-next-school-next-10a-site-result.json
          git commit -m "feat(site): apply SCHOOL-NEXT-10A product page and operation sheet"
          applied_commit="$(git rev-parse HEAD)"
          echo "applied_commit=$applied_commit" >> "$GITHUB_OUTPUT"
          git push origin main

      - name: "9. GitHub Pages公開・PDF・PNG・QR最終確認"
        if: steps.preflight.outputs.mode == 'apply'
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/school-next-10a-public
          pass=0
          for attempt in $(seq 1 30); do
            product_status="$(curl -sS -L --max-time 35 -A 'Mozilla/5.0 Chrome/150' -H 'Cache-Control: no-cache' -o /tmp/school-next-10a-public/school.html -w '%{http_code}' "$PRODUCT_URL?verify=$GITHUB_RUN_ID-$attempt" || true)"
            catalog_status="$(curl -sS -L --max-time 35 -A 'Mozilla/5.0 Chrome/150' -H 'Cache-Control: no-cache' -o /tmp/school-next-10a-public/systems.html -w '%{http_code}' "$CATALOG_URL?verify=$GITHUB_RUN_ID-$attempt" || true)"
            pdf_status="$(curl -sS -L --max-time 40 -A 'Mozilla/5.0 Chrome/150' -H 'Cache-Control: no-cache' -o /tmp/school-next-10a-public/guide.pdf -w '%{http_code}' "$PDF_URL?verify=$GITHUB_RUN_ID-$attempt" || true)"
            png_status="$(curl -sS -L --max-time 40 -A 'Mozilla/5.0 Chrome/150' -H 'Cache-Control: no-cache' -o /tmp/school-next-10a-public/guide.png -w '%{http_code}' "$PNG_URL?verify=$GITHUB_RUN_ID-$attempt" || true)"
            if [[ "$product_status" == 200 && "$catalog_status" == 200 && "$pdf_status" == 200 && "$png_status" == 200 ]] \
              && grep -q 'STEP SCHOOL-NEXT-10A / DPRO NEXT COMPLETE' /tmp/school-next-10a-public/school.html \
              && grep -q 'SCHOOL NEXT-10完成' /tmp/school-next-10a-public/systems.html; then
              pass=1
              break
            fi
            sleep 5
          done
          [[ "$pass" == 1 ]] || { echo "::error::製品サイトまたはPDFの公開反映を確認できませんでした。"; exit 1; }

          [[ "$(sha256sum assets/pdfs/dpro-school-line-next-operation-guide.pdf | awk '{print $1}')" == "$(sha256sum /tmp/school-next-10a-public/guide.pdf | awk '{print $1}')" ]] || { echo "::error::公開PDFのSHA256がローカル完成版と一致しません。"; exit 1; }
          [[ "$(sha256sum assets/pdfs/dpro-school-line-next-operation-guide.png | awk '{print $1}')" == "$(sha256sum /tmp/school-next-10a-public/guide.png | awk '{print $1}')" ]] || { echo "::error::公開PNGのSHA256がローカル完成版と一致しません。"; exit 1; }

          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image
          from pypdf import PdfReader
          import cv2
          import json
          import numpy as np

          if len(PdfReader('/tmp/school-next-10a-public/guide.pdf').pages) != 1:
            raise SystemExit('公開PDFが1ページではありません。')
          report = json.loads(Path('assets/school-next/operation-sheet-qr-check.json').read_text(encoding='utf-8'))
          image = Image.open('/tmp/school-next-10a-public/guide.png').convert('RGB')
          sx = image.width / report['page_size'][0]
          sy = image.height / report['page_size'][1]
          detector = cv2.QRCodeDetector()
          for key, box in report['qr_boxes'].items():
            x1,y1,x2,y2 = box
            margin=22
            crop=image.crop((max(0,int((x1-margin)*sx)),max(0,int((y1-margin)*sy)),min(image.width,int((x2+margin)*sx)),min(image.height,int((y2+margin)*sy))))
            arr=cv2.cvtColor(np.array(crop),cv2.COLOR_RGB2BGR)
            decoded,_,_=detector.detectAndDecode(arr)
            if decoded != report['results'][key]['expected']:
              decoded,_,_=detector.detectAndDecode(cv2.resize(arr,None,fx=2,fy=2,interpolation=cv2.INTER_NEAREST))
            if decoded != report['results'][key]['expected']:
              raise SystemExit(f'公開PNG QR読取失敗: {key} -> {decoded!r}')
          print('public PDF/PNG/QR PASS')
          PY

      - name: "10. 完了記録・YML自身削除・最終Commit"
        if: steps.preflight.outputs.mode == 'apply' && success()
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p dpro-next
          completed_at="$(TZ=Asia/Tokyo date --iso-8601=seconds)"
          cat > dpro-next/school-next-10a-completion.yml <<EOF
          step: "SCHOOL-NEXT-10A"
          result: "OK"
          completed_at_jst: "$completed_at"
          product_page: "$PRODUCT_URL"
          catalog_page: "$CATALOG_URL"
          operation_sheet_pdf: "$PDF_URL"
          operation_sheet_png: "$PNG_URL"
          pdf_pages: 1
          qr_codes_checked: 6
          qr_result: "PASS"
          public_verify: "PASS"
          worker_changed: false
          supabase_changed: false
          sql_required: false
          api_changed: false
          next_step: "SCHOOL-NEXT-10B"
          EOF
          sed -i 's/^          //' dpro-next/school-next-10a-completion.yml

          rm -f "$WORKFLOW_PATH"
          git add -A -- dpro-next/school-next-10a-completion.yml "$WORKFLOW_PATH"
          git commit -m "feat(site): complete SCHOOL-NEXT-10A product page and operation sheet [skip ci]"
          git push origin main

          {
            echo "## SCHOOL-NEXT-10A 完了"
            echo ""
            echo "- 製品ページ: PASS"
            echo "- 製品一覧カード: PASS"
            echo "- A4縦1ページPDF: PASS"
            echo "- PDF→PNG: PASS"
            echo "- PDF内QR 6件URL一致: PASS"
            echo "- 公開PDF・PNG SHA一致: PASS"
            echo "- Worker・Supabase・API変更: なし"
            echo "- 次: SCHOOL-NEXT-10B（完成台帳COMPLETE）"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "11. 失敗時ロールバック・失敗台帳"
        if: failure() && steps.preflight.outputs.mode == 'apply'
        shell: bash
        env:
          APPLIED_COMMIT: ${{ steps.apply.outputs.applied_commit }}
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --ff-only origin main || true

          if [[ -n "${APPLIED_COMMIT:-}" ]] && git cat-file -e "$APPLIED_COMMIT^{commit}" 2>/dev/null; then
            if ! git log -1 --pretty=%B | grep -q "revert SCHOOL-NEXT-10A $APPLIED_COMMIT"; then
              git revert --no-edit "$APPLIED_COMMIT"
              git commit --amend -m "revert SCHOOL-NEXT-10A $APPLIED_COMMIT" || true
            fi
          fi

          mkdir -p dpro-next
          failed_at="$(TZ=Asia/Tokyo date --iso-8601=seconds)"
          cat > dpro-next/school-next-10a-failure.yml <<EOF
          step: "SCHOOL-NEXT-10A"
          result: "NG"
          failed_at_jst: "$failed_at"
          rollback_tag: "$BEFORE_TAG"
          product_site_rollback: true
          worker_changed: false
          supabase_changed: false
          api_changed: false
          next_step: "SCHOOL-NEXT-10A-R1_REQUIRED"
          EOF
          sed -i 's/^          //' dpro-next/school-next-10a-failure.yml
          git add -A -- dpro-next/school-next-10a-failure.yml
          if ! git diff --cached --quiet; then
            git commit -m "chore(site): record SCHOOL-NEXT-10A failure"
          fi
          git push origin main || true
