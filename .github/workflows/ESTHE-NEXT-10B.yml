# DPRO エステ LINE
# STEP名: ESTHE-NEXT-10B
#
# 対象リポジトリ:
# - dpromstk2000-lab/dpro-line-systems-site
#
# 対象ファイル:
# - systems/esthe.html
# - systems.html
# - .dpro-next/esthe-next10b-product-site.yml
# - .dpro-next/esthe-next10b-report.txt
#
# 実施する変更:
# - エステ製品ページをDPRO NEXT完成版へ更新
# - 製品一覧カードをDPRO NEXT完成版へ更新
# - 公開デモ・PC・iPad・スタッフ・LINE会員を反映
# - 操作体験シートPDFを反映
# - NEXT-9完成検査への導線を反映
#
# 変更前バックアップタグ:
# - backup-product-site-before-esthe-next10b-YYYYMMDD
#
# 前STEP:
# - ESTHE-NEXT-10A-R3-COMPLETE
#
# 次STEP:
# - ESTHE-NEXT-10C-FINAL-COMPLETE
#
# Worker変更: なし
# Supabase変更: なし
# API変更: なし
#
# 自動検査:
# - 操作体験シートPDF・PNG SHA256
# - HTML構文
# - HTML ID重複
# - 共通JavaScript構文
# - 旧URL・旧バージョン除去
# - 製品一覧カード一意性
# - 全公開URL
# - GitHub Pages反映
# - PC・スマホ横はみ出し
# - 製品一覧カード実表示
#
# 成功後:
# - 自動Commit / Push
# - このYML自身を削除

name: "DPRO ESTHE NEXT-10B - Product Site Completion"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-10B.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-product-site-esthe-next"
  cancel-in-progress: false

env:
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-10B.yml"
  BACKUP_TAG_PREFIX: "backup-product-site-before-esthe-next10b"
  SOURCE_REPO_RAW: "https://raw.githubusercontent.com/dpromstk2000-lab/dpro-esthe-relax-line-liff/main"
  SOURCE_PAGES: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff"
  SITE_PAGES: "https://dpromstk2000-lab.github.io/dpro-line-systems-site"
  PRODUCT_PAGE_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/esthe.html"
  CATALOG_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems.html"
  OPERATION_PDF_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/deliverables/esthe-next-10/DPRO_ESTHE_NEXT_operation_experience_sheet_20260724.pdf"
  OPERATION_PNG_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/deliverables/esthe-next-10/DPRO_ESTHE_NEXT_operation_experience_sheet_20260724.png"
  BOOKING_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/index-brush.html"
  MEMBER_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/member.html?phone=08000003002"
  OWNER_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/owner.html"
  IPAD_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/owner-ipad.html"
  STAFF_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/staff.html"
  SYSTEM_CHECK_URL: "https://dpromstk2000-lab.github.io/dpro-esthe-relax-line-liff/system-check.html"

jobs:
  esthe-next-10b:
    name: "Publish ESTHE NEXT product page and catalog card"
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: "Checkout product-site repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm product-site baseline"
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f systems/esthe.html
          test -f systems.html
          test -f styles.css
          test -f script.js
          grep -q 'step-esthe-16' systems/esthe.html
          [[ "$(grep -o 'href="systems/esthe.html"' systems.html | wc -l)" -eq 1 ]]

      - name: "Confirm ESTHE source completion and operation-sheet integrity"
        shell: bash
        run: |
          set -Eeuo pipefail
          curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 \
            -H "Cache-Control: no-cache" \
            "$SOURCE_REPO_RAW/.dpro-next/esthe-step-state.yml?run=$GITHUB_RUN_ID" \
            -o /tmp/esthe-next10b-source-state.yml
          grep -q 'current_step: "ESTHE-NEXT-10A-R3-COMPLETE"' \
            /tmp/esthe-next10b-source-state.yml
          grep -q 'next_step: "ESTHE-NEXT-10B-PRODUCT-SITE"' \
            /tmp/esthe-next10b-source-state.yml
          grep -q 'public_pdf_sha256_match: true' \
            /tmp/esthe-next10b-source-state.yml
          grep -q 'public_png_sha256_match: true' \
            /tmp/esthe-next10b-source-state.yml
          grep -q 'public_pdf_qr_decode_pass: true' \
            /tmp/esthe-next10b-source-state.yml

          curl -L -sS --retry 3 --connect-timeout 10 --max-time 45 \
            "$SOURCE_REPO_RAW/deliverables/esthe-next-10/operation-sheet-validation.json?run=$GITHUB_RUN_ID" \
            -o /tmp/esthe-next10b-operation-meta.json
          curl -L -sS --retry 3 --connect-timeout 10 --max-time 60 \
            -o /tmp/esthe-next10b-operation.pdf "$OPERATION_PDF_URL?run=$GITHUB_RUN_ID"
          curl -L -sS --retry 3 --connect-timeout 10 --max-time 60 \
            -o /tmp/esthe-next10b-operation.png "$OPERATION_PNG_URL?run=$GITHUB_RUN_ID"

          python3 - <<'PY'
          import hashlib,json
          from pathlib import Path
          meta=json.loads(Path("/tmp/esthe-next10b-operation-meta.json").read_text(encoding="utf-8"))
          pdf_sha=hashlib.sha256(Path("/tmp/esthe-next10b-operation.pdf").read_bytes()).hexdigest()
          png_sha=hashlib.sha256(Path("/tmp/esthe-next10b-operation.png").read_bytes()).hexdigest()
          assert meta["step"]=="ESTHE-NEXT-10A-R2"
          assert meta["a4_portrait"] is True
          assert meta["page_count"]==1
          assert meta["qr_count"]==6 and meta["qr_all_pass"] is True
          assert pdf_sha==meta["sha256"]["pdf"]
          assert png_sha==meta["sha256"]["png"]
          Path("/tmp/esthe-next10b-source-meta.json").write_text(json.dumps({
              "pdf_sha256":pdf_sha,
              "png_sha256":png_sha,
              "qr_count":6,
              "qr_all_pass":True,
          },ensure_ascii=False,indent=2),encoding="utf-8")
          print("ESTHE source and operation sheet: PASS")
          PY

      - name: "Verify all ESTHE public screens"
        shell: bash
        run: |
          set -Eeuo pipefail
          for url in \
            "$BOOKING_URL" \
            "$MEMBER_URL" \
            "$OWNER_URL" \
            "$IPAD_URL" \
            "$STAFF_URL" \
            "$SYSTEM_CHECK_URL" \
            "$OPERATION_PDF_URL"
          do
            code="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 50 \
              -o /dev/null -w "%{http_code}" "$url")"
            [[ "$code" =~ ^2|^3 ]] || {
              echo "::error::ESTHE URL HTTP $code $url"; exit 1;
            }
          done

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi
          JST_DATE="$(TZ=Asia/Tokyo date +%Y%m%d)"
          BASE_TAG="${BACKUP_TAG_PREFIX}-${JST_DATE}"
          BACKUP_TAG="$BASE_TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi
          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" \
            -m "DPRO product site before ESTHE NEXT-10B: $CHANGE_BEFORE_SHA"
          git push origin "refs/tags/$BACKUP_TAG"
          echo "CHANGE_BEFORE_SHA=$CHANGE_BEFORE_SHA" >> "$GITHUB_ENV"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"

      - name: "Apply ESTHE NEXT product-page and catalog changes"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-apply>","exec"))'

      - name: "Run HTML ID JavaScript URL and feature validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-static>","exec"))'
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML syntax OK"' "$WORKFLOW_FILE"

          for url in \
            "$BOOKING_URL" \
            "$MEMBER_URL" \
            "$OWNER_URL" \
            "$IPAD_URL" \
            "$STAFF_URL" \
            "$SYSTEM_CHECK_URL" \
            "$OPERATION_PDF_URL"
          do
            code="$(curl -L -sS --retry 3 --connect-timeout 10 --max-time 50 \
              -o /dev/null -w "%{http_code}" "$url")"
            [[ "$code" =~ ^2|^3 ]] || {
              echo "::error::URL HTTP $code $url"; exit 1;
            }
          done

      - name: "Upload pre-publication validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-10B-prepublication-${{ github.run_id }}"
          path: |
            .dpro-next/esthe-next10b-static-validation.json
            .dpro-next/esthe-next10b-product-site.json
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit product page and catalog, then push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add \
            systems/esthe.html \
            systems.html \
            .dpro-next/esthe-next10b-static-validation.json \
            .dpro-next/esthe-next10b-product-site.json
          git diff --cached --quiet && {
            echo "::error::Commit対象がありません"; exit 1;
          }
          git commit -m "DPRO ESTHE NEXT-10B: publish product page and catalog"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "PRODUCT_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: "Wait for GitHub Pages publication"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          PUBLISHED="false"
          for attempt in $(seq 1 60); do
            PRODUCT_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 35 \
              -H "Cache-Control: no-cache, no-store, max-age=0" \
              -H "Pragma: no-cache" \
              "$PRODUCT_PAGE_URL?publish=${PRODUCT_COMMIT_SHA}_${attempt}" || true)"
            CATALOG_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 35 \
              -H "Cache-Control: no-cache, no-store, max-age=0" \
              -H "Pragma: no-cache" \
              "$CATALOG_URL?publish=${PRODUCT_COMMIT_SHA}_${attempt}" || true)"

            if [[ "$PRODUCT_BODY" == *"STEP ESTHE-NEXT-10B"* \
              && "$PRODUCT_BODY" == *"操作体験シートPDF"* \
              && "$PRODUCT_BODY" == *"公開検査済み完成画面"* \
              && "$CATALOG_BODY" == *"ESTHE NEXT-10完成"* \
              && "$CATALOG_BODY" == *"DPRO NEXT完成版を見る"* ]]; then
              PUBLISHED="true"
              echo "PUBLISH_ATTEMPT=$attempt" >> "$GITHUB_ENV"
              break
            fi
            sleep 10
          done
          [[ "$PUBLISHED" == "true" ]] || {
            echo "::error::ESTHE NEXT product-site publication not confirmed"; exit 1;
          }

      - name: "Install public visual validation browser"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: "Validate public desktop mobile and catalog card"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-visual>","exec"))'

      - name: "Write final product-site completion record"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-final>","exec"))'
          grep -q 'current_step: "ESTHE-NEXT-10B-COMPLETE"' \
            .dpro-next/esthe-next10b-product-site.yml
          grep -q 'next_step: "ESTHE-NEXT-10C-FINAL-COMPLETE"' \
            .dpro-next/esthe-next10b-product-site.yml
          grep -q 'static_ng: 0' \
            .dpro-next/esthe-next10b-product-site.yml
          grep -q 'horizontal_overflow: false' \
            .dpro-next/esthe-next10b-product-site.yml

      - name: "Upload final public validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-10B-public-${{ github.run_id }}"
          path: |
            .next10b-public-artifact/
            .dpro-next/esthe-next10b-public-visual-validation.json
            .dpro-next/esthe-next10b-product-site.json
            .dpro-next/esthe-next10b-product-site.yml
            .dpro-next/esthe-next10b-report.txt
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit final record, delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add \
            .dpro-next/esthe-next10b-public-visual-validation.json \
            .dpro-next/esthe-next10b-product-site.json \
            .dpro-next/esthe-next10b-product-site.yml \
            .dpro-next/esthe-next10b-report.txt
          git rm --ignore-unmatch "$WORKFLOW_FILE"
          git diff --cached --quiet && {
            echo "::error::最終Commit対象がありません"; exit 1;
          }
          git commit -m "DPRO ESTHE NEXT-10B complete: product site verified"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "FINAL_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: "Final public confirmation"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          FINAL_OK="false"
          for attempt in $(seq 1 36); do
            PRODUCT_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 35 \
              -H "Cache-Control: no-cache, no-store, max-age=0" \
              "$PRODUCT_PAGE_URL?final=${FINAL_COMMIT_SHA}_${attempt}" || true)"
            CATALOG_BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 35 \
              -H "Cache-Control: no-cache, no-store, max-age=0" \
              "$CATALOG_URL?final=${FINAL_COMMIT_SHA}_${attempt}" || true)"
            if [[ "$PRODUCT_BODY" == *"STEP ESTHE-NEXT-10B"* \
              && "$PRODUCT_BODY" == *"DPRO_ESTHE_NEXT_operation_experience_sheet_20260724.pdf"* \
              && "$CATALOG_BODY" == *"ESTHE NEXT-10完成"* ]]; then
              FINAL_OK="true"
              break
            fi
            sleep 10
          done
          [[ "$FINAL_OK" == "true" ]] || {
            echo "::error::最終公開確認に失敗しました"; exit 1;
          }

          echo "### ESTHE-NEXT-10B 完了" >> "$GITHUB_STEP_SUMMARY"
          echo "- 製品ページ: $PRODUCT_PAGE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- 製品一覧: $CATALOG_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- 操作体験シート: $OPERATION_PDF_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- PC・スマホ・一覧カード: **公開確認PASS**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker / Supabase / API変更: **なし**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 次STEP: **ESTHE-NEXT-10C-FINAL-COMPLETE**" >> "$GITHUB_STEP_SUMMARY"
