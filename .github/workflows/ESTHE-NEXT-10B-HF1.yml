# DPRO エステ・リラクゼーション LINE
# 製品サイトお客様向け文言修正: ESTHE-NEXT-10B-HF1
#
# お客様向けページから技術的な検査件数・QR読取件数・system-checkリンクを外し、
# PC・iPad・スマートフォン対応、公開デモ、操作体験を表示する。
#
# 対象: systems/esthe.html
# systems.html一覧カード・エステ本体・Worker・Supabase・APIは変更しない。

name: "DPRO ESTHE NEXT-10B-HF1 - Customer-Facing Copy"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ESTHE-NEXT-10B-HF1.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-product-site-esthe"
  cancel-in-progress: false

env:
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-10B-HF1.yml"
  BACKUP_TAG_PREFIX: "backup-product-site-before-esthe-next10b-hf1"
  PRODUCT_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/esthe.html"

jobs:
  esthe-next10b-hf1:
    name: "Replace technical proof with customer value"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: "Checkout product-site repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm current ESTHE product-page baseline"
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f systems/esthe.html
          test -f systems.html
          grep -q '公開検査済み完成画面' systems/esthe.html
          grep -q '静的検査NG 0' systems/esthe.html
          grep -q '操作体験シートQR6件読取完了' systems/esthe.html
          grep -q '完成検査を見る' systems/esthe.html
          grep -q 'href="systems/esthe.html"' systems.html
          ! grep -q 'ESTHE-NEXT-10B-HF1-CUSTOMER-COPY' systems/esthe.html

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi
          BASE_TAG="${BACKUP_TAG_PREFIX}-$(TZ=Asia/Tokyo date +%Y%m%d)"
          BACKUP_TAG="$BASE_TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi
          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" -m "Before ESTHE NEXT-10B-HF1"
          git push origin "refs/tags/$BACKUP_TAG"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"

      - name: "Apply customer-facing copy"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<apply>","exec"))'

      - name: "Run static customer-copy validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<validate>","exec"))'
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML OK"' "$WORKFLOW_FILE"
          mapfile -t CHANGED < <(git diff --name-only)
          for file in "${CHANGED[@]}"; do
            case "$file" in
              systems/esthe.html|.dpro-next/esthe-next10b-hf1-stage.json|.dpro-next/esthe-next10b-hf1-static.json) ;;
              *) echo "::error::想定外の変更ファイル: $file"; exit 1 ;;
            esac
          done

      - name: "Commit product-page copy and push"
        shell: bash
        run: |
          set -Eeuo pipefail
          git add systems/esthe.html .dpro-next/esthe-next10b-hf1-stage.json .dpro-next/esthe-next10b-hf1-static.json
          git commit -m "DPRO ESTHE product site: show customer value not test counts"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "PATCH_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: "Wait for corrected public product page"
        shell: bash
        run: |
          set -Eeuo pipefail
          PUBLISHED=false
          for attempt in $(seq 1 60); do
            BODY="$(curl -L -sS --retry 2 -H "Cache-Control: no-cache, no-store" "$PRODUCT_URL?copy=${PATCH_COMMIT_SHA}_${attempt}" || true)"
            if [[ "$BODY" == *"ESTHE-NEXT-10B-HF1-CUSTOMER-COPY"* \
              && "$BODY" == *"実際の使い方を確認できます。"* \
              && "$BODY" != *"静的検査NG 0"* \
              && "$BODY" != *"QR6件"* \
              && "$BODY" != *"完成検査を見る"* ]]; then
              PUBLISHED=true
              break
            fi
            sleep 10
          done
          [[ "$PUBLISHED" == true ]] || { echo "::error::公開反映未確認"; exit 1; }

      - name: "Install Chromium validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: "Verify desktop and mobile customer-facing display"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<browser>","exec"))'

      - name: "Write internal completion record"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<final>","exec"))'
          grep -q '^status: OK$' .dpro-next/esthe-next10b-hf1-completion.yml
          grep -q 'technical_test_counts_visible: false' .dpro-next/esthe-next10b-hf1-completion.yml
          grep -q 'system_check_link_visible: false' .dpro-next/esthe-next10b-hf1-completion.yml
          grep -q 'public_all_pass: true' .dpro-next/esthe-next10b-hf1-completion.yml

      - name: "Upload validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-10B-HF1-${{ github.run_id }}"
          path: |
            .esthe-next10b-hf1-artifact/
            .dpro-next/esthe-next10b-hf1-*.json
            .dpro-next/esthe-next10b-hf1-*.yml
          if-no-files-found: warn
          retention-days: 90

      - name: "Commit completion record delete workflow and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add .dpro-next/esthe-next10b-hf1-static.json .dpro-next/esthe-next10b-hf1-public.json .dpro-next/esthe-next10b-hf1-completion.json .dpro-next/esthe-next10b-hf1-completion.yml
          git rm --ignore-unmatch "$WORKFLOW_FILE"
          git commit -m "DPRO ESTHE product-site customer copy complete"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "FINAL_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: "Confirm final internal record"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          RAW="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/.dpro-next/esthe-next10b-hf1-completion.yml"
          CONFIRMED=false
          for attempt in $(seq 1 36); do
            BODY="$(curl -L -sS --retry 2 -H "Cache-Control: no-cache, no-store" "$RAW?sha=${FINAL_COMMIT_SHA}_${attempt}" || true)"
            if [[ "$BODY" == *'step: "ESTHE-NEXT-10B-HF1"'* \
              && "$BODY" == *"technical_test_counts_visible: false"* \
              && "$BODY" == *"public_all_pass: true"* ]]; then
              CONFIRMED=true
              break
            fi
            sleep 10
          done
          [[ "$CONFIRMED" == true ]] || { echo "::error::完成記録未確認"; exit 1; }
          echo "### エステ製品サイト お客様向け表示更新" >> "$GITHUB_STEP_SUMMARY"
          echo "- 技術的な検査件数・QR読取件数・system-checkリンク: **非表示**" >> "$GITHUB_STEP_SUMMARY"
          echo "- 利用端末・公開デモ・操作体験: **表示**" >> "$GITHUB_STEP_SUMMARY"
          echo "- systems.html一覧カード・エステ本体・Worker・Supabase・API: **変更なし**" >> "$GITHUB_STEP_SUMMARY"
