# DPRO エステ LINE
# STEP名: ESTHE-NEXT-10B-R3
#
# R2結果:
# - エステ製品ページ 1440px / 390px / 360px は正常
# - 製品一覧ページだけ 390pxに対してscrollWidth 400px
#
# 対象:
# - systems.html
# - R3検査・完成記録
#
# 変更しない:
# - systems/esthe.html
# - styles.css
# - script.js
# - Worker / Supabase / API
#
# 実施:
# - 現在の公開一覧ページで、はみ出し要素を事前診断
# - 製品一覧ページ限定のモバイル安全CSSを追加
# - PC 1440、スマホ390・360・320で公開再検査
# - エステ製品ページR2も回帰検査
#
# 成功後:
# - 自動Commit / Push
# - NEXT-10B・R2・R3 YMLを削除
#
# 次STEP:
# - ESTHE-NEXT-10C-FINAL-COMPLETE

name: "DPRO ESTHE NEXT-10B-R3 - Catalog Mobile Overflow Fix"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ESTHE-NEXT-10B-R3.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: "dpro-product-site-esthe-next"
  cancel-in-progress: false

env:
  WORKFLOW_FILE: ".github/workflows/ESTHE-NEXT-10B-R3.yml"
  BACKUP_TAG_PREFIX: "backup-product-site-before-esthe-next10b-r3"
  PRODUCT_PAGE_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems/esthe.html"
  CATALOG_URL: "https://dpromstk2000-lab.github.io/dpro-line-systems-site/systems.html"

jobs:
  esthe-next-10b-r3:
    name: "Fix and verify catalog mobile width"
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: "Checkout product-site repository with history"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: "Configure Git identity"
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "DPRO NEXT Actions"
          git config user.email "actions@users.noreply.github.com"

      - name: "Confirm NEXT-10B and R2 committed baseline"
        shell: bash
        run: |
          set -Eeuo pipefail
          grep -q 'STEP ESTHE-NEXT-10B / DPRO NEXT CATALOG' systems.html
          grep -q 'ESTHE NEXT-10完成' systems.html
          grep -q 'DPRO NEXT完成版を見る' systems.html
          grep -q 'STEP ESTHE-NEXT-10B / DPRO NEXT PRODUCT SITE' systems/esthe.html
          grep -q 'ESTHE-NEXT-10B-R2-MOBILE-SAFE' systems/esthe.html
          [[ "$(grep -o 'href="systems/esthe.html"' systems.html | wc -l)" -eq 1 ]]
          ! grep -q 'CATALOG-NEXT10B-R3-MOBILE-SAFE' systems.html

      - name: "Create change-before backup tag"
        shell: bash
        run: |
          set -Eeuo pipefail
          CHANGE_BEFORE_SHA="$GITHUB_SHA"
          mapfile -t HEAD_FILES < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if [[ "${#HEAD_FILES[@]}" -eq 1 && "${HEAD_FILES[0]}" == "$WORKFLOW_FILE" ]]; then
            CHANGE_BEFORE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
          fi
          BASE_TAG="${BACKUP_TAG_PREFIX}-$(TZ=Asia/Tokyo date +%Y%m%d)"
          BACKUP_TAG="$BASE_TAG"
          if git ls-remote --exit-code --tags origin "refs/tags/$BACKUP_TAG" >/dev/null 2>&1; then
            BACKUP_TAG="${BASE_TAG}-run-${GITHUB_RUN_ID}"
          fi
          git tag -a "$BACKUP_TAG" "$CHANGE_BEFORE_SHA" \
            -m "DPRO product site before ESTHE NEXT-10B-R3"
          git push origin "refs/tags/$BACKUP_TAG"
          echo "BACKUP_TAG=$BACKUP_TAG" >> "$GITHUB_ENV"

      - name: "Install Chromium for before-and-after diagnosis"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: "Diagnose current public catalog overflow"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-R3-diagnostic>","exec"))'

      - name: "Apply catalog-scoped mobile safety CSS"
        shell: bash
        run: |
          set -Eeuo pipefail
          ESTHE_SHA_BEFORE="$(sha256sum systems/esthe.html | awk '{print $1}')"
          STYLES_SHA_BEFORE="$(sha256sum styles.css | awk '{print $1}')"
          echo "ESTHE_SHA_BEFORE=$ESTHE_SHA_BEFORE" >> "$GITHUB_ENV"
          echo "STYLES_SHA_BEFORE=$STYLES_SHA_BEFORE" >> "$GITHUB_ENV"
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-R3-apply>","exec"))'

      - name: "Run static regression validation"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-R3-static>","exec"))'
          ruby -e 'require "yaml"; YAML.parse_file(ARGV[0]); puts "YML OK"' "$WORKFLOW_FILE"
          [[ "$(sha256sum systems/esthe.html | awk '{print $1}')" == "$ESTHE_SHA_BEFORE" ]]
          [[ "$(sha256sum styles.css | awk '{print $1}')" == "$STYLES_SHA_BEFORE" ]]

      - name: "Commit catalog fix and push"
        shell: bash
        run: |
          set -Eeuo pipefail
          git add \
            systems.html \
            .dpro-next/esthe-next10b-r3-before-diagnostic.json \
            .dpro-next/esthe-next10b-r3.json \
            .dpro-next/esthe-next10b-r3-static.json
          git diff --cached --quiet && {
            echo "::error::Commit対象がありません"; exit 1;
          }
          git commit -m "DPRO ESTHE NEXT-10B-R3: fix catalog mobile overflow"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "FIX_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: "Wait for corrected public catalog"
        shell: bash
        run: |
          set -Eeuo pipefail
          PUBLISHED="false"
          for attempt in $(seq 1 60); do
            BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 35 \
              -H "Cache-Control: no-cache, no-store, max-age=0" \
              -H "Pragma: no-cache" \
              "$CATALOG_URL?r3=${FIX_COMMIT_SHA}_${attempt}" || true)"
            if [[ "$BODY" == *"CATALOG-NEXT10B-R3-MOBILE-SAFE"* \
              && "$BODY" == *"ESTHE NEXT-10完成"* ]]; then
              PUBLISHED="true"
              break
            fi
            sleep 10
          done
          [[ "$PUBLISHED" == "true" ]] || {
            echo "::error::R3 catalog publication not confirmed"; exit 1;
          }

      - name: "Verify product and catalog at all target widths"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-R3-visual>","exec"))'

      - name: "Write R3 completion record"
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -c 'import base64;exec(compile(base64.b64decode(""),"<ESTHE-NEXT-10B-R3-final>","exec"))'
          grep -q 'current_step: "ESTHE-NEXT-10B-R3-COMPLETE"' \
            .dpro-next/esthe-next10b-r3.yml
          grep -q 'next_step: "ESTHE-NEXT-10C-FINAL-COMPLETE"' \
            .dpro-next/esthe-next10b-r3.yml
          grep -q 'catalog_mobile_320: true' \
            .dpro-next/esthe-next10b-r3.yml
          grep -q 'horizontal_overflow: false' \
            .dpro-next/esthe-next10b-r3.yml

      - name: "Upload R3 validation artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ESTHE-NEXT-10B-R3-${{ github.run_id }}"
          path: |
            .next10b-r3-public-artifact/
            .dpro-next/esthe-next10b-r3-before-diagnostic.json
            .dpro-next/esthe-next10b-r3-static.json
            .dpro-next/esthe-next10b-r3-public.json
            .dpro-next/esthe-next10b-r3.json
            .dpro-next/esthe-next10b-r3.yml
            .dpro-next/esthe-next10b-r3-report.txt
          if-no-files-found: warn
          retention-days: 30

      - name: "Commit final record, delete workflows and push"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          git add \
            .dpro-next/esthe-next10b-r3-before-diagnostic.json \
            .dpro-next/esthe-next10b-r3-static.json \
            .dpro-next/esthe-next10b-r3-public.json \
            .dpro-next/esthe-next10b-r3.json \
            .dpro-next/esthe-next10b-r3.yml \
            .dpro-next/esthe-next10b-r3-report.txt
          git rm --ignore-unmatch \
            "$WORKFLOW_FILE" \
            ".github/workflows/ESTHE-NEXT-10B-R2.yml" \
            ".github/workflows/ESTHE-NEXT-10B.yml"
          git diff --cached --quiet && {
            echo "::error::最終Commit対象がありません"; exit 1;
          }
          git commit -m "DPRO ESTHE NEXT-10B-R3 complete: catalog mobile verified"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "FINAL_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: "Final public marker confirmation"
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail
          FINAL_OK="false"
          for attempt in $(seq 1 36); do
            BODY="$(curl -L -sS --retry 2 --connect-timeout 8 --max-time 35 \
              -H "Cache-Control: no-cache, no-store, max-age=0" \
              "$CATALOG_URL?final=${FINAL_COMMIT_SHA}_${attempt}" || true)"
            if [[ "$BODY" == *"CATALOG-NEXT10B-R3-MOBILE-SAFE"* \
              && "$BODY" == *"ESTHE NEXT-10完成"* ]]; then
              FINAL_OK="true"
              break
            fi
            sleep 10
          done
          [[ "$FINAL_OK" == "true" ]] || {
            echo "::error::R3最終公開確認に失敗しました"; exit 1;
          }

          echo "### ESTHE-NEXT-10B-R3 完了" >> "$GITHUB_STEP_SUMMARY"
          echo "- 製品ページPC 1440px: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- 製品ページ390px / 360px: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- 製品一覧PC 1440px: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- 製品一覧390px / 360px / 320px: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- 横はみ出し: なし" >> "$GITHUB_STEP_SUMMARY"
          echo "- systems/esthe.html / styles.css: 変更なし" >> "$GITHUB_STEP_SUMMARY"
          echo "- 次STEP: ESTHE-NEXT-10C-FINAL-COMPLETE" >> "$GITHUB_STEP_SUMMARY"
