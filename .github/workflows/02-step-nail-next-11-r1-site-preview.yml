jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout product site repository
        uses: actions/checkout@v6

      - name: Restore product site preview patch
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$PATCH_GZIP_BASE64"             | tr -d '[:space:]'             | base64 --decode             | gzip --decompress             > /tmp/apply_nail_next11_r1_site.py

      - name: Apply live preview URLs
        shell: bash
        run: |
          set -euo pipefail
          python /tmp/apply_nail_next11_r1_site.py

      - name: Validate product site preview URLs
        shell: bash
        run: |
          set -euo pipefail
          grep -q "STEP NAIL-NEXT-11-R1" systems/nail.html
          grep -q "demo=1&amp;auto=1&amp;embed_demo=1" systems/nail.html
          grep -q "shop_code=nail_demo" systems/nail.html
          grep -q "view=dashboard" systems/nail.html
          grep -q "view=designs" systems/nail.html
          grep -q "view=customers" systems/nail.html
          grep -q "view=today" systems/nail.html

          python - <<'PY'
          from pathlib import Path
          html = Path("systems/nail.html").read_text(encoding="utf-8")
          assert html.count("demo=1&amp;auto=1&amp;embed_demo=1") >= 8
          assert "owner.html?v=nail-next-10" in html
          assert "owner-ipad.html?v=nail-next-10" in html
          PY

          echo "NAIL NEXT-11-R1 product site preview validation passed"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add systems/nail.html

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "STEP NAIL-NEXT-11-R1 fix nail live previews"
          git push
